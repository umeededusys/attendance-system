<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<style>

  --bg-base: #0C0508;
  --bg-surface: #130810;
  --sidebar-bg: linear-gradient(180deg,#1E0B14 0%,#160811 55%,#0F0710 100%);
  --topbar-bg: rgba(12,5,8,0.9);
  --maroon-deep: #7A0E1A;
  --maroon-mid: #A01020;
  --maroon-bright: #C41E30;
  --gold: #D4AF37;
  --text-primary: #F2EBF0;
  --text-secondary: #A89AA5;
  --text-muted: #6B5E68;
  --border: rgba(255,255,255,0.07);
  --glass-bg: linear-gradient(135deg,rgba(255,255,255,0.042) 0%,rgba(255,255,255,0.018) 100%);
  --shadow-md: 0 6px 28px rgba(0,0,0,0.42);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body, #root { height: 100%; }
body { 
  font-family: 'DM Sans', sans-serif; 
  background: var(--bg-base); 
  color: var(--text-primary);
  overflow: hidden;
}

/* ═══════════════════════════════════════════════════════ SPLASH */

.splash-screen {
  display: flex;
  height: 100vh;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #0C0508 0%, #1A0C15 100%);
  flex-direction: column;
  gap: 20px;
}

.logo-animated {
  width: 180px;
  height: 180px;
  animation: logoFloat 4s ease-in-out infinite, logoGlow 3s ease-in-out infinite;
}

@keyframes logoFloat {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-20px); }
}

@keyframes logoGlow {
  0%, 100% { filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3)); }
  50% { filter: drop-shadow(0 0 30px rgba(196, 30, 48, 0.6)); }
}

.splash-text { 
  font-family: 'Cormorant Garamond', serif;
  font-size: 48px; 
  font-weight: 700;
  color: var(--text-primary);
}

.splash-subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: 36px;
  color: var(--gold);
}

/* ═══════════════════════════════════════════════════════ LOGIN */

.login-screen {
  display: flex;
  height: 100vh;
  background: linear-gradient(135deg, #0C0508 0%, #1A0C15 100%);
}

.login-left {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px;
}

.logo-badge {
  width: 150px;
  height: 150px;
  background: linear-gradient(135deg, #C41E30 0%, #7A0E1A 100%);
  border: 3px solid #D4AF37;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 40px;
  box-shadow: 0 20px 60px rgba(196, 30, 48, 0.4);
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 700;
  color: #D4AF37;
}

.login-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 48px;
  font-weight: 700;
  margin-bottom: 10px;
}

.login-subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: 36px;
  color: var(--gold);
  margin-bottom: 40px;
}

.login-right {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
}

.login-card {
  background: rgba(26, 12, 21, 0.95);

  border: 1px solid rgba(196, 30, 48, 0.3);
  border-radius: 24px;

}

.login-card h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 10px;
}

.login-card p {
  color: var(--text-secondary);
  font-size: 13px;
  margin-bottom: 30px;
}

.input-group {
  margin-bottom: 20px;
}

.input-group label {
  display: block;
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 600;
  margin-bottom: 8px;
  text-transform: uppercase;
}

.input-group input {
  width: 100%;
  padding: 12px 16px;
  background: rgba(255, 255, 255, 0.042);
  border: 1px solid rgba(255, 255, 255, 0.07);
  border-radius: 8px;
  color: var(--text-primary);
  font-size: 14px;
  transition: all 200ms;
}

.input-group input:focus {
  outline: none;
  border-color: var(--maroon-bright);
  box-shadow: 0 0 16px rgba(196, 30, 48, 0.2);
}

.login-btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, var(--maroon-bright), var(--maroon-deep));
  border: none;
  border-radius: 8px;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: all 200ms;
  margin-top: 10px;
}

.login-btn:hover { transform: translateY(-2px); }

.error-msg {
  background: rgba(239, 68, 68, 0.12);
  border: 1px solid rgba(239, 68, 68, 0.3);
  color: #f87171;
  padding: 12px;
  border-radius: 8px;
  font-size: 12px;
  margin-bottom: 20px;
}

/* ═══════════════════════════════════════════════════════ APP LAYOUT */

.app-container {

  height: 100vh;
}

.sidebar {

}

.sidebar-logo {

  font-weight: 700;

  margin-bottom: 30px;
}

.nav-item {

  border-radius: 8px;

  transition: all 150ms;
  color: var(--text-secondary);
  font-size: 13px;

  border: none;

.nav-item.active {

.main-content {

.topbar {

.content-area {

h1 {

.date-label {

.stat-grid {

.stat-card {
  background: var(--glass-bg);

.stat-number {

.stat-label {

.glass-box {

table {

th {

td {

.badge {

  padding: 4px 9px;

}

.badge-present { background: rgba(34,197,94,0.12); color: #4ade80; }
.badge-absent { background: rgba(239,68,68,0.12); color: #f87171; }
.badge-late { background: rgba(251,191,36,0.12); color: #fbbf24; }

.staff-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}

.staff-card {
  background: var(--glass-bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 16px;
  cursor: pointer;
  transition: all 200ms;
}

.staff-card:hover {
  border-color: var(--maroon-bright);
  box-shadow: 0 8px 24px rgba(196, 30, 48, 0.2);
}

.staff-avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--maroon-bright), var(--maroon-deep));
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 600;
  margin-bottom: 12px;
}

.staff-name {
  font-weight: 600;
  margin-bottom: 4px;
}

.staff-role {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.loading {
  text-align: center;
  padding: 40px;
  color: var(--text-muted);
}

.user-profile {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 12px;
  background: rgba(196, 30, 48, 0.15);
  border-radius: 8px;
  margin-top: auto;
}

.profile-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--maroon-bright), var(--maroon-deep));
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 600;
  font-size: 12px;
}

.profile-name {
  font-size: 12px;
  font-weight: 600;
}

.profile-role {
  font-size: 10px;
  color: var(--text-muted);
}

.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 4px;
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ═════════════════════════════════════════════════ SUPABASE

const SUPABASE_URL = 'https://edboqmaywwxbnltscrso.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkYm9xbWF5d3d4Ym5sdHNjcnNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NjcwMDMsImV4cCI6MjA5MjQ0MzAwM30.2U8omeYP57ENxJcg5Yg1Egt2mwIMBAgxyNnLQtLGC_o';

let supabaseClient = null;
try {
  supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  console.log('✅ SUPABASE CONNECTED');
} catch (e) {
  console.error('❌ Supabase Error:', e);
}

// ═════════════════════════════════════════════════ DATA OPS

const dataOps = {
  async getStaff() {
    if (!supabaseClient) return [];
    try {
      const { data, error } = await supabaseClient
        .from('staff')
        .select('*')
        .eq('status', 'active')
        .order('name');
      if (error) throw error;
      console.log(`✅ Loaded ${data?.length || 0} staff`);
      return data || [];
    } catch (e) {
      console.error('Staff error:', e.message);
      return [];
    }
  },

  async getAttendanceToday() {
    if (!supabaseClient) return [];
    try {
      const today = new Date().toISOString().split('T')[0];
      const { data, error } = await supabaseClient
        .from('attendance')
        .select('*')
        .eq('date', today)
        .order('in_time', { ascending: false });
      if (error) throw error;
      return data || [];
    } catch (e) {
      console.error('Attendance error:', e.message);
      return [];
    }
  },

  async getAttendanceStats() {
    if (!supabaseClient) return { total: 0, present: 0, absent: 0, late: 0 };
    try {
      const today = new Date().toISOString().split('T')[0];
      const { data, error } = await supabaseClient
        .from('attendance')
        .select('status')
        .eq('date', today);
      if (error) throw error;
      return {
        total: data.length,
        present: data.filter(d => d.status === 'present').length,
        absent: data.filter(d => d.status === 'absent').length,
        late: data.filter(d => d.status === 'late').length,
      };
    } catch (e) {
      return { total: 0, present: 0, absent: 0, late: 0 };
    }
  },

  async getLeaves() {
    if (!supabaseClient) return [];
    try {
      const { data, error } = await supabaseClient
        .from('leaves')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(20);
      if (error) throw error;
      return data || [];
    } catch (e) {
      console.error('Leaves error:', e.message);
      return [];
    }
  },
};

// ═════════════════════════════════════════════════ COMPONENTS

function UMEEDLogo() {
  return (
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style={{stopColor: '#C41E30', stopOpacity: 1}} />
          <stop offset="100%" style={{stopColor: '#7A0E1A', stopOpacity: 1}} />
        </linearGradient>
      </defs>
      <circle cx="100" cy="100" r="95" fill="url(#redGrad)" stroke="#D4AF37" strokeWidth="3"/>
      <text x="100" y="115" textAnchor="middle" fontSize="42" fontWeight="700" fill="white" fontFamily="'Cormorant Garamond', serif">UMEED</text>
      <text x="100" y="135" textAnchor="middle" fontSize="11" fontWeight="600" fill="#D4AF37">EDUCATION SYSTEM</text>
    </svg>
  );
}

function SplashScreen({ onComplete }) {
  useEffect(() => {
    const timer = setTimeout(() => onComplete(), 3000);
    return () => clearTimeout(timer);
  }, [onComplete]);

  return (
    <div className="splash-screen">
      <div className="logo-animated" style={{width: 180, height: 180}}>
        <UMEEDLogo />
      </div>
      <div className="splash-text">Umeed</div>
      <div className="splash-subtitle">Education System</div>

}

function LoginScreen({ onLoginSuccess }) {
  const [email, setEmail] = useState('principal@umeededu.pk');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleLogin = async (e) => {
    e.preventDefault();
    setError('');
    setLoading(true);

    if (email && password) {
      if (email === 'principal@umeededu.pk' && password === 'admin123') {
        onLoginSuccess({ email, name: 'H.M. Tariq Mehmood', role: 'Principal - Admin' });
      } else {
        setError('Invalid credentials');
      }
    } else {
      setError('Please enter email and password');
    }

    setLoading(false);
  };

  return (
    <div className="login-screen">
      <div className="login-left">
        <div className="logo-badge">
          <span style={{fontSize: 60}}>🛡️</span>
        </div>
        <div className="login-title">Umeed</div>
        <div className="login-subtitle">Education System</div>
        <p style={{ color: 'var(--text-muted)', textAlign: 'center', marginTop: 40 }}>
          Staff Attendance Management System
        </p>
      </div>

      <div className="login-right">

              {loading ? 'Signing in...' : 'Sign In →'}
            </button>
          </form>

          <p style={{ fontSize: 10, color: 'var(--text-muted)', marginTop: 20, textAlign: 'center' }}>

function DashboardScreen() {
  const [staff, setStaff] = useState([]);
  const [attendance, setAttendance] = useState([]);
  const [stats, setStats] = useState({ total: 0, present: 0, absent: 0, late: 0 });
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    async function loadData() {
      try {
        const [staffData, attendanceData, statsData] = await Promise.all([
          dataOps.getStaff(),
          dataOps.getAttendanceToday(),
          dataOps.getAttendanceStats(),
        ]);

        setStaff(staffData);
        setAttendance(attendanceData);
        setStats(statsData);
      } finally {
        setLoading(false);
      }
    }

    loadData();
  }, []);

  return (
    <>
      <h1>Dashboard</h1>
      <div className="date-label">
        {new Date().toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
      </div>

      {loading ? (
        <div className="loading">Loading...</div>
      ) : (
        <>
          <div className="stat-grid">
            <div className="stat-card">
              <div style={{ fontSize: 24 }}>👥</div>
              <div className="stat-number" style={{ color: 'var(--gold)' }}>{staff.length}</div>
              <div className="stat-label">Total Staff</div>
            </div>

            <div className="stat-card">
              <div style={{ fontSize: 24, color: '#4ade80' }}>✓</div>
              <div className="stat-number" style={{ color: '#4ade80' }}>{stats.present}</div>
              <div className="stat-label">Present Today</div>
            </div>

            <div className="stat-card">
              <div style={{ fontSize: 24, color: '#f87171' }}>✗</div>
              <div className="stat-number" style={{ color: '#f87171' }}>{stats.absent}</div>
              <div className="stat-label">Absent Today</div>
            </div>

            <div className="stat-card">
              <div style={{ fontSize: 24, color: '#fbbf24' }}>⏰</div>
              <div className="stat-number" style={{ color: '#fbbf24' }}>{stats.late}</div>
              <div className="stat-label">Late Arrivals</div>
            </div>
          </div>

          <div className="glass-box">
            <div className="section-title">Today's Attendance Records ({attendance.length})</div>

            {attendance.length === 0 ? (
              <p style={{ color: 'var(--text-muted)', padding: '20px', textAlign: 'center' }}>
                No attendance records yet
              </p>
            ) : (
              <table>
                <thead>
                  <tr>
                    <th>Staff ID</th>
                    <th>Check In</th>
                    <th>Check Out</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody>
                  {attendance.slice(0, 15).map((record, i) => (
                    <tr key={i}>
                      <td><strong>{record.staff_id}</strong></td>
                      <td>{record.in_time || '—'}</td>
                      <td>{record.out_time || '—'}</td>
                      <td>
                        <span className={`badge badge-${record.status}`}>
                          {record.status ? record.status.charAt(0).toUpperCase() + record.status.slice(1) : '?'}
                        </span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </>
      )}
    </>
  );
}

function StaffScreen() {
  const [staff, setStaff] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    async function loadStaff() {
      try {
        const data = await dataOps.getStaff();
        setStaff(data);
      } finally {
        setLoading(false);
      }
    }
    loadStaff();
  }, []);

  return (
    <>
      <h1>Staff Management</h1>
      <div style={{ color: 'var(--text-secondary)', fontSize: 13, marginBottom: 20 }}>
        {staff.length} total staff members

          {staff.map((person, i) => (
            <div key={i} className="staff-card">
              <div className="staff-avatar">{person.name.charAt(0)}</div>
              <div className="staff-name">{person.name}</div>
              <div className="staff-role">{person.role}</div>
              <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 8 }}>
                {person.dept}
              </div>
              <div style={{ fontSize: 11, color: 'var(--text-secondary)', lineHeight: 1.5 }}>
                <div>✉ {person.email}</div>
                <div>📱 {person.phone}</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </>
  );
}

function LeavesScreen() {
  const [leaves, setLeaves] = useState([]);

  useEffect(() => {
    async function loadLeaves() {
      try {
        const data = await dataOps.getLeaves();
        setLeaves(data);
      } finally {
        setLoading(false);
      }
    }
    loadLeaves();
  }, []);

  return (
    <>
      <h1>Leave Management</h1>
      <div style={{ color: 'var(--text-secondary)', fontSize: 13, marginBottom: 20 }}>
        Staff leave requests
      </div>

      {loading ? (
        <div className="loading">Loading leaves...</div>
      ) : (
        <div className="glass-box">
          {leaves.length === 0 ? (
            <p style={{ color: 'var(--text-muted)', padding: '20px', textAlign: 'center' }}>
              No leave requests
            </p>
          ) : (
            <table>
              <thead>
                <tr>
                  <th>Staff Member</th>
                  <th>Type</th>
                  <th>From - To</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                {leaves.map((leave, i) => (
                  <tr key={i}>
                    <td><strong>{leave.staff_id}</strong></td>
                    <td>{leave.type}</td>
                    <td>{leave.from_date} → {leave.to_date}</td>
                    <td><span className={`badge badge-${leave.status}`}>{leave.status}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      )}
    </>
  );
}

function ReportsScreen() {
  return (
    <>
      <h1>Reports</h1>
      <div style={{ color: 'var(--text-secondary)', fontSize: 13, marginBottom: 20 }}>
        Attendance Reports & Analytics
      </div>
      <div className="glass-box">
        <p style={{ color: 'var(--text-muted)', padding: '40px', textAlign: 'center' }}>
          📊 Advanced reports and analytics coming soon...
        </p>
      </div>
    </>
  );
}

// ═════════════════════════════════════════════════ MAIN APP

function App() {
  const [splash, setSplash] = useState(true);
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('dashboard');

  if (splash) {
    return <SplashScreen onComplete={() => setSplash(false)} />;
  }

  if (!user) {
    return <LoginScreen onLoginSuccess={setUser} />;
  }

  const renderPage = () => {
    switch (page) {
      case 'dashboard': return <DashboardScreen />;
      case 'staff': return <StaffScreen />;
      case 'leaves': return <LeavesScreen />;
      case 'reports': return <ReportsScreen />;
      default: return <DashboardScreen />;
    }
  };

  return (
    <div className="app-container">
      <div className="sidebar">
        <div className="sidebar-logo">UMEED</div>

        <nav style={{ flex: 1 }}>
          {[
            { id: 'dashboard', label: '📊 Dashboard' },
            { id: 'staff', label: '👥 Staff' },
            { id: 'leaves', label: '📅 Leaves' },
            { id: 'reports', label: '📈 Reports' },
          ].map(item => (
            <button
              key={item.id}
              className={`nav-item ${page === item.id ? 'active' : ''}`}
              onClick={() => setPage(item.id)}
            >
              {item.label}
            </button>
          ))}
        </nav>

        <div className="user-profile">
          <div className="profile-avatar">{user.name.charAt(0)}</div>
          <div className="profile-info">
            <div className="profile-name">{user.name}</div>
            <div className="profile-role">{user.role}</div>
          </div>
        </div>

        <button className="nav-item" onClick={() => setUser(null)} style={{ marginTop: 10 }}>
          🚪 Logout
        </button>
      </div>

      <div className="main-content">
        <div className="topbar">
          <div style={{ fontSize: 16, fontWeight: 600 }}>Umeed Education System</div>
          <div style={{ display: 'flex', gap: 16 }}>
            <button style={{ background: 'transparent', border: 'none', color: 'var(--text-secondary)', cursor: 'pointer', fontSize: 18 }}>
              🔔
            </button>
            <button style={{ background: 'transparent', border: 'none', color: 'var(--text-secondary)', cursor: 'pointer', fontSize: 18 }}>
              ⚙️
            </button>
          </div>
        </div>

        <div className="content-area">
          {renderPage()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

console.log('✅ UMEED ATTENDANCE SYSTEM LOADED');

console.log('✅ READY TO USE');
</script>

</body>
