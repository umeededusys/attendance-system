<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umeed Education System v4.0</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Lora:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<style>
:root{--primary:#C41E30;--primary-dark:#7A0E1A;--primary-glow:rgba(196,30,48,0.15);--gold:#D4AF37;--gold-dark:#B8941E;--bg:#0A0A0F;--surface:#14141C;--surface2:#1C1C28;--surface3:#242434;--text:#F0F0F8;--text2:#A0A0B0;--text3:#606070;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);--success:#10B981;--warning:#F59E0B;--danger:#EF4444;}
.light-mode{--bg:#F2F2F7;--surface:#FFFFFF;--surface2:#F0F0F6;--surface3:#E8E8F0;--text:#1A1A2E;--text2:#4A4A6A;--text3:#8A8AAA;--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);}
*{margin:0;padding:0;box-sizing:border-box;}html,body,#root{height:100%;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;line-height:1.5;transition:background .3s,color .3s;}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(196,30,48,.3);border-radius:10px;}
.splash{display:flex;height:100vh;align-items:center;justify-content:center;background:linear-gradient(135deg,#06060C,#12121E);flex-direction:column;gap:28px;}
.splash-logo-wrap{position:relative;width:168px;height:168px;display:grid;place-items:center;animation:logoReveal 1.25s cubic-bezier(.2,.8,.2,1) both,logoRotate 10s linear infinite;}
.splash-logo-wrap::before{content:'';position:absolute;inset:-10px;border-radius:50%;background:radial-gradient(circle,rgba(212,175,55,.28),rgba(212,175,55,0) 65%);filter:blur(2px);animation:haloPulse 2.8s ease-in-out infinite;}
.splash-logo{position:relative;width:150px;height:150px;filter:drop-shadow(0 24px 55px rgba(196,30,48,.45));}
.splash-logo img{width:100%;height:100%;object-fit:contain;display:block;}
.splash-logo-shine{position:absolute;inset:0;border-radius:18px;overflow:hidden;pointer-events:none;}
.splash-logo-shine::after{content:'';position:absolute;top:-25%;left:-70%;width:42%;height:150%;background:linear-gradient(100deg,rgba(255,255,255,0) 0%,rgba(255,236,170,.75) 48%,rgba(255,255,255,0) 100%);transform:rotate(14deg);animation:logoShine 2.4s ease-in-out .65s infinite;}
@keyframes logoReveal{0%{opacity:0;transform:scale(.62) rotate(-14deg)}70%{opacity:1;transform:scale(1.05) rotate(3deg)}100%{opacity:1;transform:scale(1) rotate(0deg)}}
@keyframes logoRotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes logoShine{0%{left:-70%}55%,100%{left:150%}}
@keyframes haloPulse{0%,100%{opacity:.65;transform:scale(1)}50%{opacity:1;transform:scale(1.07)}}
.splash-title{font-family:'Lora',serif;font-size:46px;font-weight:700;letter-spacing:-1px;background:linear-gradient(135deg,#fff,#D4AF37);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.splash-sub{font-size:12px;color:#D4AF37;letter-spacing:4px;font-weight:500;}
.splash-bar{width:180px;height:3px;background:rgba(255,255,255,.08);border-radius:10px;overflow:hidden;}
.splash-bar-fill{height:100%;background:linear-gradient(90deg,#C41E30,#D4AF37);border-radius:10px;animation:barFill 4s ease forwards;}
@keyframes barFill{from{width:0}to{width:100%}}
.login-wrap{display:flex;height:100vh;background:linear-gradient(135deg,#06060C,#12121E);}
.login-left{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:18px;}
.login-logo{width:120px;height:120px;filter:drop-shadow(0 15px 40px rgba(196,30,48,.4));}
.login-logo img{width:100%;height:100%;object-fit:contain;}
.login-brand{font-family:'Lora',serif;font-size:38px;font-weight:700;background:linear-gradient(135deg,#fff,#D4AF37);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.login-tagline{font-size:11px;color:#D4AF37;letter-spacing:3px;}
.login-right{flex:1;display:flex;align-items:center;justify-content:center;padding:60px;}
.login-box{background:rgba(28,28,40,.92);backdrop-filter:blur(20px);border:1px solid rgba(212,175,55,.12);border-radius:24px;padding:50px;width:100%;max-width:420px;box-shadow:0 30px 80px rgba(0,0,0,.6);}
.form-title{font-family:'Lora',serif;font-size:25px;font-weight:700;color:#D4AF37;margin-bottom:8px;}
.form-desc{color:var(--text3);font-size:12px;margin-bottom:30px;}
.form-group{margin-bottom:20px;}
.form-label{display:block;color:var(--text3);font-size:10px;font-weight:700;margin-bottom:7px;text-transform:uppercase;letter-spacing:1px;}
.form-input{width:100%;padding:12px 15px;background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:13px;font-family:'Sora',sans-serif;transition:all .2s;}
.form-input:focus{outline:none;border-color:#C41E30;box-shadow:0 0 0 3px rgba(196,30,48,.1);}
.form-input::placeholder{color:var(--text3);}
.btn-login{width:100%;padding:13px;background:linear-gradient(135deg,#C41E30,#7A0E1A);border:none;border-radius:10px;color:#fff;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s;margin-top:8px;text-transform:uppercase;letter-spacing:1px;font-family:'Sora',sans-serif;}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 14px 36px rgba(196,30,48,.35);}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.error-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5;padding:11px 14px;border-radius:10px;font-size:12px;margin-bottom:16px;animation:shake .4s ease;white-space:pre-line;}
.login-help{background:rgba(212,175,55,.09);border:1px solid rgba(212,175,55,.22);color:#f6e7b2;padding:11px 14px;border-radius:10px;font-size:11px;line-height:1.55;margin-top:14px;}
.login-help strong{color:#ffe7a6;}
.auth-status{margin-top:10px;font-size:11px;color:var(--text3);}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.shell{display:flex;height:100vh;background:var(--bg);}
.sidebar{width:265px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:26px 16px;overflow-y:auto;flex-shrink:0;transition:background .3s;}
.brand{display:flex;align-items:center;gap:11px;margin-bottom:30px;padding-bottom:18px;border-bottom:1px solid var(--border);}
.brand-logo{width:52px;height:52px;flex-shrink:0;}
.brand-logo img{width:100%;height:100%;object-fit:contain;}
.brand-name{font-family:'Lora',serif;font-size:12px;font-weight:700;color:#D4AF37;text-transform:uppercase;letter-spacing:1.5px;line-height:1.3;}
.brand-ver{font-size:9px;color:var(--text3);margin-top:2px;}
.nav-group{margin-bottom:22px;}
.nav-group-label{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin:0 10px 9px;display:block;}
.nav-btn{width:100%;padding:10px 13px;background:transparent;border:none;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;border-radius:8px;transition:all .15s;text-align:left;margin-bottom:3px;display:flex;align-items:center;gap:9px;font-family:'Sora',sans-serif;}
.nav-btn:hover{background:var(--primary-glow);color:var(--text);}
.nav-btn.active{background:linear-gradient(135deg,rgba(196,30,48,.22),rgba(196,30,48,.1));color:#D4AF37;font-weight:600;border-left:3px solid #C41E30;padding-left:10px;}
.nav-icon{font-size:14px;width:18px;text-align:center;}
.sidebar-footer{margin-top:auto;padding-top:16px;border-top:1px solid var(--border);}
.user-card{background:var(--primary-glow);border:1px solid rgba(196,30,48,.15);border-radius:10px;padding:13px;margin-bottom:10px;}
.user-avatar{width:34px;height:34px;background:linear-gradient(135deg,#C41E30,#7A0E1A);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;margin-bottom:7px;}
.user-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px;}
.user-role{font-size:10px;color:var(--text3);}
.btn-logout{width:100%;padding:9px;background:rgba(196,30,48,.1);border:1px solid rgba(196,30,48,.2);color:#C41E30;border-radius:8px;font-weight:600;font-size:11px;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.5px;font-family:'Sora',sans-serif;}
.btn-logout:hover{background:rgba(196,30,48,.2);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:66px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 34px;flex-shrink:0;transition:background .3s;}
.topbar-title{font-family:'Lora',serif;font-size:16px;font-weight:600;}
.topbar-right{display:flex;gap:9px;align-items:center;}
.btn-icon{padding:7px 13px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Sora',sans-serif;}
.btn-icon:hover{background:var(--primary-glow);color:var(--text);border-color:rgba(196,30,48,.3);}
.content{flex:1;overflow-y:auto;padding:34px;}
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:30px;flex-wrap:wrap;gap:14px;}
.page-title{font-family:'Lora',serif;font-size:27px;font-weight:700;margin-bottom:4px;}
.page-sub{color:var(--text2);font-size:12px;}
.page-hdr-right{display:flex;gap:9px;align-items:center;flex-wrap:wrap;}
.btn-primary{padding:9px 20px;background:linear-gradient(135deg,#C41E30,#7A0E1A);border:none;color:#fff;border-radius:9px;font-weight:600;font-size:11px;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.6px;font-family:'Sora',sans-serif;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(196,30,48,.3);}
.btn-gold{padding:9px 20px;background:linear-gradient(135deg,#D4AF37,#B8941E);border:none;color:#000;border-radius:9px;font-weight:700;font-size:11px;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.6px;font-family:'Sora',sans-serif;}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(212,175,55,.3);}
.btn-outline{padding:7px 14px;background:transparent;border:1px solid var(--border2);color:var(--text2);border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Sora',sans-serif;}
.btn-outline:hover{background:var(--surface2);color:var(--text);}
.btn-outline.active{background:var(--primary-glow);border-color:rgba(196,30,48,.4);color:#C41E30;}
.btn-sm{padding:5px 11px;font-size:10px;border-radius:6px;}
.btn-danger{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#fca5a5;padding:5px 11px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Sora',sans-serif;}
.btn-danger:hover{background:rgba(239,68,68,.22);}
.btn-success{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);color:#6ee7b7;padding:5px 11px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Sora',sans-serif;}
.btn-success:hover{background:rgba(16,185,129,.22);}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:16px;margin-bottom:28px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;position:relative;overflow:hidden;transition:all .2s;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.stat-card.gold::before{background:linear-gradient(90deg,#D4AF37,#B8941E);}
.stat-card.green::before{background:linear-gradient(90deg,#10B981,#059669);}
.stat-card.red::before{background:linear-gradient(90deg,#EF4444,#DC2626);}
.stat-card.amber::before{background:linear-gradient(90deg,#F59E0B,#D97706);}
.stat-card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.2);}
.stat-icon{font-size:20px;margin-bottom:10px;}
.stat-val{font-family:'Lora',serif;font-size:32px;font-weight:700;margin-bottom:4px;}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-weight:600;}
.stat-trend{font-size:10px;color:#10B981;margin-top:5px;}
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:16px;margin-bottom:28px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;transition:background .3s;}
.card-hdr{margin-bottom:16px;}
.card-title{font-family:'Lora',serif;font-size:14px;font-weight:600;margin-bottom:3px;}
.card-meta{font-size:11px;color:var(--text3);}
.chart-wrap{position:relative;height:250px;}
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:background .3s;margin-bottom:20px;}
.table-card-hdr{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.table-card-title{font-family:'Lora',serif;font-size:14px;font-weight:600;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{padding:12px 16px;text-align:left;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap;}
td{padding:13px 16px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text);}
tbody tr:hover{background:var(--surface2);}
tbody tr:last-child td{border-bottom:none;}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.badge-present{background:rgba(16,185,129,.12);color:#6ee7b7;border:1px solid rgba(16,185,129,.2);}
.badge-present::before{background:#10B981;}
.badge-absent{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.2);}
.badge-absent::before{background:#EF4444;}
.badge-late{background:rgba(245,158,11,.12);color:#fcd34d;border:1px solid rgba(245,158,11,.2);}
.badge-late::before{background:#F59E0B;}
.badge-pending{background:rgba(59,130,246,.12);color:#93c5fd;border:1px solid rgba(59,130,246,.2);}
.badge-pending::before{background:#3B82F6;}
.badge-approved{background:rgba(16,185,129,.12);color:#6ee7b7;border:1px solid rgba(16,185,129,.2);}
.badge-approved::before{background:#10B981;}
.badge-rejected{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.2);}
.badge-rejected::before{background:#EF4444;}
.badge-success{background:rgba(16,185,129,.12);color:#6ee7b7;border:1px solid rgba(16,185,129,.2);}
.badge-success::before{background:#10B981;}
.badge-failed{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.2);}
.badge-failed::before{background:#EF4444;}
.staff-controls{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.search-input{padding:9px 14px;background:var(--surface);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-size:12px;font-family:'Sora',sans-serif;width:240px;transition:all .2s;}
.search-input:focus{outline:none;border-color:#C41E30;box-shadow:0 0 0 3px rgba(196,30,48,.1);}
.search-input::placeholder{color:var(--text3);}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;}
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;}
.staff-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;transition:all .2s;}
.staff-card:hover{transform:translateY(-3px);border-color:rgba(196,30,48,.3);box-shadow:0 10px 28px rgba(0,0,0,.2);}
.staff-avatar{width:44px;height:44px;background:linear-gradient(135deg,#C41E30,#7A0E1A);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;margin-bottom:10px;}
.staff-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;}
.staff-role{font-size:11px;color:var(--text3);margin-bottom:5px;}
.staff-dept{display:inline-block;padding:2px 7px;background:var(--primary-glow);border:1px solid rgba(196,30,48,.2);border-radius:5px;font-size:9px;font-weight:700;color:#C41E30;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.staff-id{font-size:10px;color:var(--text3);margin-bottom:10px;font-family:monospace;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.overlay.open{display:flex;}
.modal{background:var(--surface2);border:1px solid rgba(196,30,48,.15);border-radius:20px;padding:34px;width:90%;max-width:500px;box-shadow:0 30px 80px rgba(0,0,0,.6);max-height:90vh;overflow-y:auto;animation:modalIn .25s ease;}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-title{font-family:'Lora',serif;font-size:19px;font-weight:700;}
.modal-close{background:none;border:none;font-size:22px;color:var(--text3);cursor:pointer;transition:color .15s;line-height:1;}
.modal-close:hover{color:var(--text);}
.modal-desc{color:var(--text2);font-size:12px;margin-bottom:20px;}
.video-el{width:100%;height:290px;background:#000;border-radius:12px;margin-bottom:16px;object-fit:cover;}
.video-placeholder{width:100%;height:290px;background:var(--surface3);border-radius:12px;margin-bottom:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3);font-size:13px;}
.cam-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5;padding:13px;border-radius:10px;font-size:12px;margin-bottom:14px;text-align:center;}
.select-input{width:100%;padding:10px 13px;background:var(--surface3);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-size:12px;font-family:'Sora',sans-serif;margin-bottom:12px;}
.select-input:focus{outline:none;border-color:#C41E30;}
.date-input{padding:9px 13px;background:var(--surface);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-size:12px;font-family:'Sora',sans-serif;}
.date-input:focus{outline:none;border-color:#C41E30;}
.modal-actions{display:flex;gap:9px;margin-top:6px;}
.modal-actions .btn-primary,.modal-actions .btn-outline{flex:1;text-align:center;}
.textarea-input{width:100%;padding:10px 13px;background:var(--surface3);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-size:12px;font-family:'Sora',sans-serif;resize:vertical;min-height:75px;margin-bottom:12px;}
.textarea-input:focus{outline:none;border-color:#C41E30;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.settings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:18px;}
.settings-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:26px;}
.settings-card-title{font-family:'Lora',serif;font-size:15px;font-weight:600;margin-bottom:18px;color:#D4AF37;}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border);}
.setting-row:last-child{border-bottom:none;}
.setting-label{font-size:13px;font-weight:500;}
.setting-desc{font-size:11px;color:var(--text3);margin-top:2px;}
.toggle{position:relative;width:42px;height:23px;cursor:pointer;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--surface3);border-radius:23px;transition:.3s;}
.toggle-slider::before{content:'';position:absolute;width:17px;height:17px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
.toggle input:checked+.toggle-slider{background:#C41E30;}
.toggle input:checked+.toggle-slider::before{transform:translateX(19px);}
.info-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:12px;}
.info-row:last-child{border-bottom:none;}
.info-key{color:var(--text3);}
.info-val{color:var(--text);font-weight:600;}
.report-controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:22px;}
.report-controls label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.report-controls input[type=date]{padding:8px 13px;background:var(--surface);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-size:12px;font-family:'Sora',sans-serif;}
.report-controls input[type=date]:focus{outline:none;border-color:#C41E30;}
.notif{position:fixed;top:22px;right:22px;z-index:9999;background:var(--surface2);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:13px 18px;font-size:12px;font-weight:600;color:#6ee7b7;box-shadow:0 10px 30px rgba(0,0,0,.4);animation:notifIn .3s ease;display:flex;align-items:center;gap:8px;}
.notif.error{border-color:rgba(239,68,68,.3);color:#fca5a5;}
@keyframes notifIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.empty-state{text-align:center;padding:55px 20px;color:var(--text3);}
.empty-icon{font-size:44px;margin-bottom:14px;}
.empty-text{font-size:14px;font-weight:500;margin-bottom:5px;color:var(--text2);}
.empty-sub{font-size:12px;}
@media(max-width:1024px){.charts-grid{grid-template-columns:1fr;}}
@media(max-width:768px){.shell{flex-direction:column;}.sidebar{width:100%;height:auto;flex-direction:row;padding:10px 14px;border-right:none;border-bottom:1px solid var(--border);}.brand{margin-bottom:0;padding-bottom:0;border-bottom:none;}.nav-group,.sidebar-footer{display:none;}.content{padding:18px;}.stats-grid{grid-template-columns:repeat(2,1fr);}.login-left{display:none;}.form-row{grid-template-columns:1fr;}}
@media print{.sidebar,.topbar{display:none!important;}.main{overflow:visible;}.content{overflow:visible;padding:0;}}
</style>

function diffDays(a,b){return Math.max(1,Math.round((new Date(b)-new Date(a))/(1000*60*60*24))+1);}

function Login({onSuccess,supabaseClient,authWarning}){
  const [email,setEmail]=useState("admin@umeed.pk");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  const buildAuthGuidance=(error)=>{
    const msg=(error?.message||"Login failed").toLowerCase();
    if(msg.includes("invalid login credentials"))return `Invalid login credentials.\n1) Create this user in Supabase Auth > Users (email + password).\n2) Confirm email if email confirmation is enabled.\n3) Retry with the exact password set in Supabase.`;
    if(msg.includes("email not confirmed"))return "Your email is not confirmed. Open Supabase Dashboard → Authentication → Users and confirm this user, or disable email confirmation for internal admin accounts.";
    if(msg.includes("network")||msg.includes("fetch"))return "Unable to reach Supabase. Check internet connection and verify SUPABASE_URL / key configuration.";
    return `Login failed: ${error?.message||"Unknown error"}`;
  };

  const submit=async e=>{
    e.preventDefault();
    setErr("");
    if(!email||!pass){setErr("Email and password are required.");return;}
    if(!supabaseClient){setErr("Supabase client is not initialized. Please verify URL/key and refresh the app.");return;}
    setLoading(true);
    try{
      const {data,error}=await supabaseClient.auth.signInWithPassword({
        email:email.trim(),
        password:pass
      });
      if(error)throw error;
      if(!data?.user)throw new Error("Authentication succeeded but user session was not returned.");
      onSuccess(data.user);
    }catch(error){
      console.error("Supabase sign-in error:",error);
      setErr(buildAuthGuidance(error));
    }finally{
      setLoading(false);
    }
  };

  return(
    <div className="login-wrap">
      <div className="login-left">
        <div className="login-logo"><img src={LOGO} alt="UMEED"/></div>
        <div className="login-brand">UMEED</div>
        <div className="login-tagline">EDUCATION SYSTEM</div>
      </div>
      <div className="login-right">
        <div className="login-box">
          <div className="form-title">Supabase Login</div>
          <div className="form-desc">Sign in with your official account</div>
          {err&&<div className="error-box">{err}</div>}
          <form onSubmit={submit}>
            <div className="form-group">
              <label className="form-label">Email Address</label>
              <input className="form-input" type="email" value={email} onChange={e=>setEmail(e.target.value)} disabled={loading} autoComplete="email"/>
            </div>
            <div className="form-group">
              <label className="form-label">Password</label>
              <input className="form-input" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Enter password" disabled={loading} autoComplete="current-password"/>
            </div>
            <button className="btn-login" type="submit" disabled={loading}>{loading?"Signing in…":"Sign In"}</button>
          </form>
          <div className="login-help">
            <strong>If login fails:</strong><br/>
            • Open Supabase Dashboard → Authentication → Users<br/>
            • Create/verify <strong>admin@umeed.pk</strong> with a known password<br/>
            • Then run <strong>supabase_setup.sql</strong> and set this user role to <strong>admin</strong> in <strong>profiles</strong>
          </div>
          {authWarning&&<div className="auth-status">⚠ {authWarning}</div>}
        </div>
      </div>
    </div>
  );
}

function CameraModal({open,onClose,onCapture,preselectedStaff}){
  const videoRef=useRef(null);
  const streamRef=useRef(null);
  const [ready,setReady]=useState(false);
  const [camErr,setCamErr]=useState("");
  const [status,setStatus]=useState("Present");
  const [staffSel,setStaffSel]=useState(preselectedStaff?preselectedStaff.id:STAFF[0].id);

  useEffect(()=>{setStaffSel(preselectedStaff?preselectedStaff.id:STAFF[0].id);},[preselectedStaff]);

  const stopStream=()=>{
    if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}
  };

  useEffect(()=>{
    if(!open){stopStream();setReady(false);setCamErr("");return;}
    setCamErr("");setReady(false);
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
      setCamErr("Camera API not available. Please use HTTPS or localhost.");return;
    }
    navigator.mediaDevices.getUserMedia({video:{facingMode:"user"},audio:false})
      .then(stream=>{
        streamRef.current=stream;
        if(videoRef.current){
          videoRef.current.srcObject=stream;
          videoRef.current.onloadedmetadata=()=>{videoRef.current.play();setReady(true);};
        }
      })
      .catch(err=>{
        if(err.name==="NotAllowedError")setCamErr("Camera permission denied. Allow camera access in browser settings.");
        else if(err.name==="NotFoundError")setCamErr("No camera found on this device.");
        else if(err.name==="NotReadableError")setCamErr("Camera is in use by another application.");
        else setCamErr("Camera error: "+err.message);
      });
    return stopStream;
  },[open]);

  const capture=()=>{
    const staff=STAFF.find(s=>s.id===staffSel)||STAFF[0];
    onCapture(staff,status);
    onClose();
  };

  return(
    <div className={"overlay"+(open?" open":"")} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div className="modal-hdr">
          <div className="modal-title">📷 Camera Attendance</div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-desc">Position yourself in front of the camera, select staff & status, then click Mark.</div>
        {camErr?(
          <div className="cam-error">{camErr}<br/><small style={{opacity:.7}}>Note: Camera requires HTTPS or localhost</small></div>
        ):(
          <>
            <video ref={videoRef} className="video-el" autoPlay playsInline muted style={{display:ready?"block":"none"}}/>
            {!ready&&<div className="video-placeholder"><span style={{fontSize:34}}>📷</span><span>Starting camera…</span></div>}
          </>
        )}
        <select className="select-input" value={staffSel} onChange={e=>setStaffSel(e.target.value)}>
          {STAFF.map(s=><option key={s.id} value={s.id}>{s.name} ({s.id})</option>)}
        </select>
        <select className="select-input" value={status} onChange={e=>setStatus(e.target.value)}>
          <option>Present</option><option>Late</option><option>Absent</option>
        </select>
        <div className="modal-actions">
          <button className="btn-primary" onClick={capture}>✓ Mark {status}</button>
          <button className="btn-outline" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

function DonutChart({present,absent,late}){
  const ref=useRef(null);const chart=useRef(null);
  useEffect(()=>{
    if(!ref.current||!window.Chart)return;
    if(chart.current)chart.current.destroy();
    chart.current=new window.Chart(ref.current.getContext("2d"),{
      type:"doughnut",
      data:{labels:["Present","Absent","Late"],datasets:[{data:[present,absent,late],backgroundColor:["#10B981","#EF4444","#F59E0B"],borderColor:["#059669","#DC2626","#D97706"],borderWidth:2,hoverOffset:8}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:"68%",plugins:{legend:{position:"bottom",labels:{color:"#A0A0B0",padding:14,font:{size:11,weight:"600"}}},tooltip:{callbacks:{label:ctx=>" "+ctx.label+": "+ctx.raw}}}}
    });
    return()=>{if(chart.current)chart.current.destroy();};
  },[present,absent,late]);
  return <canvas ref={ref}/>;
}

function LineChart(){
  const ref=useRef(null);const chart=useRef(null);
  useEffect(()=>{
    if(!ref.current||!window.Chart)return;
    if(chart.current)chart.current.destroy();
    const ctx=ref.current.getContext("2d");
    const grad=ctx.createLinearGradient(0,0,0,250);
    grad.addColorStop(0,"rgba(16,185,129,0.22)");grad.addColorStop(1,"rgba(16,185,129,0)");
    chart.current=new window.Chart(ctx,{
      type:"line",
      data:{labels:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],datasets:[{label:"Present",data:[35,34,33,32,36,35,34,33,35,34,36,35],borderColor:"#10B981",backgroundColor:grad,borderWidth:2.5,pointRadius:4,pointBackgroundColor:"#10B981",tension:0.4,fill:true}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#A0A0B0",font:{size:11,weight:"600"}}}},scales:{y:{beginAtZero:false,min:28,grid:{color:"rgba(255,255,255,0.04)"},ticks:{color:"#606070",font:{size:10}}},x:{grid:{display:false},ticks:{color:"#606070",font:{size:10}}}}}
    });
    return()=>{if(chart.current)chart.current.destroy();};
  },[]);
  return <canvas ref={ref}/>;
}

                          <button className="btn-success" onClick={()=>approve(l.id)}>Approve</button>
                          <button className="btn-danger" onClick={()=>reject(l.id)}>Reject</button>
                        </div>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      </div>
      <LeaveModal open={modalOpen} onClose={()=>setModalOpen(false)} onSubmit={addLeave}/>
    </>
  );
}

function App(){
  const [splash,setSplash]=useState(true);
  const [authLoading,setAuthLoading]=useState(true);
  const [authWarning,setAuthWarning]=useState("");
  const [user,setUser]=useState(null);
  const [page,setPage]=useState("dashboard");
  const [attendance,setAttendance]=useState(INIT_ATTENDANCE);
  const [leaves,setLeaves]=useState(INIT_LEAVES);
  const [camOpen,setCamOpen]=useState(false);
  const [camStaff,setCamStaff]=useState(null);
  const [lightMode,setLightMode]=useState(false);
  const [notif,setNotif]=useState(null);

  useEffect(()=>{
    document.body.classList.toggle("light-mode",lightMode);
  },[lightMode]);

  const normalizeUser=(authUser,profile)=>({
    id:authUser.id,
    email:authUser.email,
    name:profile?.full_name||authUser.user_metadata?.full_name||authUser.email||"Staff User",
    role:(profile?.role||"staff").toLowerCase()==="admin"?"Administrator – Admin":"Staff Member",
    department:profile?.department||"General"
  });

  const loadUserProfile=async(authUser)=>{
    if(!supabaseClient){
      setUser(normalizeUser(authUser,null));
      return;
    }
    try{
      const {data,error}=await supabaseClient
        .from("profiles")
        .select("id,full_name,role,department")
        .eq("id",authUser.id)
        .maybeSingle();
      if(error)throw error;
      setUser(normalizeUser(authUser,data||null));
    }catch(error){
      console.error("Profile load error:",error);
      setUser(normalizeUser(authUser,null));
      setAuthWarning("Profile table not configured yet. Run supabase_setup.sql for full role-based access.");
    }
  };

  useEffect(()=>{
    let mounted=true;
    if(!supabaseClient){
      setAuthWarning("Supabase client is unavailable. Verify script loading, URL, and anon key.");
      setAuthLoading(false);
      return;
    }

    (async()=>{
      try{
        const {data,error}=await supabaseClient.auth.getSession();
        if(error)throw error;
        if(!mounted)return;
        if(data?.session?.user)await loadUserProfile(data.session.user);
      }catch(error){
        console.error("Session restore error:",error);
        if(mounted)setAuthWarning(`Session check failed: ${error.message}`);
      }finally{
        if(mounted)setAuthLoading(false);
      }
    })();

    const {data:listener}=supabaseClient.auth.onAuthStateChange(async(_event,session)=>{
      if(!mounted)return;
      if(session?.user){
        await loadUserProfile(session.user);
      }else{
        setUser(null);
      }
    });

    return()=>{
      mounted=false;
      listener?.subscription?.unsubscribe?.();
    };
  },[]);

  const notify=(msg,type="success")=>{setNotif({msg,type,key:Date.now()});};

  const openCameraForStaff=(staff)=>{setCamStaff(staff);setCamOpen(true);setPage("attendance");};

  const handleCapture=(staff,status)=>{
    const rec={id:Date.now(),staffId:staff.id,name:staff.name,time:nowTime(),status,date:TODAY};
    setAttendance(prev=>[rec,...prev]);
    notify("Attendance marked for "+staff.name);
    setCamStaff(null);
  };

  const handleLogout=async()=>{
    try{
      if(supabaseClient)await supabaseClient.auth.signOut();
    }catch(error){
      console.error("Logout error:",error);
    }finally{
      setUser(null);
    }
  };

  if(splash)return <Splash onDone={()=>setSplash(false)}/>;
  if(authLoading)return <div className="splash"><div className="splash-title" style={{fontSize:28}}>Checking session…</div><div className="splash-sub">SUPABASE AUTH</div></div>;
  if(!user)return <Login onSuccess={loadUserProfile} supabaseClient={supabaseClient} authWarning={authWarning}/>;

  const NAV=[
    {id:"dashboard",icon:"🏠",label:"Dashboard",group:"Core"},
    {id:"staff",icon:"👥",label:"Staff Directory",group:"Core"},
    {id:"attendance",icon:"📋",label:"Attendance",group:"Core"},
    {id:"leave",icon:"📅",label:"Leave Management",group:"Admin"},
    {id:"reports",icon:"📊",label:"Reports",group:"Admin"},
    {id:"devices",icon:"💻",label:"Device Logs",group:"Admin"},
    {id:"settings",icon:"⚙️",label:"Settings",group:"Admin"},
  ];
  const groups=["Core","Admin"];

  return(
    <div className="shell">
      {notif&&<Notif key={notif.key} msg={notif.msg} type={notif.type} onDone={()=>setNotif(null)}/>}
      <div className="sidebar">
        <div className="brand">
          <div className="brand-logo"><img src={LOGO} alt="UMEED"/></div>
          <div><div className="brand-name">UMEED</div><div className="brand-ver">Education System v4.0</div></div>
        </div>
        {groups.map(g=>(
          <div className="nav-group" key={g}>
            <span className="nav-group-label">{g}</span>
            {NAV.filter(n=>n.group===g).map(n=>(
              <button key={n.id} className={"nav-btn"+(page===n.id?" active":"")} onClick={()=>setPage(n.id)}>
                <span className="nav-icon">{n.icon}</span>{n.label}
              </button>
            ))}
          </div>
        ))}
        <div className="sidebar-footer">
          <div className="user-card">
            <div className="user-avatar">{initials(user.name)}</div>
            <div className="user-name">{user.name}</div>
            <div className="user-role">{user.role}</div>
          </div>
          <button className="btn-logout" onClick={handleLogout}>Logout</button>
        </div>
      </div>
      <div className="main">
        <div className="topbar">
          <div className="topbar-title">Umeed Education System</div>
          <div className="topbar-right">
            <button className="btn-icon" onClick={()=>setLightMode(m=>!m)}>{lightMode?"🌙 Dark":"☀️ Light"}</button>
            <button className="btn-icon" onClick={()=>window.print()}>🖨 Print</button>
            <button className="btn-icon" onClick={()=>setPage("settings")}>⚙️ Settings</button>
          </div>
        </div>
        <div className="content">
          {page==="dashboard"&&<Dashboard attendance={attendance} onOpenCamera={()=>setCamOpen(true)}/>}
          {page==="staff"&&<StaffDirectory onAddAttendance={openCameraForStaff}/>}
          {page==="attendance"&&<AttendanceScreen attendance={attendance} setAttendance={setAttendance} notify={notify}/>}
          {page==="leave"&&<LeaveScreen leaves={leaves} setLeaves={setLeaves} notify={notify}/>}
          {page==="reports"&&<ReportsScreen/>}
          {page==="devices"&&<DeviceLogsScreen/>}
          {page==="settings"&&<SettingsScreen lightMode={lightMode} setLightMode={setLightMode}/>}
        </div>
      </div>
      <CameraModal open={camOpen} onClose={()=>{setCamOpen(false);setCamStaff(null);}} onCapture={handleCapture} preselectedStaff={camStaff}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
