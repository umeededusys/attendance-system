<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UMEED Education System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
  <style>
    :root{
      --bg:#08070d;
      --surface:#120f18;
      --surface-2:#17131f;
      --surface-3:#1f1a2a;
      --border:rgba(255,255,255,.10);
      --muted:#948fa1;
      --text:#f6f4fb;
      --maroon:#C41E30;
      --maroon-dark:#8c1322;
      --gold:#D4AF37;
      --green:#25cf7a;
      --red:#ff6868;
      --amber:#f4ba3d;
      --shadow:0 25px 80px rgba(0,0,0,.45);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%}
    body{
      font-family:Inter,system-ui,sans-serif;
      color:var(--text);
      background:radial-gradient(1200px 500px at 20% -30%,rgba(196,30,48,.22),transparent 70%),var(--bg);
      overflow:hidden;
    }
    .app-shell{height:100%;display:flex;background:linear-gradient(120deg,#0a0610,#0c0814 45%,#0b0610)}
    .splash{height:100%;display:grid;place-items:center}
    .splash-inner{text-align:center;display:flex;flex-direction:column;align-items:center;gap:18px}
    .logo-scene{perspective:1200px;width:170px;height:170px;position:relative}
    .logo-flip{width:100%;height:100%;position:relative;transform-style:preserve-3d;animation:coinFlip 5s linear infinite;filter:drop-shadow(0 25px 50px rgba(196,30,48,.4))}
    .logo-flip img{width:100%;height:100%;object-fit:contain;backface-visibility:hidden;transform-style:preserve-3d}
    .logo-flip::before{content:"";position:absolute;inset:-12px;border-radius:50%;background:radial-gradient(circle,rgba(212,175,55,.45),transparent 70%);filter:blur(8px);z-index:-1;animation:halo 2.8s ease-in-out infinite}
    .logo-flip::after{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 30%,rgba(255,245,200,.75) 50%,transparent 70%);transform:translateX(-120%) skewX(-16deg);animation:shine 2.2s ease-in-out infinite;border-radius:22px}
    @keyframes coinFlip{0%{transform:rotateY(0deg)}100%{transform:rotateY(360deg)}}
    @keyframes halo{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
    @keyframes shine{0%{transform:translateX(-120%) skewX(-16deg)}60%,100%{transform:translateX(140%) skewX(-16deg)}}
    .splash-title{font:700 48px "Playfair Display",serif;letter-spacing:.5px}
    .splash-sub{font-size:12px;color:var(--gold);letter-spacing:3px;text-transform:uppercase}

    .login-layout{height:100%;display:grid;grid-template-columns:56% 44%}
    .login-left{position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .left-bg{position:absolute;inset:0;background:radial-gradient(circle at 50% 45%,rgba(196,30,48,.38),rgba(20,8,16,.95) 55%,#07050b 100%)}
    .left-content{position:relative;text-align:center;z-index:2}
    .left-cards{position:absolute;inset:0;pointer-events:none}
    .float-card{position:absolute;background:rgba(196,30,48,.2);border:1px solid rgba(196,30,48,.35);border-radius:20px;padding:18px;color:#f2d35f;box-shadow:var(--shadow)}
    .f1{top:20%;left:6%}.f2{top:36%;right:7%}
    .brand-logo{width:240px;max-width:56vw;filter:drop-shadow(0 25px 55px rgba(212,175,55,.28))}
    .brand-title{font:700 72px "Playfair Display",serif;line-height:.94;margin-top:22px}
    .brand-title .gold{color:var(--gold)}
    .brand-foot{margin-top:28px;color:#9f95a8;font-weight:700;letter-spacing:1px;font-size:34px;opacity:.65}

    .login-right{display:flex;align-items:center;justify-content:center;padding:34px}
    .login-card{width:min(560px,100%);background:linear-gradient(140deg,rgba(32,26,41,.96),rgba(20,16,29,.96));border:1px solid rgba(255,255,255,.11);border-radius:34px;padding:34px 34px 30px;box-shadow:var(--shadow);backdrop-filter:blur(10px)}
    .login-head h2{font:700 50px "Playfair Display",serif;margin-bottom:10px}
    .login-brand-mini{display:flex;align-items:center;gap:12px;margin-bottom:20px}
    .login-brand-mini img{width:60px}
    .login-brand-mini strong{font-size:33px}
    .muted{color:var(--muted)}
    .role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:16px 0 14px}
    .role-card{border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:16px 12px;background:rgba(255,255,255,.02);cursor:pointer;transition:.2s}
    .role-card.active{border-color:var(--maroon);box-shadow:0 0 0 2px rgba(196,30,48,.22) inset;background:rgba(196,30,48,.12)}
    .role-icon{width:42px;height:42px;border-radius:999px;display:grid;place-items:center;background:rgba(212,175,55,.16);margin:0 auto 12px;font-size:18px}
    .role-title{font-weight:700;text-align:center}
    .role-sub{font-size:12px;color:var(--muted);text-align:center;margin-top:4px}
    .cred{margin:12px 0 14px;border:1px dashed rgba(255,255,255,.14);background:rgba(255,255,255,.02);color:#d6d3de;border-radius:14px;padding:12px 14px;font-weight:600}
    .error{background:rgba(196,30,48,.18);border:1px solid rgba(255,104,104,.38);padding:10px 12px;border-radius:12px;margin-bottom:12px;color:#ffb4b4}
    .field{margin-top:10px}
    .field label{display:block;font-size:13px;letter-spacing:1.6px;font-weight:700;color:#afa8bd;margin-bottom:8px}
    .input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.16);border-radius:14px;padding:16px 14px;font-size:22px;color:#fff;outline:none}
    .input:focus{border-color:rgba(196,30,48,.7);box-shadow:0 0 0 3px rgba(196,30,48,.18)}
    .btn-sign{margin-top:18px;width:100%;border:none;border-radius:16px;padding:16px;background:linear-gradient(135deg,var(--maroon),#db1734);color:#fff;font-size:32px;font-weight:800;letter-spacing:2px;cursor:pointer}
    .btn-sign:disabled{opacity:.65;cursor:not-allowed}

    .sidebar{width:292px;border-right:1px solid rgba(255,255,255,.08);padding:14px 14px 16px;background:linear-gradient(180deg,rgba(48,9,22,.28),rgba(14,10,20,.96));display:flex;flex-direction:column}
    .logo-block{display:flex;align-items:center;gap:10px;padding:6px 6px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
    .logo-block img{width:42px}
    .logo-lines strong{display:block;font-size:33px}
    .logo-lines span{font-size:12px;letter-spacing:1.4px;color:var(--gold)}
    .menu-group{margin-top:16px}
    .menu-tag{font-size:12px;letter-spacing:2px;color:#7f748e;font-weight:700;margin:0 8px 10px}
    .menu-btn{width:100%;background:transparent;border:1px solid transparent;color:#b6afc2;border-radius:12px;padding:12px 12px;margin-bottom:7px;text-align:left;font-size:25px;font-weight:600;display:flex;align-items:center;gap:10px;cursor:pointer}
    .menu-btn.active{background:linear-gradient(135deg,rgba(196,30,48,.34),rgba(120,16,28,.22));border-color:rgba(196,30,48,.56);color:#fff}
    .menu-btn .ic{width:20px;text-align:center;font-size:18px;opacity:.9}
    .profile-panel{margin-top:auto;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:10px;display:flex;align-items:center;gap:10px}
    .av{width:42px;height:42px;border-radius:999px;background:linear-gradient(135deg,#ffcc33,var(--maroon));display:grid;place-items:center;font-weight:800}
    .logout{margin-top:10px;border:1px solid rgba(196,30,48,.5);background:rgba(196,30,48,.18);color:#ff99a3;padding:11px;border-radius:12px;width:100%;font-weight:700;cursor:pointer}

    .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .top{height:70px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(10,8,16,.6)}
    .search{width:420px;max-width:55%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);padding:10px 14px;border-radius:12px;color:#fff;font-size:16px}
    .top-right{display:flex;align-items:center;gap:10px}
    .icon-btn{width:40px;height:40px;border-radius:10px;border:1px solid rgba(255,255,255,.16);display:grid;place-items:center;background:rgba(255,255,255,.03);color:#fff;cursor:pointer}
    .who{display:flex;align-items:center;gap:10px;padding-left:8px}
    .who .badge{background:rgba(196,30,48,.25);border:1px solid rgba(196,30,48,.45);padding:3px 10px;border-radius:999px;color:#ffafba;font-size:11px;letter-spacing:1px;font-weight:700}

    .content{flex:1;overflow:auto;padding:18px}
    .page-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
    .page-head h1{font:700 56px "Playfair Display",serif;line-height:1}
    .page-head p{color:var(--muted);margin-top:4px;font-size:15px}

    .greet{background:linear-gradient(120deg,rgba(84,8,27,.78),rgba(47,10,27,.66));border:1px solid rgba(196,30,48,.46);border-radius:22px;padding:18px 20px;display:grid;grid-template-columns:1fr auto;gap:12px;margin-bottom:14px}
    .greet h3{font:700 38px "Playfair Display",serif}
    .actions{display:flex;gap:10px;margin-top:12px}
    .btn-gold,.btn-maroon,.btn-dark{border:none;border-radius:12px;padding:10px 18px;font-weight:800;cursor:pointer}
    .btn-gold{background:linear-gradient(130deg,#e7c34a,var(--gold));color:#221900}
    .btn-maroon{background:linear-gradient(130deg,#d8253e,var(--maroon));color:white}
    .sum-row{display:flex;gap:16px;justify-content:flex-end;align-items:flex-start}
    .sum-item{text-align:right}
    .sum-item strong{display:block;color:var(--gold);font-size:26px}
    .sum-item span{font-size:12px;color:#bcb2cb}

    .stats4{display:grid;grid-template-columns:repeat(4,minmax(170px,1fr));gap:14px;margin:12px 0}
    .stat{background:linear-gradient(145deg,rgba(28,22,36,.92),rgba(18,14,26,.92));border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:16px}
    .stat .v{font:700 46px "Playfair Display",serif;margin-top:10px}
    .stat .l{color:#a89fb8;margin-top:4px}
    .trend{font-size:13px;margin-top:7px;font-weight:700}
    .up{color:var(--green)} .down{color:#ff8b8b}

    .device{margin-top:14px;background:linear-gradient(140deg,rgba(24,20,31,.98),rgba(16,13,23,.98));border:1px solid rgba(212,175,55,.35);border-radius:22px;padding:16px}
    .device-head{display:flex;justify-content:space-between;align-items:center}
    .status-ok{color:var(--green);font-weight:700}
    .device-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}
    .d-kpi{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px}
    .logs{border-top:1px solid rgba(255,255,255,.07);padding-top:12px;max-height:210px;overflow:auto}
    .log-row{display:grid;grid-template-columns:1fr auto;gap:10px;padding:8px 4px;border-bottom:1px solid rgba(255,255,255,.06)}
    .log-row:last-child{border-bottom:none}

    .r-controls{display:flex;gap:10px;align-items:center}
    .seg{display:flex;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:12px;overflow:hidden}
    .seg button{border:none;background:transparent;color:#b1a9bf;padding:9px 16px;font-weight:700;cursor:pointer}
    .seg button.active{background:linear-gradient(130deg,#d82741,var(--maroon));color:white}
    .report-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:14px 0}
    .report-card{background:linear-gradient(145deg,rgba(28,22,36,.95),rgba(16,13,23,.95));border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:16px}
    .chart-card{background:linear-gradient(145deg,rgba(23,18,30,.95),rgba(14,11,21,.95));border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:18px;margin-bottom:14px}
    .chart-wrap{height:280px}
    .split{display:grid;grid-template-columns:1fr 1fr;gap:14px}

    .staff-toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
    .staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
    .staff-card{background:linear-gradient(145deg,rgba(28,22,36,.95),rgba(16,13,23,.95));border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px}
    .staff-card h4{font-size:20px;margin-bottom:4px}
    .staff-meta{display:grid;gap:6px;font-size:13px;color:#cfc7dc;margin:10px 0}
    .pill{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700;border:1px solid}
    .pill.active{color:#7df3b4;border-color:rgba(37,207,122,.55);background:rgba(37,207,122,.12)}
    .pill.inactive{color:#ffb7b7;border-color:rgba(255,104,104,.6);background:rgba(255,104,104,.12)}
    .staff-actions{display:flex;gap:8px;margin-top:10px}
    .btn-ghost{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);color:#ddd5ea;border-radius:10px;padding:8px 12px;font-weight:700;cursor:pointer}
    .btn-danger{border:1px solid rgba(255,104,104,.45);background:rgba(196,30,48,.2);color:#ffb2b2;border-radius:10px;padding:8px 12px;font-weight:700;cursor:pointer}

    .modal-backdrop{position:fixed;inset:0;background:rgba(5,4,9,.72);display:grid;place-items:center;z-index:50;padding:18px}
    .modal-card{width:min(900px,100%);max-height:92vh;overflow:auto;background:linear-gradient(145deg,rgba(25,20,34,.98),rgba(16,12,23,.98));border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:18px;box-shadow:var(--shadow)}
    .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .modal-grid{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:12px}
    .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px}
    .field-error{color:#ff9ea8;font-size:12px;margin-top:4px}
    .req{color:#ff6f7f;margin-left:3px}
    .input.invalid,.mini-input.invalid{border-color:rgba(255,104,104,.7);box-shadow:0 0 0 2px rgba(255,104,104,.12)}

    .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:999px;display:inline-block;animation:spin .8s linear infinite;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}

    .btn-loading{display:inline-flex;align-items:center;gap:8px;justify-content:center}
    .modal-overlay-loader{position:absolute;inset:0;display:grid;place-items:center;background:rgba(9,7,14,.5);backdrop-filter:blur(2px);border-radius:20px;z-index:3}
    .modal-card.has-overlay{position:relative}

    .skeleton{position:relative;overflow:hidden;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px}
    .skeleton::after{content:"";position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);animation:sheen 1.2s infinite}
    @keyframes sheen{100%{transform:translateX(100%)}}
    .skeleton-row{height:14px;margin-bottom:8px}
    .skeleton-row:last-child{margin-bottom:0}

    .toast-wrap{position:fixed;top:16px;right:16px;display:grid;gap:8px;z-index:70}
    .toast{min-width:260px;max-width:360px;border-radius:12px;padding:12px 14px;font-weight:600;border:1px solid}
    .toast.success{background:rgba(37,207,122,.16);border-color:rgba(37,207,122,.5);color:#a9f5cd}
    .toast.error{background:rgba(255,104,104,.16);border-color:rgba(255,104,104,.5);color:#ffbebe}
    .toast.warning{background:rgba(244,186,61,.16);border-color:rgba(244,186,61,.5);color:#f5d898}

    .attendance-shell{display:grid;gap:14px}
    .attendance-toolbar{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap}
    .attendance-filters{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
    .mini-field{display:grid;gap:6px}
    .mini-field label{font-size:11px;letter-spacing:1.4px;color:#a99fbc;font-weight:700}
    .mini-input{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.14);color:#fff;border-radius:10px;padding:10px 12px}
    .attendance-table-wrap{background:linear-gradient(145deg,rgba(24,19,32,.95),rgba(14,11,22,.95));border:1px solid rgba(255,255,255,.11);border-radius:16px;overflow:auto}
    .attendance-table{width:100%;border-collapse:collapse;min-width:920px}
    .attendance-table th,.attendance-table td{padding:12px 10px;border-bottom:1px solid rgba(255,255,255,.07);font-size:13px;vertical-align:middle}
    .attendance-table th{text-align:left;color:#b6aec6;font-size:12px;letter-spacing:1px;text-transform:uppercase}
    .attendance-table tr:last-child td{border-bottom:none}
    .status-pill{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:700;border:1px solid rgba(255,255,255,.2)}
    .st-present{color:#7df3b4;background:rgba(37,207,122,.16);border-color:rgba(37,207,122,.5)}
    .st-absent{color:#ffb7b7;background:rgba(255,104,104,.14);border-color:rgba(255,104,104,.55)}
    .st-late{color:#ffd17f;background:rgba(244,186,61,.14);border-color:rgba(244,186,61,.55)}
    .st-leave{color:#9cc8ff;background:rgba(85,143,255,.14);border-color:rgba(85,143,255,.48)}
    .method-chip{display:inline-flex;padding:4px 8px;border-radius:999px;border:1px solid rgba(255,255,255,.2);font-size:11px;font-weight:700}
    .method-manual{color:#f7d676;background:rgba(212,175,55,.16);border-color:rgba(212,175,55,.5)}
    .method-fingerprint{color:#abf1c9;background:rgba(37,207,122,.12);border-color:rgba(37,207,122,.4)}
    .manual-toolbar{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin:10px 0 8px}
    .bulk-actions{display:flex;gap:8px;flex-wrap:wrap}
    .manual-grid{border:1px solid rgba(255,255,255,.12);border-radius:14px;overflow:auto;max-height:56vh}
    .manual-row{display:grid;grid-template-columns:220px 140px 160px 1fr 220px 220px 30px;gap:10px;align-items:center;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.06)}
    .manual-row.head{position:sticky;top:0;background:rgba(10,8,16,.95);z-index:2;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#b7adc8;font-weight:700}
    .manual-row:last-child{border-bottom:none}
    .status-group{display:flex;gap:6px;flex-wrap:wrap}
    .status-btn{border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.03);color:#d9d1e7;border-radius:999px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer}
    .status-btn.active{background:linear-gradient(130deg,#d8253e,var(--maroon));border-color:rgba(216,37,62,.7);color:#fff}
    .time-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .saved-check{color:#7df3b4;font-weight:800;font-size:18px;text-align:center}
    .manual-warning{font-size:11px;color:#ffbfbf;margin-top:4px}
    .progress-inline{display:flex;align-items:center;gap:8px;color:#e6dcb1;font-weight:700}
    .menu-badge{min-width:22px;height:22px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;background:rgba(212,175,55,.2);border:1px solid rgba(212,175,55,.55);color:#f5dc8f;font-size:11px;font-weight:800;padding:0 6px}
    .pending-banner{margin-top:10px;display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;background:rgba(212,175,55,.14);border:1px solid rgba(212,175,55,.4);color:#f1d47d;font-size:12px;font-weight:700}
    .leave-dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
    .mini-list{display:grid;gap:8px}
    .mini-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:10px;border:1px solid rgba(255,255,255,.08);border-radius:12px;background:rgba(255,255,255,.02)}

    .leave-shell{display:grid;gap:14px}
    .leave-toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .leave-tabs{display:flex;gap:8px;flex-wrap:wrap}
    .leave-tab{border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.03);color:#d4ccdf;border-radius:999px;padding:8px 13px;font-weight:700;cursor:pointer}
    .leave-tab.active{background:linear-gradient(130deg,#d8253e,var(--maroon));border-color:rgba(216,37,62,.72);color:#fff}

  content:"";
  position:absolute;
  inset:1px;
  border-radius:inherit;
  background:linear-gradient(120deg,transparent 0%,rgba(255,255,255,.10) 45%,transparent 58%);
  transform:translateX(-120%);
  animation:glassSweep 5.5s ease-in-out infinite;
  pointer-events:none;
  z-index:1;
}
.login-card > *{position:relative;z-index:2}
@keyframes loginFloat3D{
  0%,100%{transform:rotateX(0deg) rotateY(0deg) translateY(0)}
  50%{transform:rotateX(1.6deg) rotateY(-1.4deg) translateY(-8px)}
}
@keyframes glassSweep{
  0%{transform:translateX(-125%) skewX(-16deg);opacity:0}
  20%{opacity:.75}
  55%,100%{transform:translateX(130%) skewX(-16deg);opacity:0}
}
.login-head h2{
  text-shadow:0 12px 35px rgba(0,0,0,.45),0 0 18px rgba(212,175,55,.10);
}
.login-brand-mini img{
  filter:drop-shadow(0 18px 28px rgba(212,175,55,.22));
  transform:translateZ(26px);
}
.role-card{
  background:linear-gradient(145deg,rgba(255,255,255,.09),rgba(255,255,255,.025)) !important;
  border-color:rgba(255,255,255,.18) !important;
  box-shadow:0 18px 40px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.10);
  transform-style:preserve-3d;
}
.role-card:hover{
  transform:translateY(-7px) rotateX(4deg) rotateY(-4deg) scale(1.02);
  box-shadow:0 28px 65px rgba(0,0,0,.35),0 0 0 1px rgba(212,175,55,.16) inset;
}
.role-card.active{
  background:linear-gradient(145deg,rgba(196,30,48,.34),rgba(255,255,255,.06)) !important;
  box-shadow:0 26px 75px rgba(196,30,48,.23), inset 0 0 0 1px rgba(255,255,255,.10) !important;
}
.role-icon{
  box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 14px 28px rgba(0,0,0,.28);
  transform:translateZ(18px);
}
.input{
  background:rgba(255,255,255,.085) !important;
  border:1px solid rgba(255,255,255,.22) !important;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.10),0 14px 34px rgba(0,0,0,.18);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
}
.input:focus{
  border-color:rgba(212,175,55,.65) !important;
  box-shadow:0 0 0 4px rgba(212,175,55,.12),0 18px 45px rgba(0,0,0,.25) !important;
}
.btn-sign{
  box-shadow:0 18px 45px rgba(196,30,48,.38), inset 0 1px 0 rgba(255,255,255,.18);
  transform:translateZ(22px);
}
.btn-sign:hover{
  transform:translateY(-3px) translateZ(22px) scale(1.01);
}
body.light-mode .login-card{
  background:linear-gradient(145deg,rgba(255,255,255,.72),rgba(255,255,255,.42)) !important;
  border-color:rgba(120,70,70,.18) !important;
}
body.light-mode .role-card{background:rgba(255,255,255,.55) !important}



    /* Final premium login refinements: campus image + professional brand header */
    .school-building-showcase{width:min(720px,88%);max-width:760px;display:flex;flex-direction:column;align-items:center;gap:18px;animation:campusFloat 7s ease-in-out infinite;}
    .building-frame{position:relative;width:min(620px,78vw);aspect-ratio:16/9;border-radius:32px;overflow:hidden;border:1px solid rgba(255,255,255,.18);box-shadow:0 34px 95px rgba(0,0,0,.62),0 0 0 1px rgba(212,175,55,.18) inset,0 0 70px rgba(196,30,48,.26);transform:perspective(1200px) rotateX(3deg) rotateY(-4deg);transition:transform .55s ease,box-shadow .55s ease;isolation:isolate;background:#160b12;}
    .building-frame:hover{transform:perspective(1200px) rotateX(0deg) rotateY(0deg) scale(1.015);box-shadow:0 42px 120px rgba(0,0,0,.72),0 0 0 1px rgba(212,175,55,.32) inset,0 0 90px rgba(196,30,48,.35);}
    .building-image{width:100%;height:100%;object-fit:cover;filter:saturate(1.08) contrast(1.08) brightness(.9);transform:scale(1.04);}
    .building-frame::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,3,8,.03),rgba(8,4,10,.28) 62%,rgba(8,3,8,.62));z-index:1;}
    .building-shine{position:absolute;inset:-45% auto auto -25%;width:36%;height:190%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.24),transparent);transform:rotate(24deg);animation:buildingShine 5.6s ease-in-out infinite;z-index:2;}
    .building-badge{position:absolute;left:18px;bottom:18px;z-index:3;display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:18px;background:rgba(16,9,18,.66);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(14px);box-shadow:0 18px 45px rgba(0,0,0,.35);font-weight:800;color:#f7e7a1;letter-spacing:.4px;}
    .building-badge img{width:42px;height:42px;object-fit:contain;filter:drop-shadow(0 8px 18px rgba(0,0,0,.45));}
    .campus-title{font-size:clamp(52px,5.7vw,82px);line-height:.92;margin-top:0;text-shadow:0 20px 48px rgba(0,0,0,.58);}
    .premium-login-head{margin-bottom:20px;}
    .premium-login-head h2{display:none!important;}
    .login-brand-premium{display:flex;align-items:center;gap:16px;padding:14px 16px;border-radius:24px;background:linear-gradient(135deg,rgba(255,255,255,.10),rgba(255,255,255,.035));border:1px solid rgba(255,255,255,.16);box-shadow:0 22px 55px rgba(0,0,0,.30),0 0 0 1px rgba(212,175,55,.10) inset;backdrop-filter:blur(16px);}
    .login-brand-premium strong{display:block;font-size:clamp(26px,2.5vw,38px);line-height:1.05;letter-spacing:-.8px;color:#fff;}
    .login-logo-orb{width:74px;height:74px;min-width:74px;border-radius:22px;display:grid;place-items:center;background:radial-gradient(circle at 35% 25%,rgba(255,255,255,.20),rgba(212,175,55,.16) 35%,rgba(196,30,48,.18) 76%);border:1px solid rgba(255,255,255,.20);box-shadow:0 18px 42px rgba(0,0,0,.36),0 0 35px rgba(212,175,55,.13);}
    .login-logo-orb img{width:58px;height:58px;object-fit:contain;filter:drop-shadow(0 10px 20px rgba(0,0,0,.40));}
    @keyframes buildingShine{0%,38%{left:-35%;opacity:0}50%{opacity:.85}76%,100%{left:130%;opacity:0}}
    @keyframes campusFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @media (max-width:1200px){.building-frame{width:min(560px,82vw)}.school-building-showcase{width:92%}}
    @media (max-width:768px){.premium-login-head{margin-bottom:16px}.login-brand-premium{gap:12px;padding:12px;border-radius:20px}.login-logo-orb{width:60px;height:60px;min-width:60px;border-radius:18px}.login-logo-orb img{width:48px;height:48px}.login-brand-premium strong{font-size:26px}.building-frame{border-radius:24px}.campus-title{font-size:46px}.building-badge{left:12px;bottom:12px;padding:8px 10px}.building-badge img{width:34px;height:34px}}

}

function Login({onAuth}){
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [role,setRole]=useState("admin");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");

  const roles=[
    {id:"admin",title:"Admin",sub:"Full access",icon:"🏦"},
    {id:"teacher",title:"Teacher",sub:"Own records",icon:"📊"},
    {id:"support",title:"Support",sub:"Own records",icon:"🔧"},
  ];

  const signIn=async(e)=>{
    e.preventDefault();
    setErr("");
    if(!supabase){setErr("Supabase SDK failed to initialize.");return;}
    setLoading(true);
    try{
      const cleanEmail=String(email||"").trim().toLowerCase();
      const {data:authData,error:authError}=await supabase.auth.signInWithPassword({email:cleanEmail,password});
      if(authError) throw authError;
      const authUser=authData?.user;
      if(!authUser?.id) throw new Error("Login failed. Please try again.");

      const staffLookup=await supabase
        .from("staff")
        .select("id,user_id,name,full_name,email,role,dept,department,status,is_active")
        .or(`user_id.eq.${authUser.id},email.eq.${cleanEmail}`)
        .maybeSingle();
      if(staffLookup.error) throw staffLookup.error;
      if(!staffLookup.data) throw new Error("No staff profile is linked with this login.");
      if(staffLookup.data.is_active===false || String(staffLookup.data.status||'active').toLowerCase()!=='active') throw new Error("This account is inactive. Contact admin.");

      let dbRole=(staffLookup.data.role||"").toLowerCase();
      if(['super_admin','principal','management'].includes(dbRole)) dbRole='admin';
      if(['helper','aya','guard','accountant','staff'].includes(dbRole)) dbRole='support';
      if(dbRole && dbRole!==role){
        await supabase.auth.signOut();
        throw new Error(`Role mismatch. Account is '${dbRole}', but '${role}' selected.`);
      }
      const profileName=staffLookup.data.name||staffLookup.data.full_name||authUser.email||"User";
      await onAuth({authUser,forcedRole:dbRole||role,profileName});
    }catch(ex){
      console.error("❌ Login error:", ex);
      setErr(ex.message||"Invalid login credentials");
      setLoading(false);
    }
  };

  return (
    <div className="login-layout">
      <div className="login-left">
        <div className="left-bg"></div>
        <div className="left-cards">
          <div className="float-card f1"><div style={{fontWeight:700,fontSize:14}}>Today's Attendance</div><div style={{fontSize:48,fontWeight:800,lineHeight:1.1}}>90%</div><div style={{color:"#34d38b",fontWeight:700}}>↑ 2 points vs yesterday</div></div>
          <div className="float-card f2"><div style={{fontWeight:700,fontSize:14}}>Present Today</div><div style={{fontSize:48,fontWeight:800,lineHeight:1.1,color:"#32dd87"}}>18</div><div style={{opacity:.75}}>of 20 staff</div></div>
        </div>
        <div className="left-content school-building-showcase">
          <div className="building-frame">
            <img className="building-image" src={SCHOOL_BUILDING} alt="Umeed Education System building"/>
            <div className="building-shine"></div>
            <div className="building-badge"><img src={LOGO} alt="UMEED"/><span>Umeed Campus</span></div>
          </div>
          <div className="brand-title campus-title">Umeed <br/><span className="gold">Education</span></div>
          <div className="brand-foot">STAFF ATTENDANCE MANAGEMENT SYSTEM</div>
        </div>
      </div>
      <div className="login-right">
        <form className="login-card" onSubmit={signIn}>
          <div className="login-head premium-login-head">
            <div className="login-brand-premium">
              <div className="login-logo-orb"><img src={LOGO} alt="Umeed logo"/></div>
              <div>
                <strong>Umeed Education System</strong>
                <div className="muted">Secure staff attendance portal</div>
              </div>
            </div>
          </div>

          <div className="role-grid">
            {roles.map(r=><div key={r.id} className={`role-card ${role===r.id?"active":""}`} onClick={()=>setRole(r.id)}>
              <div className="role-icon">{r.icon}</div><div className="role-title">{r.title}</div><div className="role-sub">{r.sub}</div>
            </div>)}
          </div>

          {err&&<div className="error">{err}</div>}

          <div className="field"><label>EMAIL ADDRESS</label><input className="input" value={email} onChange={e=>setEmail(e.target.value)} placeholder="admin@umeed.com" required/></div>
          <div className="field"><label>PASSWORD</label><input className="input" type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="Enter password" required/></div>
          <button className="btn-sign" type="submit" disabled={loading}>{loading?"SIGNING...":"SIGN IN"}</button>
        </form>
      </div>
    </div>
  );
}

function Sidebar({page,setPage,user,onLogout,pendingLeaveCount}){
  const menu=[
    ["MAIN MENU",[{id:"dashboard",label:"Dashboard",ic:"◻"},{id:"attendance",label:"Attendance",ic:"◴"},{id:"staff",label:"Staff",ic:"◌"},{id:"leave",label:"Leave Mgmt",ic:"◫"},{id:"reports",label:"Reports",ic:"▮"},{id:"documents",label:"Documents",ic:"◨"}]],
    ["SYSTEM",[{id:"settings",label:"Settings",ic:"⚙"},{id:"security",label:"Security",ic:"⬟"}]],
  ];
  return <div className="sidebar">
    <div className="logo-block"><img src={LOGO} alt="umeed"/><div className="logo-lines"><strong>Umeed</strong><span>EDUCATION SYSTEM</span></div></div>
    {menu.map(([g,items])=><div className="menu-group" key={g}><div className="menu-tag">{g}</div>{items.map(m=>{
      const showPending=m.id==='leave' && user?.role==='admin' && pendingLeaveCount>0;
      return <button key={m.id} className={`menu-btn ${page===m.id?"active":""}`} onClick={()=>setPage(m.id)}>
        <span className="ic">{m.ic}</span>
        <span style={{flex:1}}>{m.label}</span>
        {showPending && <span className="menu-badge">{pendingLeaveCount}</span>}
      </button>;
    })}</div>)}
    <div className="profile-panel"><div className="av">{initials(user.name)}</div><div><div style={{fontWeight:700}}>{user.name}</div><div style={{color:"#b6aeca",fontSize:12}}>{user.role.toUpperCase()} · Principal</div></div></div>
    <button className="logout" onClick={onLogout}>Sign Out</button>
  </div>;
}

}

function downloadCSV(filename,rows){
  const safeRows=Array.isArray(rows)?rows:[];
  if(!safeRows.length){ alert('No data available to export.'); return; }
  const headers=Object.keys(safeRows[0]);
  const escapeCell=(v)=>`"${String(v??'').replace(/"/g,'""')}"`;
  const csv=[headers.map(escapeCell).join(','),...safeRows.map(r=>headers.map(h=>escapeCell(r[h])).join(','))].join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

const todayDateKey=()=>new Date().toISOString().slice(0,10);

};
const toTimeInput=(val)=>{
  if(!val) return '';
  if(/^\d{2}:\d{2}/.test(String(val))) return String(val).slice(0,5);
  const dt=new Date(val);
  if(Number.isNaN(dt.getTime())) return '';
  return `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
};
const combineDateAndTime=(dateStr,timeStr)=>{
  if(!dateStr || !timeStr) return null;
  const clean=String(timeStr).slice(0,5);
  return /^\d{2}:\d{2}$/.test(clean) ? `${clean}:00` : null;
};
const displayTime=(val)=>{

  const raw=String(val);
  if(/^\d{2}:\d{2}/.test(raw)) return raw.slice(0,5);

const dayDiffInclusive=(startDate,endDate)=>{
  if(!startDate || !endDate) return 0;
  const s=new Date(`${startDate}T00:00:00`);
  const e=new Date(`${endDate}T00:00:00`);
  if(Number.isNaN(s.getTime()) || Number.isNaN(e.getTime()) || e<s) return 0;
  return Math.floor((e-s)/86400000)+1;
};
const humanDateRange=(startDate,endDate)=>{
  if(!startDate || !endDate) return '—';
  const s=new Date(`${startDate}T00:00:00`);
  const e=new Date(`${endDate}T00:00:00`);
  const fmt=(d)=>new Intl.DateTimeFormat('en-GB',{day:'2-digit',month:'short',year:'numeric'}).format(d);
  return `${fmt(s)} - ${fmt(e)} (${dayDiffInclusive(startDate,endDate)} day${dayDiffInclusive(startDate,endDate)===1?'':'s'})`;
};
const toIsoNow=()=>new Date().toISOString();
const eachDateInRange=(startDate,endDate)=>{
  const days=[];
  if(!startDate || !endDate) return days;
  let cursor=new Date(`${startDate}T00:00:00`);
  const end=new Date(`${endDate}T00:00:00`);
  while(cursor<=end){
    days.push(cursor.toISOString().slice(0,10));
    cursor=new Date(cursor.getTime()+86400000);
  }
  return days;
};

function LeaveManagementPage({user,rows,filter,setFilter,onApplyClick,onApproveClick,onRejectClick,onCancelClick,pendingCount,loading}){
  const filtered=useMemo(()=>{
    const base=(rows||[]).filter(r=>filter==='all'?true:normalizeStatus(r.status)===filter);
    return base.sort((a,b)=>{
      const aPending=normalizeStatus(a.status)==='pending'?0:1;
      const bPending=normalizeStatus(b.status)==='pending'?0:1;
      if(aPending!==bPending) return aPending-bPending;
      return new Date(b.applied_date||b.created_at||0)-new Date(a.applied_date||a.created_at||0);
    });
  },[rows,filter]);

  const [calendarMonth,setCalendarMonth]=useState(()=>new Date().toISOString().slice(0,7));
  const calendarDays=useMemo(()=>{
    const [y,m]=calendarMonth.split('-').map(Number);
    const start=new Date(y,m-1,1);
    const firstDay=start.getDay();
    const daysInMonth=new Date(y,m,0).getDate();
    const cells=[];
    for(let i=0;i<firstDay;i++) cells.push(null);
    for(let d=1;d<=daysInMonth;d++) cells.push(new Date(y,m-1,d).toISOString().slice(0,10));
    return cells;
  },[calendarMonth]);

  const byDateMap=useMemo(()=>{
    const m=new Map();
    (rows||[]).forEach(r=>{
      if(normalizeStatus(r.status)!=='approved') return;
      eachDateInRange(r.start_date,r.end_date).forEach(day=>{
        if(day.slice(0,7)!==calendarMonth) return;
        if(!m.has(day)) m.set(day,[]);
        m.get(day).push(r);
      });
    });
    return m;
  },[rows,calendarMonth]);

  return <div className="leave-shell">
    <div className="page-head"><div><h1>Leave Management</h1><p>{user.role==='admin'?'Approve and monitor all staff leave requests.':'Submit and track your leave requests.'}</p></div></div>

    </div>

    {loading?<LeaveSkeletonList/>:<div className="leave-grid">
      {filtered.length===0 && <div className="chart-card"><div className="muted">No leave records for selected filter.</div></div>}
      {filtered.map(row=>{
        const statusNorm=normalizeStatus(row.status);
        const canApprove=user.role==='admin' && statusNorm==='pending';
        const canCancel=user.role!=='admin' && statusNorm==='pending';
        return <div className="leave-card" key={row.id}>
          <div className="leave-head"><div>
            <div className={`leave-type ${leaveTypeClass(row.leave_type)}`}>{row.leave_type||'Leave'}</div>
            <div style={{fontWeight:800,fontSize:18,marginTop:6}}>{user.role==='admin'?row.staff_name:'My Leave Request'}</div>
          </div><span className={`status-pill ${leaveStatusClass(row.status)}`}>{row.status||'Pending'}</span></div>

          <div className="leave-meta">
            <div><b>Employee ID:</b> {row.employee_id||'—'}</div>
            <div><b>Date Range:</b> {humanDateRange(row.start_date,row.end_date)}</div>
            <div><b>Reason:</b> {row.reason||'—'}</div>
            <div><b>Applied:</b> {row.applied_date?new Date(row.applied_date).toLocaleString():'—'}</div>
            {row.approved_date && <div><b>Processed:</b> {new Date(row.approved_date).toLocaleString()}</div>}
            {(row.processed_by_name || row.approved_by) && <div><b>Processed By:</b> {row.processed_by_name || row.approved_by}</div>}
            {row.admin_comment && <div><b>Comment:</b> {row.admin_comment}</div>}
            {row.rejection_reason && <div><b>Rejection Reason:</b> {row.rejection_reason}</div>}
          </div>

          {(canApprove || canCancel) && <div className="leave-actions">
            {canApprove && <>
              <button className="btn-success" onClick={()=>onApproveClick(row)}>✅ Approve</button>
              <button className="btn-danger" onClick={()=>onRejectClick(row)}>❌ Reject</button>
            </>}
            {canCancel && <button className="btn-danger" onClick={()=>onCancelClick(row)}>Cancel Request</button>}
          </div>}
        </div>;
      })}
    </div>}

    <div className="leave-calendar">
      <div className="leave-toolbar" style={{marginBottom:8}}>
        <div style={{fontFamily:'Playfair Display,serif',fontSize:28}}>Leave Calendar</div>
        <input type="month" className="mini-input" value={calendarMonth} onChange={e=>setCalendarMonth(e.target.value)} />
      </div>
      <div className="calendar-grid">
        {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=><div key={d} className="cal-head">{d}</div>)}
        {calendarDays.map((day,idx)=>{
          if(!day) return <div key={`blank-${idx}`} className="cal-cell"></div>;
          const dayRows=byDateMap.get(day)||[];
          return <div key={day} className="cal-cell"><div className="cal-day">{new Date(`${day}T00:00:00`).getDate()}</div>{dayRows.slice(0,3).map(r=><span key={`${day}-${r.id}`} className="cal-chip" title={`${r.staff_name} - ${r.leave_type}`}>{r.staff_name} · {r.leave_type}</span>)}{dayRows.length>3&&<span className="cal-chip">+{dayRows.length-3} more</span>}</div>;
        })}
      </div>
    </div>
  </div>;
}

  const [manualRows,setManualRows]=useState({});

  const [manualProgressText,setManualProgressText]=useState('');

  const dismissToast=(id)=>setToasts(prev=>prev.filter(t=>t.id!==id));
  const pushToast=(type,message,extra={})=>{
    const id=`${Date.now()}-${Math.random().toString(16).slice(2)}`;
    setToasts(prev=>[...prev,{id,type,message,...extra}]);
    setTimeout(()=>dismissToast(id),5000);
  };

  const nextEmployeeId=useMemo(()=>{
    const maxNum=(staff||[]).reduce((mx,s)=>{
      const m=String(s.employee_id||'').match(/UES-(\d{3,})/i);
      const n=m?parseInt(m[1],10):0;
      return n>mx?n:mx;
    },0);
    return `UES-${String(maxNum+1).padStart(3,'0')}`;
  },[staff]);

  const validateStaffField=(key,val,form)=>{
    const value=String(val??'').trim();
    if(key==='full_name' && !value) return 'Full name is required';
    if(key==='email'){
      if(!value) return 'Email is required';
      if(!emailRe.test(value)) return 'Enter a valid email address';
    }
    if(key==='department' && !value) return 'Department is required';
    if(key==='phone'){
      if(!value) return 'Phone number is required';
      if(!pakPhoneRe.test(normalizePkPhone(value))) return 'Use Pakistan format: 03XX-XXXXXXX or +92XXXXXXXXXX';
    }
    if(key==='employee_id'){
      if(!value) return 'Employee ID is required';
      if(!/^UES-\d{3}$/.test(value.toUpperCase())) return 'Employee ID format must be UES-001';
    }
    if(key==='join_date' && value && value>todayDateKey()) return 'Join date cannot be in the future';
    return '';
  };

  const validateStaffForm=(form)=>{
    const checks=['full_name','email','department','phone','employee_id','join_date'];
    const errs={};
    checks.forEach((k)=>{
      const msg=validateStaffField(k,form?.[k],form);
      if(msg) errs[k]=msg;
    });
    return errs;
  };

  const trimPayload=(obj)=>Object.fromEntries(Object.entries(obj).filter(([_,v])=>v!==undefined));

  const runMutationWithColumnFallback=async(executor,payload)=>{
    const working={...payload};
    const removed=[];
    for(let i=0;i<Object.keys(payload).length+1;i++){
      const res=await executor(working);
      if(!res.error) return {...res,usedPayload:working,removedColumns:removed};
      const msg=`${res.error?.message||''} ${res.error?.details||''}`;
      const colMatch=msg.match(/column\s+"?([a-zA-Z0-9_]+)"?\s+does not exist/i);
      const col=colMatch?.[1];
      if(col && Object.prototype.hasOwnProperty.call(working,col)){
        delete working[col];
        removed.push(col);
        continue;
      }
      return {...res,usedPayload:working,removedColumns:removed};
    }
    return {data:null,error:new Error('Mutation failed after fallback attempts'),usedPayload:working,removedColumns:removed};
  };

  const upsertUsersRecord=async(form,existingUserId='')=>{
    // Enterprise mode: Auth users must be created in Supabase Auth or through a service-role Edge Function, not from browser code.

  const saveManualAttendance=async()=>{
    if(manualSaving || !supabase || !user) return;
    if(isFutureDate(manualDate)){
      pushToast('warning','Date cannot be in the future.');
      return;
    }

    const marked=manualRowsList.filter(r=>!!normalizeStatus(r.status));
    if(marked.length===0){
      pushToast('warning','Mark attendance for at least one staff member.');
      return;

    for(const row of marked){
      const norm=normalizeStatus(row.status);
      if((norm==='present' || norm==='late') && !row.check_in){
        pushToast('warning',`Check-in time is required for ${row.full_name}.`);
        return;

      if(row.check_in && row.check_out && row.check_in>=row.check_out){
        pushToast('warning',`Check-in must be before check-out for ${row.full_name}.`);

    setManualSaving(true);

    try{
      const staffIds=marked.map(r=>r.staff_id).filter(Boolean);
      const existingRes=await supabase.from('attendance').select('id,staff_id,date,verification_method').eq('date',manualDate).in('staff_id',staffIds);

      let saved=0;
      for(let i=0;i<marked.length;i++){

          attendance_date:manualDate,
          status:norm==='on_leave'?'On Leave':(norm==='present'?'Present':norm==='absent'?'Absent':'Late'),

          method:'manual',
          created_by:user.id
        };

        const existing=existingMap.get(row.staff_id);
        let result;
        if(existing?.id){
          result=await runMutationWithColumnFallback((p)=>supabase.from('attendance').update(p).eq('id',existing.id).select('id').single(),payload);
        }else{
          result=await runMutationWithColumnFallback((p)=>supabase.from('attendance').insert(p).select('id').single(),payload);

        if(result.error) throw result.error;
        saved+=1;

      setManualProgressText('Refreshing records...');

      pushToast('success',`Attendance saved for ${saved} staff.`);
      setManualEntryOpen(false);

      setManualProgressText('');

  };

  const applyLeaveAttendanceForApproval=async(leaveRow)=>{
    const days=eachDateInRange(leaveRow.start_date,leaveRow.end_date);
    if(!days.length || !leaveRow.staff_id) return;
    const existing=await supabase.from('attendance').select('id,date,status').eq('staff_id',leaveRow.staff_id).gte('date',days[0]).lte('date',days[days.length-1]);
    if(existing.error) throw existing.error;
    const existingByDate=new Map((existing.data||[]).map(r=>[toDateInput(r.date),r]));

    for(const dateKey of days){
      const found=existingByDate.get(dateKey);
      if(found && normalizeStatus(found.status)==='present') continue;
      const payload={
        staff_id:leaveRow.staff_id,
        date:dateKey,
        status:'On Leave',
        verification_method:'Leave Approved',
        check_in:null,
        check_out:null
      };
      if(found?.id){
        const upd=await runMutationWithColumnFallback((p)=>supabase.from('attendance').update(p).eq('id',found.id).select('id').single(),payload);
        if(upd.error) throw upd.error;
      }else{
        const ins=await runMutationWithColumnFallback((p)=>supabase.from('attendance').insert(p).select('id').single(),payload);
        if(ins.error) throw ins.error;
      }
    }
  };

  const openApproveLeave=(row)=>{
    setLeaveDecisionMode('approve');
    setLeaveDecisionRow(row);
    setLeaveDecisionComment('');
    setLeaveDecisionOpen(true);
  };

  const openRejectLeave=(row)=>{
    setLeaveDecisionMode('reject');
    setLeaveDecisionRow(row);
    setLeaveDecisionComment('');
    setLeaveDecisionOpen(true);
  };

  const processLeaveDecision=async()=>{
    if(!leaveDecisionRow || !user || leaveDecisionSaving) return;
    const isReject=leaveDecisionMode==='reject';
    if(isReject && !String(leaveDecisionComment||'').trim()){
      pushToast('warning','Rejection reason is required.');
      return;
    }

    setLeaveDecisionSaving(true);
    try{
      const payload={
        status:isReject?'Rejected':'Approved',
        approved_by:user.id,
        approved_date:toIsoNow(),
        admin_comment:!isReject?String(leaveDecisionComment||'').trim():undefined,
        rejection_reason:isReject?String(leaveDecisionComment||'').trim():undefined
      };
      const res=await runMutationWithColumnFallback((p)=>supabase.from('leaves').update(p).eq('id',leaveDecisionRow.id).select('id').single(),payload);
      if(res.error) throw res.error;
      if(!isReject) await applyLeaveAttendanceForApproval(leaveDecisionRow);
      pushToast('success',isReject?`Leave rejected for ${leaveDecisionRow.staff_name}`:`Leave approved for ${leaveDecisionRow.staff_name}`);
      setLeaveDecisionOpen(false);
      setLeaveDecisionRow(null);
      setLeaveDecisionComment('');
      await loadData(user);
    }catch(err){
      console.error('[Leave] Decision failed:',err);
      pushToast('error',mapFriendlyError(err));
    }finally{
      setLeaveDecisionSaving(false);
    }
  };

  const cancelOwnLeave=async(row)=>{
    if(!row || !user) return;
    if(!window.confirm('Cancel this pending leave request?')) return;
    try{
      const res=await runMutationWithColumnFallback((p)=>supabase.from('leaves').update(p).eq('id',row.id).select('id').single(),{status:'Cancelled',cancelled_date:toIsoNow()});
      if(res.error) throw res.error;
      pushToast('success','Leave request cancelled.');
      await loadData(user);
    }catch(err){
      console.error('[Leave] Cancel failed:',err);
      pushToast('error',mapFriendlyError(err));
    }
  };

  const resolveUserProfile=async(authUser,forcedRole,profileName,{requireDbProfile=false,context='general'}={})=>{
    if(!supabase) throw new Error('Supabase client is not initialized');
    if(!authUser?.id) throw new Error('Invalid auth user while resolving profile');

    console.log(`[Auth][${context}] Resolving profile for user:`, authUser.id);

    let dbRow=null;
    let usersError=null;
    let profilesError=null;

    try{
      const u=await supabase.from('users').select('*').eq('id',authUser.id).maybeSingle();
      usersError=u.error || null;
      if(!usersError && u.data) dbRow=u.data;
      if(!dbRow && authUser.email){
        const byEmail=await supabase.from('users').select('*').eq('email',authUser.email).maybeSingle();
        if(!byEmail.error && byEmail.data) dbRow=byEmail.data;
      }
    }catch(ex){
      usersError=ex;
    }

    if(usersError) console.error(`[Auth][${context}] users table lookup failed:`, usersError);

    if(!dbRow){
      try{
        const p=await supabase.from('profiles').select('*').eq('id',authUser.id).maybeSingle();
        profilesError=p.error || null;
        if(!profilesError && p.data) dbRow=p.data;
      }catch(ex){
        profilesError=ex;
      }
      if(profilesError) console.error(`[Auth][${context}] profiles table lookup failed:`, profilesError);
    }

    if(!dbRow && requireDbProfile){
      throw new Error('User profile data is missing from database');
    }

    let role=((dbRow?.role || forcedRole || authUser.user_metadata?.role || 'teacher')+'').toLowerCase();
    if(['super_admin','principal','management'].includes(role)) role='admin';
    if(['helper','aya','guard','accountant','staff'].includes(role)) role='support';
    const profile={id:authUser.id,email:authUser.email,name:dbRow?.full_name||dbRow?.name||profileName||authUser.user_metadata?.full_name||authUser.user_metadata?.name||authUser.email,role};

    console.log(`[Auth][${context}] Profile resolved. source=${dbRow?'database':'fallback'} role=${profile.role}`);
    return profile;
  };

  const loadData=async(profile)=>{
    if(!supabase) return;
    setDataLoading(true);
    try{
      const isAdmin=profile.role==='admin';

      let staffRows=[];
      if(isAdmin){
        const s=await supabase.from('staff').select('*').order('created_at',{ascending:false});
        if(s.error) throw s.error;
        staffRows=s.data||[];
      }else{
        const s=await supabase.from('staff').select('*').or(`user_id.eq.${profile.id},email.eq.${profile.email}`);
        if(s.error) throw s.error;
        staffRows=s.data||[];
      }
      staffRows=(staffRows||[]).filter(x=>String(x.status||'active').toLowerCase()!=='inactive' && x.is_active!==false);
      setStaff(staffRows);

      const staffIds=staffRows.map(x=>x.id).filter(Boolean);

      const [att,lev,sum,aud]=await Promise.all([
        isAdmin
          ? supabase.from('attendance').select('*').order('date',{ascending:false}).limit(1000)
          : (staffIds.length?supabase.from('attendance').select('*').in('staff_id',staffIds).order('date',{ascending:false}).limit(1000):Promise.resolve({data:[],error:null})),
        isAdmin
          ? supabase.from('leaves').select('*').order('created_at',{ascending:false}).limit(400)
          : (staffIds.length
            ? supabase.from('leaves').select('*').or(`user_id.eq.${profile.id},staff_id.in.(${staffIds.join(',')})`).order('created_at',{ascending:false}).limit(400)
            : supabase.from('leaves').select('*').eq('user_id',profile.id).order('created_at',{ascending:false}).limit(400)),
        isAdmin
          ? supabase.from('attendance_summary').select('*').order('date',{ascending:false}).limit(400)
          : (staffIds.length?supabase.from('attendance_summary').select('*').in('staff_id',staffIds).order('date',{ascending:false}).limit(400):Promise.resolve({data:[],error:null})),
        isAdmin
          ? supabase.from('audit_log').select('*').order('created_at',{ascending:false}).limit(50)
          : supabase.from('audit_log').select('*').eq('user_id',profile.id).order('created_at',{ascending:false}).limit(50)
      ]);

      if(att.error) throw att.error;
      if(lev.error) throw lev.error;
      if(sum.error) throw sum.error;
      if(aud.error) throw aud.error;

      setAttendance(att.data||[]);
      setLeaves(lev.data||[]);
      setSummary(sum.data||[]);
      setAuditLog(aud.data||[]);
    }catch(err){
      console.error('[DataLoad] Failed:',err);
      pushToast('error',mapFriendlyError(err));
    }finally{
      setDataLoading(false);
    }
  };

  useEffect(()=>{
    console.log("[SessionRestore] SKIP: Using staff-table login only");
    setUser(null);
    setSessionChecked(true);
    return ()=>{};
  },[]);

  useEffect(()=>{ if(user) loadData(user); },[user]);

  useEffect(()=>{
    if(!supabase || !user) return;
    const isAdmin=user.role==='admin';
    const channels=[];
    channels.push(supabase.channel('rt-attendance').on('postgres_changes',{event:'*',schema:'public',table:'attendance'},()=>loadData(user)).subscribe());
    channels.push(supabase.channel('rt-staff').on('postgres_changes',{event:'*',schema:'public',table:'staff'},()=>loadData(user)).subscribe());
    channels.push(supabase.channel('rt-leaves').on('postgres_changes',{event:'*',schema:'public',table:'leaves'},()=>loadData(user)).subscribe());
    channels.push(supabase.channel('rt-summary').on('postgres_changes',{event:'*',schema:'public',table:'attendance_summary'},()=>loadData(user)).subscribe());
    if(isAdmin) channels.push(supabase.channel('rt-audit').on('postgres_changes',{event:'*',schema:'public',table:'audit_log'},()=>loadData(user)).subscribe());
    return ()=>{channels.forEach(ch=>supabase.removeChannel(ch));};
  },[user]);

  useEffect(()=>{
    if(attendanceFrom && attendanceTo && attendanceFrom>attendanceTo){
      setAttendanceTo(attendanceFrom);
    }
  },[attendanceFrom,attendanceTo]);

  useEffect(()=>{
    const onEsc=(e)=>{
      if(e.key!=='Escape') return;
      if(leaveDecisionOpen && !leaveDecisionSaving){
        setLeaveDecisionOpen(false);
        setLeaveDecisionRow(null);
        return;
      }
      if(leaveModalOpen){
        closeLeaveModal('esc');
        return;
      }
      if(staffModalOpen){
        closeStaffModal('esc');
        return;
      }
      if(manualEntryOpen && !manualSaving){
        setManualEntryOpen(false);
        return;
      }
      if(deleteTarget && !deleteLoading){
        setDeleteTarget(null);
      }
    };
    window.addEventListener('keydown',onEsc);
    return ()=>window.removeEventListener('keydown',onEsc);
  },[leaveDecisionOpen,leaveDecisionSaving,leaveModalOpen,staffModalOpen,manualEntryOpen,manualSaving,deleteTarget,deleteLoading,closeLeaveModal,closeStaffModal]);

  const dashboardStats=useMemo(()=>{
    const today=dayKey(new Date());
    const y=dayKey(new Date(Date.now()-86400000));
    const rowsToday=attendance.filter(a=>dayKey(a.date||a.created_at||new Date())===today);
    const rowsYesterday=attendance.filter(a=>dayKey(a.date||a.created_at||new Date())===y);

    const presentToday=rowsToday.filter(r=>String(r.status||'').toLowerCase()==='present').length;
    const absentToday=rowsToday.filter(r=>String(r.status||'').toLowerCase()==='absent').length;
    const lateToday=rowsToday.filter(r=>String(r.status||'').toLowerCase()==='late').length;
    const onLeaveCount=onLeaveTodayRows.length;
    const totalStaff=Math.max(staff.length, presentToday+absentToday+lateToday+onLeaveCount);

    const yPresent=rowsYesterday.filter(r=>String(r.status||'').toLowerCase()==='present').length;
    const yLate=rowsYesterday.filter(r=>String(r.status||'').toLowerCase()==='late').length;
    const yAbsent=rowsYesterday.filter(r=>String(r.status||'').toLowerCase()==='absent').length;

    const presentRate=totalStaff?Math.round((presentToday/totalStaff)*100):0;
    const weekRate=totalStaff?Math.round(((attendance.filter(r=>String(r.status||'').toLowerCase()==='present').slice(0,7).length)/(totalStaff*7))*100):0;

    return {
      totalStaff,
      presentToday,
      absentToday,
      lateToday,
      onLeaveToday:onLeaveCount,
      presentRate,
      deltaPresentRate:Math.max(0,presentRate-weekRate),
      deltaPresent:Math.max(0,presentToday-yPresent),
      deltaAbsentText:absentToday===yAbsent?"Same as yesterday":`${Math.abs(absentToday-yAbsent)} vs yesterday`,
      deltaLate:Math.max(0,yLate-lateToday),
      recordsToday:rowsToday.length,
      lastSync:rowsToday[0]?.check_in ? displayTime(rowsToday[0].check_in) : (rowsToday[0]?.created_at ? displayTime(rowsToday[0].created_at) : '--:--')
    };
  },[attendance,staff,onLeaveTodayRows]);

  const dashboardAnalytics=useMemo(()=>{
    const deptMap=new Map();
    (staff||[]).forEach(s=>{
      const d=s.department||s.dept||'General';
      deptMap.set(d,(deptMap.get(d)||0)+1);
    });
    return {
      statusLabels:['Present','Absent','Late','On Leave'],
      statusValues:[dashboardStats.presentToday,dashboardStats.absentToday,dashboardStats.lateToday,dashboardStats.onLeaveToday],
      departmentLabels:Array.from(deptMap.keys()),
      departmentValues:Array.from(deptMap.values())
    };
  },[staff,dashboardStats]);

  const reportData=useMemo(()=>{
    const y=new Date().getFullYear();
    const labels=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const agg=labels.map(()=>({present:0,absent:0,late:0,total:0}));

    attendance.forEach(r=>{
      const rawDate=r.date||r.attendance_date||r.created_at||Date.now();
      const dt=new Date(rawDate);
      if(Number.isNaN(dt.getTime()) || dt.getFullYear()!==y) return;
      const m=dt.getMonth();
      const st=String(r.status||'').toLowerCase();
      if(st==='present') agg[m].present+=1;
      if(st==='absent') agg[m].absent+=1;
      if(st==='late') agg[m].late+=1;
      agg[m].total+=1;
    });

    const totalPresent=agg.reduce((s,x)=>s+x.present,0);
    const totalAbsent=agg.reduce((s,x)=>s+x.absent,0);
    const totalLate=agg.reduce((s,x)=>s+x.late,0);
    const totalAll=Math.max(1,totalPresent+totalAbsent+totalLate);

    const monthCurrent=new Date().getMonth();
    const monthPrev=Math.max(0,monthCurrent-1);
    const cur=agg[monthCurrent], prev=agg[monthPrev]||{present:0,absent:0,late:0,total:0};

    const byDepartment=summary.length?summary.map(s=>({department:s.department||s.dept||"General",present_rate:s.present_rate||s.attendance_rate||0})):
      Array.from(staff.reduce((m,s)=>{const d=s.department||'General';if(!m.has(d))m.set(d,0);m.set(d,m.get(d)+1);return m;},new Map())).map(([department,count])=>({department,present_rate:count}));

    const exportRows=(attendance||[]).map(r=>{
      const st=staffMap.get(r.staff_id)||{};
      return {
        date:toDateInput(r.date||r.attendance_date||r.created_at||''),
        employee_id:st.employee_id||r.employee_id||'',
        staff_name:st.full_name||st.name||r.staff_name||r.name||'',
        department:st.department||st.dept||r.department||r.dept||'',
        status:r.status||'',
        check_in:r.check_in||'',
        check_out:r.check_out||'',
        method:r.verification_method||r.method||r.source||'',
        remarks:r.remarks||r.notes||''
      };
    });

    return {
      avgAttendance:Math.round((totalPresent/totalAll)*100),
      avgDelta:Math.max(0,cur.present-prev.present),
      totalManDays:totalPresent,
      mandayDelta:Math.max(0,cur.total-prev.total),
      totalAbsences:totalAbsent,
      absenceDelta:Math.max(0,prev.absent-cur.absent),
      totalLate,
      lateDelta:Math.max(0,prev.late-cur.late),
      chart:{labels,present:agg.map(a=>a.present),absent:agg.map(a=>a.absent),late:agg.map(a=>a.late)},
      byDepartment,
      today:{present:dashboardStats.presentToday,absent:dashboardStats.absentToday,late:dashboardStats.lateToday,leave:dashboardStats.onLeaveToday},
      exportRows
    };
  },[attendance,summary,staff,dashboardStats,staffMap]);

  const recentDeviceLogs=useMemo(()=>{
    const rows=(attendance||[]).slice(0,12).map(r=>({id:r.id,name:staffMap.get(r.staff_id)?.full_name||r.staff_name||r.name||r.full_name||'Staff',staff_id:staffMap.get(r.staff_id)?.employee_id||r.staff_id||r.employee_id||r.code,time:r.check_in?displayTime(r.check_in):(r.time||displayTime(r.created_at||Date.now())),status:r.status,method:r.verification_method||r.method||'Fingerprint'}));
    if(rows.length) return rows;
    return (auditLog||[]).slice(0,12).map(a=>({id:a.id,name:a.full_name||a.user_name||a.email||'Staff',staff_id:a.user_id,time:new Date(a.created_at||Date.now()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),status:a.action||'present',method:a.device||'Device'}));
  },[attendance,auditLog,staffMap]);

  const quickMark=async(status)=>{
    if(!supabase || !user) return;
    try{
      const today=dayKey(new Date());
      const staffId=staff[0]?.id || null;
      const payload={
        user_id:user.id,
        staff_id:staffId,
        status,
        date:today,
        check_in:new Date().toTimeString().slice(0,8),
        attendance_date:today,
        method:'manual',
        verification_method:'Manual',
        source:'manual'
      };
      const res=await supabase.from('attendance').insert(payload);
      if(res.error) throw res.error;
      await loadData(user);
    }catch(err){
      console.error('[QuickMark] Failed:',err);
      pushToast('error',mapFriendlyError(err));
    }
  };

  const onAuth=async({authUser,forcedRole,profileName})=>{
    console.log('[LoginAuth] Resolving user profile after sign-in');
    try{
      const p=await resolveUserProfile(authUser,forcedRole,profileName,{requireDbProfile:false,context:'post_login'});
      console.log('[LoginAuth] User data fetch success');
      setUser(p);
    }catch(loginProfileError){
      console.error('[LoginAuth] User data fetch failed:', loginProfileError);
      if(supabase){
        try{await supabase.auth.signOut();}catch(signOutError){console.error('[LoginAuth] signOut failed after profile error:', signOutError);}
      }
      throw new Error('Unable to load user profile. Please contact admin.');
    }
  };

  const logout=async()=>{if(supabase) await supabase.auth.signOut();setUser(null);};

  const exportAllSystemCSV=()=>{
    const pack=[];
    const addRows=(table,rows)=>{(rows||[]).forEach(r=>pack.push({table,...r}));};
    addRows('staff',staff);
    addRows('attendance',attendance);
    addRows('leaves',leaves);
    addRows('attendance_summary',summary);
    addRows('audit_log',auditLog);
    downloadCSV(`umeed-full-system-export-${todayDateKey()}.csv`,pack);
  };

  const printAllSystem=()=>{
    document.body.classList.add('print-whole-system');
    setTimeout(()=>{window.print();setTimeout(()=>document.body.classList.remove('print-whole-system'),300);},50);
  };

  if(showSplash) return <Splash done={()=>setShowSplash(false)}/>;
  if(!sessionChecked) return <div className="splash"><div className="splash-sub">Restoring session...</div></div>;
  if(!user) return <Login onAuth={onAuth}/>;

  return <>
    <ToastHost toasts={toasts} onDismiss={dismissToast}/>
    <StaffModal
      open={staffModalOpen}
      mode={staffModalMode}
      form={staffForm}
      errors={staffFormErrors}
      submitting={staffSubmitting}
      onRequestClose={closeStaffModal}
      onChange={handleStaffFormChange}
      onBlurField={onStaffFieldBlur}
      onSubmit={saveStaff}
      isSubmitDisabled={!isStaffFormValid}
      onGenerateId={()=>handleStaffFormChange('employee_id',nextEmployeeId)}
    />
    <DeleteConfirmModal
      open={!!deleteTarget}
      name={deleteTarget?.full_name||deleteTarget?.name}
      loading={deleteLoading}
      onCancel={()=>{if(!deleteLoading) setDeleteTarget(null);}}
      onConfirm={confirmDeleteStaff}
    />
    <ManualEntryModal
      open={manualEntryOpen}
      selectedDate={manualDate}
      onDateChange={(val)=>setManualDate(val||todayDateKey())}
      onClose={()=>{if(!manualSaving) setManualEntryOpen(false);}}
      rows={manualRowsList}
      markedCount={markedCount}
      totalStaff={staff.length}
      onMarkAllPresent={onMarkAllPresent}
      onMarkAllAbsent={onMarkAllAbsent}
      onClearAll={onClearAllManual}
      onStatusChange={onManualStatusChange}
      onTimeChange={onManualTimeChange}
      onSave={saveManualAttendance}
      saving={manualSaving}
      progressText={manualProgressText}
    />

    <LeaveApplyModal
      open={leaveModalOpen}
      form={leaveForm}
      errors={leaveFormErrors}
      submitting={leaveSubmitting}
      user={user}
      staffOptions={staff}
      onChange={onLeaveFieldChange}
      onBlurField={onLeaveFieldBlur}
      onRequestClose={closeLeaveModal}
      onSubmit={submitLeaveRequest}
      isSubmitDisabled={!isLeaveFormValid}
    />
    <LeaveDecisionModal
      open={leaveDecisionOpen}
      mode={leaveDecisionMode}
      row={leaveDecisionRow}
      comment={leaveDecisionComment}
      setComment={setLeaveDecisionComment}
      submitting={leaveDecisionSaving}
      onClose={()=>{if(!leaveDecisionSaving){setLeaveDecisionOpen(false);setLeaveDecisionRow(null);}}}
      onConfirm={processLeaveDecision}
    />

    <div className="app-shell">
      <Sidebar page={page} setPage={setPage} user={user} onLogout={logout} pendingLeaveCount={pendingLeaveCount}/>
      <div className="main">
        <TopBar user={user} dark={dark} setDark={setDark} onExportAll={exportAllSystemCSV} onPrintAll={printAllSystem}/>
        <div className="content">
          {page==='dashboard' && <DashboardPage stats={dashboardStats} attendanceLogs={recentDeviceLogs} onQuickMark={quickMark} onManualEntry={openManualEntry} role={user.role} pendingLeaveCount={pendingLeaveCount} onLeaveTodayRows={onLeaveTodayRows} upcomingLeaves={upcomingLeaves} analytics={dashboardAnalytics}/>} 
          {page==='reports' && <ReportsPage report={reportData} period={period} setPeriod={setPeriod}/>}
          {page==='attendance' && <AttendancePage rows={attendance} staffMap={staffMap} fromDate={attendanceFrom} toDate={attendanceTo} onChangeFrom={setAttendanceFrom} onChangeTo={setAttendanceTo} onOpenManualEntry={openManualEntry} loading={dataLoading}/>}
          {page==='staff' && (user.role==='admin'
            ? <StaffPage staff={staff} onAddClick={openAddStaff} onEditClick={openEditStaff} onDeleteClick={requestDeleteStaff} loading={dataLoading}/>
            : <Placeholder title="Staff"/>
          )}
          {page==='leave' && <LeaveManagementPage user={user} rows={leaveRows} filter={leaveFilter} setFilter={setLeaveFilter} onApplyClick={openLeaveApply} onApproveClick={openApproveLeave} onRejectClick={openRejectLeave} onCancelClick={cancelOwnLeave} pendingCount={pendingLeaveCount} loading={dataLoading}/>}
          {page==='documents' && <Placeholder title="Documents"/>}
          {page==='settings' && <Placeholder title="Settings"/>}
          {page==='security' && <Placeholder title="Security"/>}
        </div>
      </div>
    </div>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
