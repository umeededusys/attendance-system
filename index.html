<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umeed Education System - Staff Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>

<style>
:root {
  --bg: #0A0408;
  --surface: #140811;
  --text: #FFFFFF;
  --text-sec: #E5E5E5;
  --text-mute: #B0B0B0;
  --maroon: #C41E30;
  --gold: #D4AF37;
  --border: rgba(255,255,255,0.15);
  --success: #22C55E;
  --error: #EF4444;
  --warning: #FBB924;
}

[data-theme="light"] {
  --bg: #FFFFFF;
  --surface: #F8F8F8;
  --text: #1A1A1A;
  --text-sec: #333333;
  --text-mute: #777777;
  --border: rgba(0,0,0,0.12);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body, #root { height: 100%; width: 100%; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); transition: all 200ms; }

.splash { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #0A0408, #1A0C15); gap: 20px; }
.logo-3d { width: 160px; height: 160px; animation: spin 4s infinite; filter: drop-shadow(0 0 30px rgba(212,175,55,0.8)); }
.logo-img { width: 100%; height: 100%; }
@keyframes spin { 0% { transform: rotateY(0); } 50% { transform: rotateY(180deg); } 100% { transform: rotateY(360deg); } }
.splash-text { font-family: 'Cormorant Garamond', serif; font-size: 48px; font-weight: 700; color: #FFFFFF; letter-spacing: 2px; }
.splash-sub { font-family: 'Cormorant Garamond', serif; font-size: 16px; color: #D4AF37; letter-spacing: 1px; }

.login { display: flex; height: 100vh; background: linear-gradient(135deg, #0A0408, #1A0C15); }
.login-left { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
.logo-badge { width: 120px; height: 120px; margin-bottom: 30px; }
.login-title { font-family: 'Cormorant Garamond', serif; font-size: 40px; font-weight: 700; color: #FFFFFF; margin-bottom: 8px; }
.login-subtitle { font-family: 'Cormorant Garamond', serif; font-size: 14px; color: #D4AF37; margin-bottom: 15px; }
.login-desc { color: #C0C0C0; font-size: 12px; }

.login-right { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-card { background: rgba(20, 8, 17, 0.95); border: 1px solid rgba(196, 30, 48, 0.4); border-radius: 16px; padding: 35px; width: 100%; max-width: 380px; }
.card-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; color: #D4AF37; margin-bottom: 5px; }
.card-sub { color: #A0A0A0; font-size: 11px; margin-bottom: 20px; }

.form-group { margin-bottom: 15px; }
.form-label { font-size: 10px; font-weight: 600; color: #808080; margin-bottom: 5px; text-transform: uppercase; display: block; }
.form-input { width: 100%; padding: 10px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: #FFFFFF; font-size: 13px; }
.form-input:focus { outline: none; border-color: #C41E30; }
.form-input::placeholder { color: #606060; }

.submit-btn { width: 100%; padding: 10px; background: linear-gradient(135deg, #C41E30, #9A0B1E); border: none; border-radius: 8px; color: white; font-weight: 600; font-size: 12px; cursor: pointer; margin-top: 8px; text-transform: uppercase; }
.submit-btn:hover { opacity: 0.95; }
.submit-btn:disabled { opacity: 0.6; }

.error-msg { background: rgba(220,38,38,0.15); border: 1px solid rgba(220,38,38,0.3); border-radius: 8px; color: #FF8080; padding: 8px 10px; font-size: 11px; margin-bottom: 15px; }

.app { display: flex; height: 100vh; background: var(--bg); color: var(--text); }

.sidebar { width: 250px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 16px; overflow-y: auto; }
.sidebar-brand { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 700; color: var(--gold); margin-bottom: 20px; text-align: center; }

.nav-group { margin-bottom: 20px; }
.nav-label { font-size: 9px; font-weight: 700; color: var(--text-mute); text-transform: uppercase; margin-left: 10px; margin-bottom: 8px; }
.nav-btn { width: 100%; padding: 10px 12px; background: transparent; border: none; border-radius: 6px; color: var(--text-sec); font-size: 12px; font-weight: 500; cursor: pointer; text-align: left; margin-bottom: 4px; transition: all 150ms; }
.nav-btn:hover { background: rgba(196,30,48,0.15); }
.nav-btn.active { background: rgba(196,30,48,0.25); color: var(--gold); border-left: 2px solid var(--maroon); }

.sidebar-footer { margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border); }
.user-card { background: rgba(196,30,48,0.12); border-radius: 6px; padding: 10px; margin-bottom: 10px; font-size: 10px; }
.user-name { font-weight: 600; color: var(--text); margin-bottom: 2px; }
.user-role { color: var(--text-mute); font-size: 9px; }

.logout-btn { width: 100%; padding: 8px; background: rgba(196,30,48,0.2); border: 1px solid rgba(196,30,48,0.3); border-radius: 6px; color: var(--maroon); font-weight: 600; font-size: 11px; cursor: pointer; margin-top: 10px; }
.logout-btn:hover { background: rgba(196,30,48,0.3); }

.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar { height: 52px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
.topbar-title { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 600; }

.topbar-actions { display: flex; gap: 10px; align-items: center; }
.theme-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text); width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; }
.theme-btn:hover { border-color: var(--maroon); background: rgba(196,30,48,0.1); }

.action-btn { padding: 6px 12px; background: rgba(196,30,48,0.15); border: 1px solid rgba(196,30,48,0.25); border-radius: 6px; color: var(--maroon); font-weight: 600; font-size: 10px; cursor: pointer; }
.action-btn:hover { background: var(--maroon); color: white; }

.content { flex: 1; overflow-y: auto; padding: 20px; }

.header { margin-bottom: 20px; }
.header-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.header-date { color: var(--text-sec); font-size: 11px; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
.stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
.stat-value { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; margin: 4px 0; }
.stat-label { font-size: 10px; color: var(--text-mute); text-transform: uppercase; }

.chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; margin-bottom: 20px; }
.chart-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px; }
.chart-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.chart-sub { font-size: 11px; color: var(--text-mute); margin-bottom: 10px; }
.chart-container { position: relative; height: 250px; }

.table-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px; overflow-x: auto; }
.table-box table { width: 100%; border-collapse: collapse; }
.table-box th { background: rgba(196,30,48,0.08); padding: 8px; text-align: left; font-size: 9px; font-weight: 700; color: var(--text-sec); text-transform: uppercase; border-bottom: 1px solid var(--border); }
.table-box td { padding: 8px; border-bottom: 1px solid var(--border); font-size: 11px; }
.table-box tr:hover { background: rgba(196,30,48,0.05); }

.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 9px; font-weight: 600; text-transform: uppercase; }
.badge-present { background: rgba(34,197,94,0.2); color: #22C55E; }
.badge-absent { background: rgba(239,68,68,0.2); color: #EF4444; }
.badge-late { background: rgba(251,191,36,0.2); color: #FBB924; }

.search-input { width: 100%; padding: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; margin-bottom: 15px; }
.search-input:focus { outline: none; border-color: var(--maroon); }

.filter-group { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
.filter-btn { padding: 7px 12px; background: rgba(196,30,48,0.12); border: 1px solid rgba(196,30,48,0.25); border-radius: 6px; color: var(--text-sec); font-size: 11px; cursor: pointer; }
.filter-btn.active { background: var(--maroon); color: white; border-color: var(--maroon); }
.filter-btn:hover { background: rgba(196,30,48,0.2); }

.staff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-bottom: 20px; }
.staff-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px; }
.staff-avatar { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, var(--maroon), var(--gold)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; margin-bottom: 10px; }
.staff-name { font-weight: 600; font-size: 12px; margin-bottom: 2px; }
.staff-role { color: var(--text-mute); font-size: 11px; margin-bottom: 8px; }
.staff-info { font-size: 10px; color: var(--text-sec); margin: 2px 0; }

.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.modal.active { display: flex; }

.modal-box { background: var(--surface); border-radius: 14px; padding: 20px; width: 90%; max-width: 500px; max-height: 70vh; overflow-y: auto; border: 1px solid var(--border); }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
.modal-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-mute); }

.camera-area { width: 100%; height: 200px; background: #222; border-radius: 10px; margin: 10px 0; display: flex; align-items: center; justify-content: center; color: var(--text-mute); font-size: 12px; }

.btn-group { display: flex; gap: 8px; margin-top: 15px; }
.btn-primary { flex: 1; padding: 9px; background: var(--maroon); border: none; border-radius: 6px; color: white; font-weight: 600; font-size: 11px; cursor: pointer; }
.btn-primary:hover { opacity: 0.9; }
.btn-secondary { flex: 1; padding: 9px; background: rgba(196,30,48,0.15); border: 1px solid rgba(196,30,48,0.25); border-radius: 6px; color: var(--maroon); font-weight: 600; font-size: 11px; cursor: pointer; }

@media (max-width: 1024px) {
  .chart-grid { grid-template-columns: 1fr; }
  .staff-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 768px) {
  .login { flex-direction: column; }
  .app { flex-direction: column; }
  
  .sidebar { width: 100%; max-height: 60px; flex-direction: row; border-bottom: 1px solid var(--border); border-right: none; padding: 10px 15px; }
  .sidebar-brand { margin-bottom: 0; margin-right: auto; font-size: 14px; }
  .nav-group, .sidebar-footer { display: none; }
  
  .content { padding: 15px; }
  .header-title { font-size: 20px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .chart-grid { grid-template-columns: 1fr; }
  .staff-grid { grid-template-columns: 1fr; }
  .table-box th, .table-box td { padding: 6px; font-size: 10px; }
  .topbar { padding: 0 15px; }
  .login-card { max-width: 95%; padding: 25px; }
}

@media (max-width: 480px) {
  .splash-text { font-size: 36px; }
  .logo-3d { width: 120px; height: 120px; }
  .logo-badge { width: 100px; height: 100px; }
  .login-title { font-size: 28px; }
  .content { padding: 12px; }
  .header-title { font-size: 18px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .stat-value { font-size: 22px; }
  .staff-grid { grid-template-columns: 1fr; }
  .chart-container { height: 200px; }
}
</style>
</head>

function Splash({ onDone }) {
  useEffect(() => { setTimeout(onDone, 3500); }, [onDone]);
  return (<div className="splash"><div className="logo-3d"><Logo /></div><div className="splash-text">UMEED</div><div className="splash-sub">EDUCATION SYSTEM</div></div>);
}

function Login({ onAuth }) {
  const [email, setEmail] = useState('principal@umeededu.pk');
  const [pass, setPass] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  const submit = (e) => {
    e.preventDefault();
    if (!email || !pass) { setErr('Email and password required'); return; }
    setLoading(true);
    setTimeout(() => {
      if (email === 'principal@umeededu.pk' && pass === 'admin123') {
        onAuth({ name: 'H.M. Tariq Mehmood', role: 'Principal' });
      } else {
        setErr('Invalid credentials');
      }
      setLoading(false);
    }, 300);
  };

  return (<div className="login"><div className="login-left"><div className="logo-badge"><Logo /></div><h1 className="login-title">UMEED</h1><p className="login-subtitle">EDUCATION SYSTEM</p><p className="login-desc">Staff Attendance Management</p></div><div className="login-right"><div className="login-card"><h2 className="card-title">Admin Portal</h2><p className="card-sub">Sign in to your account</p>{err && <div className="error-msg">{err}</div>}<form onSubmit={submit}><div className="form-group"><label className="form-label">Email</label><input type="email" className="form-input" value={email} onChange={(e) => setEmail(e.target.value)} disabled={loading} /></div><div className="form-group"><label className="form-label">Password</label><input type="password" className="form-input" value={pass} onChange={(e) => setPass(e.target.value)} disabled={loading} /></div><button type="submit" className="submit-btn" disabled={loading}>{loading ? 'Signing in...' : 'Sign In'}</button></form></div></div></div>);
}

function Dashboard() {
  const canvasRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current) return;
    try {
      const ctx = canvasRef.current.getContext('2d');
      new window.Chart(ctx, {
        type: 'doughnut',
        data: { labels: ['Present', 'Absent', 'Late'], datasets: [{ data: [32, 8, 5], backgroundColor: ['rgba(34, 197, 94, 0.8)', 'rgba(239, 68, 68, 0.8)', 'rgba(251, 191, 36, 0.8)'], borderColor: ['#22C55E', '#EF4444', '#FBB924'], borderWidth: 2 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: 'var(--text-sec)', font: { size: 11 } } } } }
      });
    } catch (e) { console.log('Chart error:', e); }
  }, []);

  return (<>
    <div className="header"><h1 className="header-title">Dashboard</h1><p className="header-date">{new Date().toLocaleDateString()}</p></div>
    <div className="stats-grid">
      <div className="stat-box"><div className="stat-value" style={{color: 'var(--gold)'}}>46</div><div className="stat-label">Total Staff</div></div>
      <div className="stat-box"><div className="stat-value" style={{color: 'var(--success)'}}>32</div><div className="stat-label">Present</div></div>
      <div className="stat-box"><div className="stat-value" style={{color: 'var(--error)'}}>8</div><div className="stat-label">Absent</div></div>
      <div className="stat-box"><div className="stat-value" style={{color: 'var(--warning)'}}>5</div><div className="stat-label">Late</div></div>
    </div>
    <div className="chart-grid">
      <div className="chart-box"><div className="chart-title">Attendance Status</div><div className="chart-sub">Today's distribution</div><div className="chart-container"><canvas ref={canvasRef}></canvas></div></div>
    </div>
    <div className="table-box">
      <h3 style={{fontSize: 12, marginBottom: 12, fontWeight: 600}}>Today's Attendance</h3>
      <table>
        <thead><tr><th>ID</th><th>Name</th><th>Time</th><th>Status</th></tr></thead>
        <tbody>
          <tr><td>UES-001</td><td>H.M. Tariq Mehmood</td><td>07:45</td><td><span className="badge badge-present">Present</span></td></tr>
          <tr><td>UES-002</td><td>Mrs. Ruqaiya</td><td>08:00</td><td><span className="badge badge-present">Present</span></td></tr>
          <tr><td>UES-003</td><td>Mr. Muhammad</td><td>08:35</td><td><span className="badge badge-late">Late</span></td></tr>
          <tr><td>UES-004</td><td>Miss Tayyaba</td><td>—</td><td><span className="badge badge-absent">Absent</span></td></tr>
        </tbody>
      </table>
    </div>
  </>);
}

function Staff() {
  const [search, setSearch] = useState('');
  const staffList = [
    {id: 'UES-001', name: 'H.M. Tariq Mehmood', role: 'Principal', dept: 'Admin'},
    {id: 'UES-002', name: 'Mrs. Ruqaiya', role: 'Co-Principal', dept: 'Admin'},
    {id: 'UES-003', name: 'Miss Ayesha', role: 'Teacher', dept: 'Primary'},
    {id: 'UES-004', name: 'Mr. Bilal', role: 'Teacher', dept: 'Secondary'},
    {id: 'UES-005', name: 'Miss Iqra', role: 'Assistant', dept: 'Primary'},
  ];

  const filtered = staffList.filter(s => s.name.toLowerCase().includes(search.toLowerCase()) || s.id.includes(search));

  return (<>
    <div className="header"><h1 className="header-title">Staff Directory</h1><p className="header-date">Total: {filtered.length} staff</p></div>
    <input type="text" className="search-input" placeholder="Search by name or ID..." value={search} onChange={(e) => setSearch(e.target.value)} />
    <div className="staff-grid">
      {filtered.map(staff => (
        <div key={staff.id} className="staff-card">
          <div className="staff-avatar">{staff.name.split(' ')[0][0]}</div>
          <div className="staff-name">{staff.name}</div>
          <div className="staff-role">{staff.role}</div>
          <div className="staff-info">Dept: {staff.dept}</div>
          <div className="staff-info">ID: {staff.id}</div>
        </div>
      ))}
    </div>
  </>);
}

function Attendance() {
  const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
  const records = [
    {id: 'UES-001', name: 'H.M. Tariq', time: '07:45', status: 'Present'},
    {id: 'UES-002', name: 'Mrs. Ruqaiya', time: '08:00', status: 'Present'},
    {id: 'UES-003', name: 'Mr. Bilal', time: '08:35', status: 'Late'},
    {id: 'UES-004', name: 'Miss Tayyaba', time: '—', status: 'Absent'},
  ];

  return (<>
    <div className="header"><h1 className="header-title">Attendance Records</h1><p className="header-date">Daily tracking</p></div>
    <div style={{marginBottom: 15}}><label className="form-label">Date</label><input type="date" className="search-input" value={date} onChange={(e) => setDate(e.target.value)} /></div>
    <div className="table-box">
      <table>
        <thead><tr><th>ID</th><th>Name</th><th>Check-in</th><th>Status</th></tr></thead>
        <tbody>
          {records.map((r, i) => (<tr key={i}><td>{r.id}</td><td>{r.name}</td><td>{r.time}</td><td><span className={`badge badge-${r.status.toLowerCase()}`}>{r.status}</span></td></tr>))}
        </tbody>
      </table>
    </div>
  </>);
}

function Leaves() {
  const [filter, setFilter] = useState('All');
  const leaves = [
    {id: 'L-001', name: 'H.M. Tariq', type: 'Annual', from: '2025-03-15', to: '2025-03-20', status: 'Approved'},
    {id: 'L-002', name: 'Miss Ayesha', type: 'Sick', from: '2025-03-22', to: '2025-03-23', status: 'Pending'},
    {id: 'L-003', name: 'Mr. Bilal', type: 'Annual', from: '2025-04-01', to: '2025-04-10', status: 'Pending'},
  ];

  const filtered = filter === 'All' ? leaves : leaves.filter(l => l.status === filter);

  return (<>
    <div className="header"><h1 className="header-title">Leave Management</h1><p className="header-date">Leave requests and approvals</p></div>
    <div className="filter-group">
      {['All', 'Pending', 'Approved'].map(f => (<button key={f} className={`filter-btn ${filter === f ? 'active' : ''}`} onClick={() => setFilter(f)}>{f}</button>))}
    </div>
    <div className="table-box">
      <table>
        <thead><tr><th>ID</th><th>Name</th><th>Type</th><th>From</th><th>To</th><th>Status</th></tr></thead>
        <tbody>
          {filtered.map((l, i) => (<tr key={i}><td>{l.id}</td><td>{l.name}</td><td>{l.type}</td><td>{l.from}</td><td>{l.to}</td><td><span className={`badge badge-${l.status.toLowerCase()}`}>{l.status}</span></td></tr>))}
        </tbody>
      </table>
    </div>
  </>);
}

function Reports() {
  return (<>
    <div className="header"><h1 className="header-title">Reports</h1><p className="header-date">Attendance analytics and statistics</p></div>
    <div className="table-box">
      <h3 style={{fontSize: 12, marginBottom: 12, fontWeight: 600}}>Monthly Summary</h3>
      <table>
        <thead><tr><th>Month</th><th>Present</th><th>Absent</th><th>Late</th><th>Percentage</th></tr></thead>
        <tbody>
          <tr><td>January</td><td>35</td><td>7</td><td>4</td><td>75.2%</td></tr>
          <tr><td>February</td><td>34</td><td>9</td><td>3</td><td>72.9%</td></tr>
          <tr><td>March</td><td>36</td><td>6</td><td>4</td><td>77.1%</td></tr>
        </tbody>
      </table>
    </div>
  </>);
}

function App() {
  const [splash, setSplash] = useState(true);
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('dashboard');

  useEffect(() => {
    const saved = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
  }, []);

  if (splash) return <Splash onDone={() => setSplash(false)} />;
  if (!user) return <Login onAuth={setUser} />;

  return (<div className="app">
    <div className="sidebar">
      <div className="sidebar-brand">UMEED</div>
      <div className="nav-group">
        <div className="nav-label">Navigation</div>
        <button className={`nav-btn ${page === 'dashboard' ? 'active' : ''}`} onClick={() => setPage('dashboard')}>Dashboard</button>
        <button className={`nav-btn ${page === 'staff' ? 'active' : ''}`} onClick={() => setPage('staff')}>Staff</button>
        <button className={`nav-btn ${page === 'attendance' ? 'active' : ''}`} onClick={() => setPage('attendance')}>Attendance</button>
        <button className={`nav-btn ${page === 'leaves' ? 'active' : ''}`} onClick={() => setPage('leaves')}>Leaves</button>
        <button className={`nav-btn ${page === 'reports' ? 'active' : ''}`} onClick={() => setPage('reports')}>Reports</button>
      </div>
      <div className="sidebar-footer">
        <div className="user-card"><div className="user-name">{user.name}</div><div className="user-role">{user.role}</div></div>
        <button className="logout-btn" onClick={() => setUser(null)}>Logout</button>
      </div>
    </div>

    <div className="main">
      <div className="topbar">
        <div className="topbar-title">Umeed Education System</div>
        <div className="topbar-actions">
          <button className="theme-btn" onClick={() => { const h = document.documentElement; const curr = h.getAttribute('data-theme'); const next = curr === 'dark' ? 'light' : 'dark'; h.setAttribute('data-theme', next); localStorage.setItem('theme', next); }}>{document.documentElement.getAttribute('data-theme') === 'dark' ? '🌙' : '☀️'}</button>
          <button className="action-btn" onClick={() => window.print()}>Print</button>
        </div>
      </div>
      <div className="content">
        {page === 'dashboard' && <Dashboard />}
        {page === 'staff' && <Staff />}
        {page === 'attendance' && <Attendance />}
        {page === 'leaves' && <Leaves />}
        {page === 'reports' && <Reports />}
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
