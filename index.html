<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umeed Education System v4.0</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Lora:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<style>
:root{--primary:#C41E30;--primary-dark:#7A0E1A;--primary-glow:rgba(196,30,48,0.15);--gold:#D4AF37;--gold-dark:#B8941E;--bg:#0A0A0F;--surface:#14141C;--surface2:#1C1C28;--surface3:#242434;--text:#F0F0F8;--text2:#A0A0B0;--text3:#606070;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);--success:#10B981;--warning:#F59E0B;--danger:#EF4444;}
.light-mode{--bg:#F2F2F7;--surface:#FFFFFF;--surface2:#F0F0F6;--surface3:#E8E8F0;--text:#1A1A2E;--text2:#4A4A6A;--text3:#8A8AAA;--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);}
*{margin:0;padding:0;box-sizing:border-box;}html,body,#root{height:100%;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;line-height:1.5;transition:background .3s,color .3s;}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(196,30,48,.3);border-radius:10px;}
.splash{display:flex;height:100vh;align-items:center;justify-content:center;background:linear-gradient(135deg,#06060C,#12121E);flex-direction:column;gap:28px;}
.splash-logo{width:150px;height:150px;animation:floatLogo 3s ease-in-out infinite;filter:drop-shadow(0 20px 50px rgba(196,30,48,.5));}
.splash-logo img{width:100%;height:100%;object-fit:contain;}
@keyframes floatLogo{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-12px) scale(1.03);}}
.splash-title{font-family:'Lora',serif;font-size:46px;font-weight:700;letter-spacing:-1px;background:linear-gradient(135deg,#fff,#D4AF37);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.splash-sub{font-size:12px;color:#D4AF37;letter-spacing:4px;font-weight:500;}
.splash-bar{width:180px;height:3px;background:rgba(255,255,255,.08);border-radius:10px;overflow:hidden;}
.splash-bar-fill{height:100%;background:linear-gradient(90deg,#C41E30,#D4AF37);border-radius:10px;animation:barFill 4s ease forwards;}
@keyframes barFill{from{width:0}to{width:100%}}
.login-wrap{display:flex;height:100vh;background:linear-gradient(135deg,#06060C,#12121E);}
.login-left{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:18px;}
.login-logo{width:120px;height:120px;filter:drop-shadow(0 15px 40px rgba(196,30,48,.4));}
.login-logo img{width:100%;height:100%;object-fit:contain;}
.login-brand{font-family:'Lora',serif;font-size:38px;font-weight:700;background:linear-gradient(135deg,#fff,#D4AF37);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.login-tagline{font-size:11px;color:#D4AF37;letter-spacing:3px;}
.login-right{flex:1;display:flex;align-items:center;justify-content:center;padding:60px;}
.login-box{background:rgba(28,28,40,.92);backdrop-filter:blur(20px);border:1px solid rgba(212,175,55,.12);border-radius:24px;padding:50px;width:100%;max-width:420px;box-shadow:0 30px 80px rgba(0,0,0,.6);}
.form-title{font-family:'Lora',serif;font-size:25px;font-weight:700;color:#D4AF37;margin-bottom:8px;}
.form-desc{color:var(--text3);font-size:12px;margin-bottom:30px;}
.form-group{margin-bottom:20px;}
.form-label{display:block;color:var(--text3);font-size:10px;font-weight:700;margin-bottom:7px;text-transform:uppercase;letter-spacing:1px;}
.form-input{width:100%;padding:12px 15px;background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:13px;font-family:'Sora',sans-serif;transition:all .2s;}
.form-input:focus{outline:none;border-color:#C41E30;box-shadow:0 0 0 3px rgba(196,30,48,.1);}
.form-input::placeholder{color:var(--text3);}
.btn-login{width:100%;padding:13px;background:linear-gradient(135deg,#C41E30,#7A0E1A);border:none;border-radius:10px;color:#fff;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s;margin-top:8px;text-transform:uppercase;letter-spacing:1px;font-family:'Sora',sans-serif;}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 14px 36px rgba(196,30,48,.35);}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.error-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5;padding:11px 14px;border-radius:10px;font-size:12px;margin-bottom:16px;animation:shake .4s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.shell{display:flex;height:100vh;background:var(--bg);}
.sidebar{width:265px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:26px 16px;overflow-y:auto;flex-shrink:0;transition:background .3s;}
.brand{display:flex;align-items:center;gap:11px;margin-bottom:30px;padding-bottom:18px;border-bottom:1px solid var(--border);}
.brand-logo{width:52px;height:52px;flex-shrink:0;}
.brand-logo img{width:100%;height:100%;object-fit:contain;}
.brand-name{font-family:'Lora',serif;font-size:12px;font-weight:700;color:#D4AF37;text-transform:uppercase;letter-spacing:1.5px;line-height:1.3;}
.brand-ver{font-size:9px;color:var(--text3);margin-top:2px;}
.nav-group{margin-bottom:22px;}
.nav-group-label{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin:0 10px 9px;display:block;}
.nav-btn{width:100%;padding:10px 13px;background:transparent;border:none;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;border-radius:8px;transition:all .15s;text-align:left;margin-bottom:3px;display:flex;align-items:center;gap:9px;font-family:'Sora',sans-serif;}
.nav-btn:hover{background:var(--primary-glow);color:var(--text);}
.nav-btn.active{background:linear-gradient(135deg,rgba(196,30,48,.22),rgba(196,30,48,.1));color:#D4AF37;font-weight:600;border-left:3px solid #C41E30;padding-left:10px;}
.nav-icon{font-size:14px;width:18px;text-align:center;}
.sidebar-footer{margin-top:auto;padding-top:16px;border-top:1px solid var(--border);}
.user-card{background:var(--primary-glow);border:1px solid rgba(196,30,48,.15);border-radius:10px;padding:13px;margin-bottom:10px;}
.user-avatar{width:34px;height:34px;background:linear-gradient(135deg,#C41E30,#7A0E1A);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;margin-bottom:7px;}
.user-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px;}
.user-role{font-size:10px;color:var(--text3);}
.btn-logout{width:100%;padding:9px;background:rgba(196,30,48,.1);border:1px solid rgba(196,30,48,.2);color:#C41E30;border-radius:8px;font-weight:600;font-size:11px;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.5px;font-family:'Sora',sans-serif;}
.btn-logout:hover{background:rgba(196,30,48,.2);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:66px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 34px;flex-shrink:0;transition:background .3s;}
.topbar-title{font-family:'Lora',serif;font-size:16px;font-weight:600;}
.topbar-right{display:flex;gap:9px;align-items:center;}
.btn-icon{padding:7px 13px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Sora',sans-serif;}
.btn-icon:hover{background:var(--primary-glow);color:var(--text);border-color:rgba(196,30,48,.3);}
.content{flex:1;overflow-y:auto;padding:34px;}
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:30px;flex-wrap:wrap;gap:14px;}
.page-title{font-family:'Lora',serif;font-size:27px;font-weight:700;margin-bottom:4px;}
.page-sub{color:var(--text2);font-size:12px;}
.page-hdr-right{display:flex;gap:9px;align-items:center;flex-wrap:wrap;}
.btn-primary{padding:9px 20px;background:linear-gradient(135deg,#C41E30,#7A0E1A);border:none;color:#fff;border-radius:9px;font-weight:600;font-size:11px;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.6px;font-family:'Sora',sans-serif;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(196,30,48,.3);}
.btn-gold{padding:9px 20px;background:linear-gradient(135deg,#D4AF37,#B8941E);border:none;color:#000;border-radius:9px;font-weight:700;font-size:11px;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.6px;font-family:'Sora',sans-serif;}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(212,175,55,.3);}
.btn-outline{padding:7px 14px;background:transparent;border:1px solid var(--border2);color:var(--text2);border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Sora',sans-serif;}
.btn-outline:hover{background:var(--surface2);color:var(--text);}
.btn-outline.active{background:var(--primary-glow);border-color:rgba(196,30,48,.4);color:#C41E30;}
.btn-sm{padding:5px 11px;font-size:10px;border-radius:6px;}
.btn-danger{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#fca5a5;padding:5px 11px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Sora',sans-serif;}
.btn-danger:hover{background:rgba(239,68,68,.22);}
.btn-success{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);color:#6ee7b7;padding:5px 11px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Sora',sans-serif;}
.btn-success:hover{background:rgba(16,185,129,.22);}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:16px;margin-bottom:28px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;position:relative;overflow:hidden;transition:all .2s;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.stat-card.gold::before{background:linear-gradient(90deg,#D4AF37,#B8941E);}
.stat-card.green::before{background:linear-gradient(90deg,#10B981,#059669);}
.stat-card.red::before{background:linear-gradient(90deg,#EF4444,#DC2626);}
.stat-card.amber::before{background:linear-gradient(90deg,#F59E0B,#D97706);}
.stat-card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.2);}
.stat-icon{font-size:20px;margin-bottom:10px;}
.stat-val{font-family:'Lora',serif;font-size:32px;font-weight:700;margin-bottom:4px;}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-weight:600;}
.stat-trend{font-size:10px;color:#10B981;margin-top:5px;}
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:16px;margin-bottom:28px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;transition:background .3s;}
.card-hdr{margin-bottom:16px;}
.card-title{font-family:'Lora',serif;font-size:14px;font-weight:600;margin-bottom:3px;}
.card-meta{font-size:11px;color:var(--text3);}
.chart-wrap{position:relative;height:250px;}
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:background .3s;margin-bottom:20px;}
.table-card-hdr{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.table-card-title{font-family:'Lora',serif;font-size:14px;font-weight:600;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{padding:12px 16px;text-align:left;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap;}
td{padding:13px 16px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text);}
tbody tr:hover{background:var(--surface2);}
tbody tr:last-child td{border-bottom:none;}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.badge-present{background:rgba(16,185,129,.12);color:#6ee7b7;border:1px solid rgba(16,185,129,.2);}
.badge-present::before{background:#10B981;}
.badge-absent{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.2);}
.badge-absent::before{background:#EF4444;}
.badge-late{background:rgba(245,158,11,.12);color:#fcd34d;border:1px solid rgba(245,158,11,.2);}
.badge-late::before{background:#F59E0B;}
.badge-pending{background:rgba(59,130,246,.12);color:#93c5fd;border:1px solid rgba(59,130,246,.2);}
.badge-pending::before{background:#3B82F6;}
.badge-approved{background:rgba(16,185,129,.12);color:#6ee7b7;border:1px solid rgba(16,185,129,.2);}
.badge-approved::before{background:#10B981;}
.badge-rejected{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.2);}
.badge-rejected::before{background:#EF4444;}
.badge-success{background:rgba(16,185,129,.12);color:#6ee7b7;border:1px solid rgba(16,185,129,.2);}
.badge-success::before{background:#10B981;}
.badge-failed{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.2);}
.badge-failed::before{background:#EF4444;}
.staff-controls{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.search-input{padding:9px 14px;background:var(--surface);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-size:12px;font-family:'Sora',sans-serif;width:240px;transition:all .2s;}
.search-input:focus{outline:none;border-color:#C41E30;box-shadow:0 0 0 3px rgba(196,30,48,.1);}
.search-input::placeholder{color:var(--text3);}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;}
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;}
.staff-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;transition:all .2s;}
.staff-card:hover{transform:translateY(-3px);border-color:rgba(196,30,48,.3);box-shadow:0 10px 28px rgba(0,0,0,.2);}
.staff-avatar{width:44px;height:44px;background:linear-gradient(135deg,#C41E30,#7A0E1A);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;margin-bottom:10px;}
.staff-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;}
.staff-role{font-size:11px;color:var(--text3);margin-bottom:5px;}
.staff-dept{display:inline-block;padding:2px 7px;background:var(--primary-glow);border:1px solid rgba(196,30,48,.2);border-radius:5px;font-size:9px;font-weight:700;color:#C41E30;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.staff-id{font-size:10px;color:var(--text3);margin-bottom:10px;font-family:monospace;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.overlay.open{display:flex;}
.modal{background:var(--surface2);border:1px solid rgba(196,30,48,.15);border-radius:20px;padding:34px;width:90%;max-width:500px;box-shadow:0 30px 80px rgba(0,0,0,.6);max-height:90vh;overflow-y:auto;animation:modalIn .25s ease;}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-title{font-family:'Lora',serif;font-size:19px;font-weight:700;}
.modal-close{background:none;border:none;font-size:22px;color:var(--text3);cursor:pointer;transition:color .15s;line-height:1;}
.modal-close:hover{color:var(--text);}
.modal-desc{color:var(--text2);font-size:12px;margin-bottom:20px;}
.video-el{width:100%;height:290px;background:#000;border-radius:12px;margin-bottom:16px;object-fit:cover;}
.video-placeholder{width:100%;height:290px;background:var(--surface3);border-radius:12px;margin-bottom:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3);font-size:13px;}
.cam-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5;padding:13px;border-radius:10px;font-size:12px;margin-bottom:14px;text-align:center;}
.select-input{width:100%;padding:10px 13px;background:var(--surface3);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-size:12px;font-family:'Sora',sans-serif;margin-bottom:12px;}
.select-input:focus{outline:none;border-color:#C41E30;}
.date-input{padding:9px 13px;background:var(--surface);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-size:12px;font-family:'Sora',sans-serif;}
.date-input:focus{outline:none;border-color:#C41E30;}
.modal-actions{display:flex;gap:9px;margin-top:6px;}
.modal-actions .btn-primary,.modal-actions .btn-outline{flex:1;text-align:center;}
.textarea-input{width:100%;padding:10px 13px;background:var(--surface3);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-size:12px;font-family:'Sora',sans-serif;resize:vertical;min-height:75px;margin-bottom:12px;}
.textarea-input:focus{outline:none;border-color:#C41E30;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.settings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:18px;}
.settings-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:26px;}
.settings-card-title{font-family:'Lora',serif;font-size:15px;font-weight:600;margin-bottom:18px;color:#D4AF37;}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border);}
.setting-row:last-child{border-bottom:none;}
.setting-label{font-size:13px;font-weight:500;}
.setting-desc{font-size:11px;color:var(--text3);margin-top:2px;}
.toggle{position:relative;width:42px;height:23px;cursor:pointer;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--surface3);border-radius:23px;transition:.3s;}
.toggle-slider::before{content:'';position:absolute;width:17px;height:17px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
.toggle input:checked+.toggle-slider{background:#C41E30;}
.toggle input:checked+.toggle-slider::before{transform:translateX(19px);}
.info-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:12px;}
.info-row:last-child{border-bottom:none;}
.info-key{color:var(--text3);}
.info-val{color:var(--text);font-weight:600;}
.report-controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:22px;}
.report-controls label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.report-controls input[type=date]{padding:8px 13px;background:var(--surface);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-size:12px;font-family:'Sora',sans-serif;}
.report-controls input[type=date]:focus{outline:none;border-color:#C41E30;}
.notif{position:fixed;top:22px;right:22px;z-index:9999;background:var(--surface2);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:13px 18px;font-size:12px;font-weight:600;color:#6ee7b7;box-shadow:0 10px 30px rgba(0,0,0,.4);animation:notifIn .3s ease;display:flex;align-items:center;gap:8px;}
.notif.error{border-color:rgba(239,68,68,.3);color:#fca5a5;}
@keyframes notifIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.empty-state{text-align:center;padding:55px 20px;color:var(--text3);}
.empty-icon{font-size:44px;margin-bottom:14px;}
.empty-text{font-size:14px;font-weight:500;margin-bottom:5px;color:var(--text2);}
.empty-sub{font-size:12px;}
@media(max-width:1024px){.charts-grid{grid-template-columns:1fr;}}

const DB_SETUP_SQL=`-- Run this once in Supabase SQL Editor
create extension if not exists pgcrypto;

create or replace function public.is_admin(uid uuid)
returns boolean
language sql
stable
security definer
set search_path = public
as $$
  select exists(select 1 from public.profiles p where p.id = uid and p.role = 'admin');
$$;

create table if not exists public.profiles (
  id uuid primary key references auth.users(id) on delete cascade,
  email text unique not null,
  full_name text,
  department text,
  designation text,
  role text not null default 'staff' check (role in ('admin','staff')),
  phone text,
  cnic text,
  hire_date date,
  avatar_url text,
  created_at timestamptz not null default now()
);

create table if not exists public.attendance (
  id bigint generated always as identity primary key,
  user_id uuid not null references public.profiles(id) on delete cascade,
  date date not null,
  time_in timestamptz,
  time_out timestamptz,
  status text not null default 'present' check (status in ('present','absent','late')),
  notes text,
  created_at timestamptz not null default now()
);

create table if not exists public.leaves (
  id bigint generated always as identity primary key,
  user_id uuid not null references public.profiles(id) on delete cascade,
  type text not null,
  from_date date not null,
  to_date date not null,
  reason text,
  status text not null default 'pending' check (status in ('pending','approved','rejected')),
  created_at timestamptz not null default now()
);

create table if not exists public.device_logs (
  id bigint generated always as identity primary key,
  user_id uuid references public.profiles(id) on delete set null,
  device_name text,
  action text not null,
  timestamp timestamptz not null default now(),
  created_at timestamptz not null default now()
);

create table if not exists public.monthly_reports (
  id bigint generated always as identity primary key,
  user_id uuid not null references public.profiles(id) on delete cascade,
  month text not null,
  total_days integer not null default 0,
  present integer not null default 0,
  absent integer not null default 0,
  late integer not null default 0,
  leaves integer not null default 0,
  created_at timestamptz not null default now(),
  unique(user_id, month)
);

create index if not exists idx_attendance_user_date on public.attendance(user_id, date);
create index if not exists idx_leaves_user_dates on public.leaves(user_id, from_date, to_date);
create index if not exists idx_device_logs_user_time on public.device_logs(user_id, timestamp desc);
create index if not exists idx_monthly_reports_user_month on public.monthly_reports(user_id, month);

alter table public.profiles enable row level security;
alter table public.attendance enable row level security;
alter table public.leaves enable row level security;
alter table public.device_logs enable row level security;
alter table public.monthly_reports enable row level security;

drop policy if exists profiles_select on public.profiles;

create policy profiles_select on public.profiles for select using (auth.uid() = id or public.is_admin(auth.uid()));

create policy leaves_insert on public.leaves for insert with check (auth.uid() = user_id or public.is_admin(auth.uid()));
create policy leaves_update on public.leaves for update using (auth.uid() = user_id or public.is_admin(auth.uid())) with check (auth.uid() = user_id or public.is_admin(auth.uid()));
create policy leaves_delete on public.leaves for delete using (public.is_admin(auth.uid()));

drop policy if exists device_logs_select on public.device_logs;
drop policy if exists device_logs_insert on public.device_logs;
create policy device_logs_select on public.device_logs for select using (auth.uid() = user_id or public.is_admin(auth.uid()));
create policy device_logs_insert on public.device_logs for insert with check (auth.uid() = user_id or public.is_admin(auth.uid()));

drop policy if exists monthly_reports_select on public.monthly_reports;
drop policy if exists monthly_reports_insert on public.monthly_reports;
drop policy if exists monthly_reports_update on public.monthly_reports;

create policy monthly_reports_insert on public.monthly_reports for insert with check (auth.uid() = user_id or public.is_admin(auth.uid()));
create policy monthly_reports_update on public.monthly_reports for update using (auth.uid() = user_id or public.is_admin(auth.uid())) with check (auth.uid() = user_id or public.is_admin(auth.uid()));
create policy monthly_reports_delete on public.monthly_reports for delete using (public.is_admin(auth.uid()));

function initials(n){return (n||"U").split(" ").filter(Boolean).slice(0,2).map(w=>w[0]).join("").toUpperCase()||"U";}
function todayStr(){return new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});}
function nowTime(ts){const d=ts?new Date(ts):new Date();return d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});}
function diffDays(a,b){return Math.max(1,Math.round((new Date(b)-new Date(a))/(1000*60*60*24))+1);}
function cap(t){return t?String(t).charAt(0).toUpperCase()+String(t).slice(1):"";}
function safeDate(d){if(!d)return "—";const v=new Date(d+"T00:00:00");return Number.isNaN(v.getTime())?d:v.toLocaleDateString("en-US");}
function monthLabel(month){if(!month)return "—";const [y,m]=month.split("-");const dt=new Date(Number(y),Number(m)-1,1);return dt.toLocaleDateString("en-US",{month:"long",year:"numeric"});}
function monthKeyFromDate(dateStr){const d=new Date(dateStr);if(Number.isNaN(d.getTime()))return "";return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;}
function parseDevice(){const ua=navigator.userAgent||"Unknown";if(ua.includes("Chrome"))return "Chrome";if(ua.includes("Firefox"))return "Firefox";if(ua.includes("Safari")&&!ua.includes("Chrome"))return "Safari";if(ua.includes("Edg"))return "Edge";return "Browser";}
function parseOS(){const ua=navigator.userAgent||"";if(ua.includes("Windows"))return "Windows";if(ua.includes("Mac"))return "macOS";if(ua.includes("Android"))return "Android";if(ua.includes("iPhone")||ua.includes("iPad"))return "iOS";if(ua.includes("Linux"))return "Linux";return "OS";}

function Notif({msg,type,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,3200);return()=>clearTimeout(t);},[]);
  return React.createElement("div",{className:"notif"+(type==="error"?" error":"")},[
    React.createElement("span",{key:"i"},type==="error"?"✗":"✓"),
    msg
  ]);
}

function Splash({onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2200);return()=>clearTimeout(t);},[]);
  return(
    <div className="splash">
      <div className="splash-logo"><img src={LOGO} alt="UMEED"/></div>
      <div className="splash-title">UMEED</div>
      <div className="splash-sub">EDUCATION SYSTEM</div>
      <div className="splash-bar"><div className="splash-bar-fill"/></div>
    </div>
  );
}

      phone:user.user_metadata?.phone||null,
      cnic:user.user_metadata?.cnic||null,
      hire_date:user.user_metadata?.hire_date||null,
      avatar_url:user.user_metadata?.avatar_url||null,
    };
    await supabaseClient.from("profiles").upsert(profile,{onConflict:"id"});
  };

  const submit=async(e)=>{
    e.preventDefault();
    setErr("");
    if(!email||!pass){setErr("Email and password required");return;}
    setLoading(true);
    const norm=email.trim().toLowerCase();

    try{
      let {data,error}=await supabaseClient.auth.signInWithPassword({email:norm,password:pass});
      if(error){
        const isBootstrapAdmin=norm===ADMIN_EMAIL&&pass===ADMIN_PASSWORD;
        if(!isBootstrapAdmin){
          setErr(error.message||"Login failed");
          setLoading(false);
          return;
        }

        const signup=await supabaseClient.auth.signUp({
          email:ADMIN_EMAIL,
          password:ADMIN_PASSWORD,
          options:{
            emailRedirectTo:window.location.href.split("#")[0],
            data:{full_name:"H.M. Tariq Mehmood",department:"Admin",designation:"Principal",role:"admin"}
          }
        });

        if(signup.error && !String(signup.error.message||"").toLowerCase().includes("already registered")){
          setErr(signup.error.message||"Unable to create default admin user");
          setLoading(false);
          return;
        }

        const retry=await supabaseClient.auth.signInWithPassword({email:ADMIN_EMAIL,password:ADMIN_PASSWORD});
        if(retry.error){
          setErr(retry.error.message||"Admin created, but automatic login failed");
          setLoading(false);
          return;
        }
        data=retry.data;
      }

      if(data?.user && (data.user.email||"").toLowerCase()===ADMIN_EMAIL){await ensureAdminProfile(data.user);}
      onLoggedIn();
    }catch(ex){
      setErr(ex.message||"Unexpected login error");
    }finally{setLoading(false);}
  };

  return(
    <div className="login-wrap">
      <div className="login-left">
        <div className="login-logo"><img src={LOGO} alt="UMEED"/></div>
        <div className="login-brand">UMEED</div>
        <div className="login-tagline">EDUCATION SYSTEM</div>
      </div>
      <div className="login-right">
        <div className="login-box">
          <div className="form-title">Supabase Login</div>
          <div className="form-desc">Sign in with your official account</div>
          {err&&<div className="error-box">{err}</div>}
          <form onSubmit={submit}>
            <div className="form-group">
              <label className="form-label">Email Address</label>
              <input className="form-input" type="email" value={email} onChange={e=>setEmail(e.target.value)} disabled={loading}/>
            </div>
            <div className="form-group">
              <label className="form-label">Password</label>
              <input className="form-input" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Enter password" disabled={loading}/>
            </div>
            <button className="btn-login" type="submit" disabled={loading}>{loading?"Signing in…":"Sign In"}</button>
          </form>
        </div>
      </div>
    </div>
  );
}

function CameraModal({open,onClose,onCapture,staffOptions,isAdmin,currentUserId,preselectedUserId}){
  const videoRef=useRef(null);
  const streamRef=useRef(null);
  const [ready,setReady]=useState(false);
  const [camErr,setCamErr]=useState("");
  const [status,setStatus]=useState("present");
  const [staffSel,setStaffSel]=useState(preselectedUserId||currentUserId||"");

  useEffect(()=>{
    setStaffSel(preselectedUserId||(isAdmin?staffOptions?.[0]?.id:currentUserId)||"");
  },[preselectedUserId,currentUserId,isAdmin,staffOptions]);

  const stopStream=()=>{
    if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}
  };

  useEffect(()=>{
    if(!open){stopStream();setReady(false);setCamErr("");return;}
    setCamErr("");setReady(false);
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
      setCamErr("Camera API not available. Please use HTTPS or localhost.");return;
    }
    navigator.mediaDevices.getUserMedia({video:{facingMode:"user"},audio:false})
      .then(stream=>{
        streamRef.current=stream;
        if(videoRef.current){
          videoRef.current.srcObject=stream;
          videoRef.current.onloadedmetadata=()=>{videoRef.current.play();setReady(true);};
        }
      })
      .catch(err=>{
        if(err.name==="NotAllowedError")setCamErr("Camera permission denied. Allow camera access in browser settings.");
        else if(err.name==="NotFoundError")setCamErr("No camera found on this device.");
        else if(err.name==="NotReadableError")setCamErr("Camera is in use by another application.");
        else setCamErr("Camera error: "+err.message);
      });
    return stopStream;
  },[open]);

  const capture=()=>{
    const userId=isAdmin?staffSel:currentUserId;
    if(!userId)return;
    onCapture(userId,status);
    onClose();
  };

  return(
    <div className={"overlay"+(open?" open":"")} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div className="modal-hdr">
          <div className="modal-title">📷 Camera Attendance</div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-desc">Face camera, choose status, and mark attendance. Staff can mark only their own attendance.</div>
        {camErr?(
          <div className="cam-error">{camErr}<br/><small style={{opacity:.7}}>Note: Camera requires HTTPS or localhost</small></div>
        ):(
          <>
            <video ref={videoRef} className="video-el" autoPlay playsInline muted style={{display:ready?"block":"none"}}/>
            {!ready&&<div className="video-placeholder"><span style={{fontSize:34}}>📷</span><span>Starting camera…</span></div>}
          </>
        )}
        <label className="form-label">Staff Member</label>
        <select className="select-input" value={isAdmin?staffSel:currentUserId} onChange={e=>setStaffSel(e.target.value)} disabled={!isAdmin}>
          {(staffOptions||[]).map(s=><option key={s.id} value={s.id}>{s.full_name||s.email}</option>)}
        </select>
        <label className="form-label">Status</label>
        <select className="select-input" value={status} onChange={e=>setStatus(e.target.value)}>
          <option value="present">Present</option>
          <option value="late">Late</option>
          <option value="absent">Absent</option>
        </select>
        <div className="modal-actions">
          <button className="btn-primary" onClick={capture}>✓ Mark {cap(status)}</button>
          <button className="btn-outline" onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

function DonutChart({present,absent,late}){
  const ref=useRef(null);const chart=useRef(null);
  useEffect(()=>{
    if(!ref.current||!window.Chart)return;
    if(chart.current)chart.current.destroy();
    chart.current=new window.Chart(ref.current.getContext("2d"),{
      type:"doughnut",
      data:{labels:["Present","Absent","Late"],datasets:[{data:[present,absent,late],backgroundColor:["#10B981","#EF4444","#F59E0B"],borderColor:["#059669","#DC2626","#D97706"],borderWidth:2,hoverOffset:8}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:"68%",plugins:{legend:{position:"bottom",labels:{color:"#A0A0B0",padding:14,font:{size:11,weight:"600"}}},tooltip:{callbacks:{label:ctx=>" "+ctx.label+": "+ctx.raw}}}}
    });
    return()=>{if(chart.current)chart.current.destroy();};
  },[present,absent,late]);
  return <canvas ref={ref}/>;
}

function LineChart({rows}){
  const ref=useRef(null);const chart=useRef(null);
  useEffect(()=>{
    if(!ref.current||!window.Chart)return;
    if(chart.current)chart.current.destroy();
    const ctx=ref.current.getContext("2d");
    const grad=ctx.createLinearGradient(0,0,0,250);
    grad.addColorStop(0,"rgba(16,185,129,0.22)");grad.addColorStop(1,"rgba(16,185,129,0)");
    const labels=rows.map(r=>monthLabel(r.month));
    const data=rows.map(r=>r.present||0);
    chart.current=new window.Chart(ctx,{
      type:"line",
      data:{labels,datasets:[{label:"Present",data,borderColor:"#10B981",backgroundColor:grad,borderWidth:2.5,pointRadius:4,pointBackgroundColor:"#10B981",tension:0.4,fill:true}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#A0A0B0",font:{size:11,weight:"600"}}}},scales:{y:{beginAtZero:true,grid:{color:"rgba(255,255,255,0.04)"},ticks:{color:"#606070",font:{size:10}}},x:{grid:{display:false},ticks:{color:"#606070",font:{size:10}}}}}
    });
    return()=>{if(chart.current)chart.current.destroy();};
  },[rows]);
  return <canvas ref={ref}/>;
}

  const filtered=filter==="All"?rows:rows.filter(l=>l.status===filter.toLowerCase());
  return(
    <>
      <div className="page-hdr">
        <div className="page-hdr-left"><div className="page-title">Leave Management</div><div className="page-sub">{isAdmin?"Approve or reject leave requests":"Submit and track your leaves"}</div></div>
        <div className="page-hdr-right"><button className="btn-gold" onClick={()=>setModalOpen(true)}>+ New Request</button></div>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
        {["All","Pending","Approved","Rejected"].map(f=><button key={f} className={"btn-outline btn-sm"+(filter===f?" active":"")} onClick={()=>setFilter(f)}>{f}</button>)}
      </div>
      <div className="table-card">
        <div className="table-card-hdr"><div className="table-card-title">Leave Requests</div><span style={{fontSize:11,color:"var(--text3)"}}>{filtered.length} records</span></div>
        <div className="table-wrap">
          {filtered.length===0?(
            <div className="empty-state"><div className="empty-icon">📋</div><div className="empty-text">No leave requests</div><div className="empty-sub">No records match selected filter</div></div>
          ):(
            <table>
              <thead><tr><th>Name</th><th>Type</th><th>From</th><th>To</th><th>Days</th><th>Reason</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody>
                {filtered.map(l=>{
                  const days=diffDays(l.from_date,l.to_date);
                  return(
                    <tr key={l.id}>
                      <td><div style={{display:"flex",alignItems:"center",gap:9}}><div style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,#C41E30,#7A0E1A)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#fff",flexShrink:0}}>{initials(l.name)}</div>{l.name}</div></td>
                      <td>{cap(l.type)}</td>
                      <td style={{color:"var(--text3)"}}>{safeDate(l.from_date)}</td>
                      <td style={{color:"var(--text3)"}}>{safeDate(l.to_date)}</td>
                      <td style={{color:"var(--gold)",fontWeight:600}}>{days}</td>
                      <td style={{color:"var(--text3)",maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.reason||"—"}</td>
                      <td><span className={"badge badge-"+l.status}>{cap(l.status)}</span></td>
                      <td>
                        {isAdmin&&l.status==="pending"&&(
                          <div style={{display:"flex",gap:6}}>
                            <button className="btn-success" onClick={()=>onApprove(l.id)}>Approve</button>
                            <button className="btn-danger" onClick={()=>onReject(l.id)}>Reject</button>
                          </div>
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
      </div>
      <LeaveModal
        open={modalOpen}
        onClose={()=>setModalOpen(false)}
        onSubmit={onCreate}
        isAdmin={isAdmin}
        staffOptions={staffOptions}
        currentUserId={currentUserId}
      />
    </>
  );
}

function ReportsScreen({rows,isAdmin}){
  const [from,setFrom]=useState(`${new Date().getFullYear()}-01-01`);
  const [to,setTo]=useState(TODAY);

  const f=new Date(from);
  const t=new Date(to);
  const filtered=rows.filter(r=>{
    const [y,m]=String(r.month||"").split("-");
    const d=new Date(Number(y),Number(m)-1,1);
    return !Number.isNaN(d.getTime()) && d>=new Date(f.getFullYear(),f.getMonth(),1) && d<=new Date(t.getFullYear(),t.getMonth(),1);
  });

  const totals=filtered.reduce((acc,r)=>{
    acc.total_days+=Number(r.total_days||0);
    acc.present+=Number(r.present||0);
    acc.absent+=Number(r.absent||0);
    acc.late+=Number(r.late||0);
    acc.leaves+=Number(r.leaves||0);
    return acc;
  },{total_days:0,present:0,absent:0,late:0,leaves:0});
  const pct=totals.total_days?((totals.present/totals.total_days)*100).toFixed(1):"0.0";

  return(
    <>
      <div className="page-hdr">
        <div className="page-hdr-left"><div className="page-title">Reports</div><div className="page-sub">{isAdmin?"All staff reports":"My monthly reports"}</div></div>
        <div className="page-hdr-right"><button className="btn-primary" onClick={()=>window.print()}>🖨 Print Report</button></div>
      </div>
      <div className="report-controls">
        <label>From</label><input type="date" value={from} onChange={e=>setFrom(e.target.value)}/>
        <label>To</label><input type="date" value={to} onChange={e=>setTo(e.target.value)}/>
      </div>
      <div className="stats-grid" style={{marginBottom:24}}>
        <div className="stat-card gold"><div className="stat-icon">📅</div><div className="stat-val" style={{color:"#D4AF37"}}>{totals.total_days}</div><div className="stat-lbl">Total Working Days</div></div>
        <div className="stat-card green"><div className="stat-icon">✅</div><div className="stat-val" style={{color:"#10B981"}}>{totals.present}</div><div className="stat-lbl">Total Present</div></div>
        <div className="stat-card red"><div className="stat-icon">❌</div><div className="stat-val" style={{color:"#EF4444"}}>{totals.absent}</div><div className="stat-lbl">Total Absent</div></div>
        <div className="stat-card amber"><div className="stat-icon">📊</div><div className="stat-val" style={{color:"#F59E0B"}}>{pct}%</div><div className="stat-lbl">Avg Attendance</div></div>
      </div>
      <div className="table-card">
        <div className="table-card-hdr"><div className="table-card-title">Monthly Attendance Summary</div></div>
        <div className="table-wrap">
          {filtered.length===0?(
            <div className="empty-state"><div className="empty-icon">📈</div><div className="empty-text">No monthly report data</div><div className="empty-sub">Insert monthly_reports rows to view summaries</div></div>
          ):(
            <table>
              <thead><tr><th>Month</th><th>Total Days</th><th>Present</th><th>Absent</th><th>Late</th><th>Leaves</th><th>Attendance %</th></tr></thead>
              <tbody>
                {filtered.map(r=>{
                  const rp=Number(r.total_days)?((Number(r.present||0)/Number(r.total_days))*100).toFixed(1):"0.0";
                  return(
                    <tr key={r.id}>
                      <td style={{fontWeight:600}}>{monthLabel(r.month)}</td>
                      <td>{r.total_days}</td>
                      <td style={{color:"#10B981",fontWeight:600}}>{r.present}</td>
                      <td style={{color:"#EF4444",fontWeight:600}}>{r.absent}</td>
                      <td style={{color:"#F59E0B",fontWeight:600}}>{r.late}</td>
                      <td style={{color:"#A78BFA",fontWeight:600}}>{r.leaves}</td>
                      <td><span style={{color:"#D4AF37",fontWeight:700}}>{rp}%</span></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
      </div>
    </>
  );
}

function App(){
  const [splash,setSplash]=useState(true);
  const [session,setSession]=useState(null);
  const [profile,setProfile]=useState(null);
  const [page,setPage]=useState("dashboard");
  const [staff,setStaff]=useState([]);
  const [attendance,setAttendance]=useState([]);
  const [leaves,setLeaves]=useState([]);
  const [deviceLogs,setDeviceLogs]=useState([]);
  const [monthlyReports,setMonthlyReports]=useState([]);
  const [schemaReady,setSchemaReady]=useState(false);
  const [missingTables,setMissingTables]=useState([]);
  const [camOpen,setCamOpen]=useState(false);
  const [camUserId,setCamUserId]=useState(null);
  const [showCreateStaff,setShowCreateStaff]=useState(false);
  const [creatingStaff,setCreatingStaff]=useState(false);
  const [lightMode,setLightMode]=useState(false);
  const [notif,setNotif]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const refreshTimerRef=useRef(null);

  const isAdmin=profile?.role==="admin";
  const currentUserId=session?.user?.id||null;

  const notify=(msg,type="success")=>setNotif({msg,type,key:Date.now()});

  useEffect(()=>{document.body.classList.toggle("light-mode",lightMode);},[lightMode]);

  const logDevice=async(action,userId=currentUserId)=>{
    if(!userId||!schemaReady)return;
    await supabaseClient.from("device_logs").insert({
      user_id:userId,
      device_name:`${parseDevice()} / ${parseOS()}`,
      action,
      timestamp:new Date().toISOString()
    });
  };

  const ensureProfile=async(user)=>{
    if(!user)return null;
    const role=(user.email||"").toLowerCase()===ADMIN_EMAIL?"admin":(user.user_metadata?.role||"staff");
    const upsertRow={
      id:user.id,
      email:user.email,
      full_name:user.user_metadata?.full_name||user.email,
      department:user.user_metadata?.department||null,
      designation:user.user_metadata?.designation||null,
      role,
      phone:user.user_metadata?.phone||null,
      cnic:user.user_metadata?.cnic||null,
      hire_date:user.user_metadata?.hire_date||null,
      avatar_url:user.user_metadata?.avatar_url||null,
    };
    await supabaseClient.from("profiles").upsert(upsertRow,{onConflict:"id"});
    const {data}=await supabaseClient.from("profiles").select("*").eq("id",user.id).maybeSingle();
    return data||upsertRow;
  };

  const checkSchema=async()=>{
    const tables=["profiles","attendance","leaves","device_logs","monthly_reports"];
    const missing=[];
    for(const t of tables){
      const {error}=await supabaseClient.from(t).select("*",{head:true,count:"exact"}).limit(1);
      if(error && /relation|does not exist|not found/i.test(error.message||"")){missing.push(t);}
    }
    setMissingTables(missing);
    setSchemaReady(missing.length===0);
    return missing.length===0;
  };

  const fetchAllData=async()=>{
    if(!schemaReady||!profile||!currentUserId)return;

    const profileQuery=isAdmin?supabaseClient.from("profiles").select("*").order("created_at",{ascending:false}):supabaseClient.from("profiles").select("*").eq("id",currentUserId);
    const attendanceQuery=isAdmin
      ?supabaseClient.from("attendance").select("*, profiles!attendance_user_id_fkey(full_name,email)").order("created_at",{ascending:false})
      :supabaseClient.from("attendance").select("*, profiles!attendance_user_id_fkey(full_name,email)").eq("user_id",currentUserId).order("created_at",{ascending:false});
    const leavesQuery=isAdmin
      ?supabaseClient.from("leaves").select("*, profiles!leaves_user_id_fkey(full_name,email)").order("created_at",{ascending:false})
      :supabaseClient.from("leaves").select("*, profiles!leaves_user_id_fkey(full_name,email)").eq("user_id",currentUserId).order("created_at",{ascending:false});
    const logsQuery=isAdmin
      ?supabaseClient.from("device_logs").select("*, profiles!device_logs_user_id_fkey(full_name,email)").order("timestamp",{ascending:false})
      :supabaseClient.from("device_logs").select("*, profiles!device_logs_user_id_fkey(full_name,email)").eq("user_id",currentUserId).order("timestamp",{ascending:false});
    const reportsQuery=isAdmin
      ?supabaseClient.from("monthly_reports").select("*").order("month",{ascending:true})
      :supabaseClient.from("monthly_reports").select("*").eq("user_id",currentUserId).order("month",{ascending:true});

    const [pr,at,lv,lg,mr]=await Promise.all([profileQuery,attendanceQuery,leavesQuery,logsQuery,reportsQuery]);

    if(!pr.error){setStaff(pr.data||[]);}
    if(!at.error){setAttendance((at.data||[]).map(r=>({...r,name:r.profiles?.full_name||r.profiles?.email||"Unknown"})));}
    if(!lv.error){setLeaves((lv.data||[]).map(r=>({...r,name:r.profiles?.full_name||r.profiles?.email||"Unknown"})));}
    if(!lg.error){setDeviceLogs((lg.data||[]).map(r=>({...r,name:r.profiles?.full_name||r.profiles?.email||"Unknown"})));}
    if(!mr.error){setMonthlyReports(mr.data||[]);}
  };

  const refreshSoon=()=>{
    if(refreshTimerRef.current)clearTimeout(refreshTimerRef.current);
    refreshTimerRef.current=setTimeout(()=>{fetchAllData();},220);
  };

  useEffect(()=>{
    let mounted=true;
    let subscription;

    const init=async()=>{
      const ready=await checkSchema();
      const {data:{session:initialSession}}=await supabaseClient.auth.getSession();
      if(!mounted)return;
      setSession(initialSession||null);
      if(initialSession?.user){
        try{
          if(ready){
            const p=await ensureProfile(initialSession.user);
            if(mounted)setProfile(p);
          }else{
            setProfile({
              id:initialSession.user.id,
              email:initialSession.user.email,
              full_name:initialSession.user.user_metadata?.full_name||initialSession.user.email,
              role:(initialSession.user.email||"").toLowerCase()===ADMIN_EMAIL?"admin":(initialSession.user.user_metadata?.role||"staff")
            });
          }
        }catch(_){
          setProfile({id:initialSession.user.id,email:initialSession.user.email,full_name:initialSession.user.email,role:"staff"});
        }
      }
      setAuthLoading(false);

      const authListener=supabaseClient.auth.onAuthStateChange(async(event,newSession)=>{
        setSession(newSession||null);
        if(event==="SIGNED_OUT"){
          setProfile(null);
          setStaff([]);setAttendance([]);setLeaves([]);setDeviceLogs([]);setMonthlyReports([]);
          return;
        }
        if(newSession?.user){
          try{
            const currentReady=schemaReady || (await checkSchema());
            if(currentReady){
              const p=await ensureProfile(newSession.user);
              setProfile(p);
            }else{
              setProfile({
                id:newSession.user.id,
                email:newSession.user.email,
                full_name:newSession.user.user_metadata?.full_name||newSession.user.email,
                role:(newSession.user.email||"").toLowerCase()===ADMIN_EMAIL?"admin":(newSession.user.user_metadata?.role||"staff")
              });
            }
          }catch(_){
            setProfile({id:newSession.user.id,email:newSession.user.email,full_name:newSession.user.email,role:"staff"});
          }
          if(event==="SIGNED_IN"){await logDevice("login",newSession.user.id);}
        }
      });

      subscription=authListener.data.subscription;
    };

    init();
    return()=>{mounted=false;if(subscription)subscription.unsubscribe();if(refreshTimerRef.current)clearTimeout(refreshTimerRef.current);};
  },[]);

  useEffect(()=>{
    if(!profile)return;
    fetchAllData();
  },[profile?.id,profile?.role,schemaReady]);

  useEffect(()=>{
    if(!schemaReady||!profile)return;
    const channel=supabaseClient
      .channel("umeed-live")
      .on("postgres_changes",{event:"*",schema:"public",table:"attendance"},refreshSoon)
      .on("postgres_changes",{event:"*",schema:"public",table:"leaves"},refreshSoon)
      .on("postgres_changes",{event:"*",schema:"public",table:"device_logs"},refreshSoon)
      .on("postgres_changes",{event:"*",schema:"public",table:"monthly_reports"},refreshSoon)
      .on("postgres_changes",{event:"*",schema:"public",table:"profiles"},refreshSoon)
      .subscribe();
    return()=>{supabaseClient.removeChannel(channel);};
  },[schemaReady,profile?.id,profile?.role]);

  const handleLogout=async()=>{
    try{await logDevice("logout");}catch(_){/* no-op */}
    await supabaseClient.auth.signOut();
  };

  const markAttendance=async(userId,status,date)=>{
    if(!schemaReady)return false;
    const targetId=isAdmin?userId:currentUserId;
    if(!targetId)return false;

    const {data:existing}=await supabaseClient
      .from("attendance")
      .select("id")
      .eq("user_id",targetId)
      .eq("date",date)
      .limit(1)
      .maybeSingle();

    if(existing?.id){
      const {error}=await supabaseClient.from("attendance").update({status,time_in:new Date().toISOString(),notes:"Updated via camera"}).eq("id",existing.id);
      if(error){notify(error.message,"error");return false;}
    }else{
      const {error}=await supabaseClient.from("attendance").insert({user_id:targetId,date,time_in:new Date().toISOString(),status,notes:"Marked via camera"});
      if(error){notify(error.message,"error");return false;}
    }

    const mk=monthKeyFromDate(date);
    if(mk){
      const rows=attendance.filter(a=>a.user_id===targetId && monthKeyFromDate(a.date)===mk);
      const merged=[...rows,{user_id:targetId,date,status}];
      const totalDays=merged.length;
      const present=merged.filter(r=>r.status==="present").length;
      const absent=merged.filter(r=>r.status==="absent").length;
      const late=merged.filter(r=>r.status==="late").length;
      const leaveCount=leaves.filter(l=>l.user_id===targetId&&l.status==="approved"&&monthKeyFromDate(l.from_date)===mk).length;
      await supabaseClient.from("monthly_reports").upsert({user_id:targetId,month:mk,total_days:totalDays,present,absent,late,leaves:leaveCount},{onConflict:"user_id,month"});
    }

    await logDevice(`attendance_${status}`,targetId);
    return true;
  };

  const deleteAttendance=async(id)=>{
    const {error}=await supabaseClient.from("attendance").delete().eq("id",id);
    if(error){notify(error.message,"error");return;}
    notify("Attendance deleted");
  };

  const createLeave=async(leave)=>{
    const payload={...leave,user_id:isAdmin?leave.user_id:currentUserId,status:"pending"};
    const {error}=await supabaseClient.from("leaves").insert(payload);
    if(error){notify(error.message,"error");return;}
    notify("Leave request submitted");
  };

  const approveLeave=async(id)=>{
    const {error}=await supabaseClient.from("leaves").update({status:"approved"}).eq("id",id);
    if(error){notify(error.message,"error");return;}
    notify("Leave approved");
  };

  const rejectLeave=async(id)=>{
    const {error}=await supabaseClient.from("leaves").update({status:"rejected"}).eq("id",id);
    if(error){notify(error.message,"error");return;}
    notify("Leave rejected","error");
  };

  const createStaffUser=async(form)=>{
    setCreatingStaff(true);
    try{
      const email=form.email.trim().toLowerCase();
      const metadata={
        full_name:form.full_name,
        department:form.department||null,
        designation:form.designation||null,
        phone:form.phone||null,
        cnic:form.cnic||null,
        hire_date:form.hire_date||null,
        role:"staff"
      };
      const {error}=await supabaseClient.auth.signInWithOtp({
        email,
        options:{
          shouldCreateUser:true,
          emailRedirectTo:window.location.href.split("#")[0],
          data:metadata
        }
      });
      if(error){notify(error.message,"error");return;}
      await logDevice(`invite_sent:${email}`);
      notify("Staff invitation email sent");
      setShowCreateStaff(false);
    }finally{setCreatingStaff(false);}
  };

  const monthlyForChart=(monthlyReports||[]).slice(-12);

  if(splash)return <Splash onDone={()=>setSplash(false)}/>;
  if(authLoading)return <div className="splash"><div className="splash-title" style={{fontSize:22}}>Loading session…</div></div>;
  if(!session)return <Login onLoggedIn={()=>notify("Logged in")}/>;

  const nav=[
    {id:"dashboard",icon:"🏠",label:"Dashboard",group:"Core"},
    {id:"staff",icon:"👥",label:"Staff Directory",group:"Core"},
    {id:"attendance",icon:"📋",label:"Attendance",group:"Core"},
    {id:"leave",icon:"📅",label:"Leave Management",group:"Core"},
    {id:"reports",icon:"📊",label:"Reports",group:"Core"},
    {id:"devices",icon:"💻",label:"Device Logs",group:"Core"},
    {id:"settings",icon:"⚙️",label:"Settings",group:"System"},
  ];
  const groups=["Core","System"];

  return(
    <div className="shell">
      {notif&&<Notif key={notif.key} msg={notif.msg} type={notif.type} onDone={()=>setNotif(null)}/>}
      <div className="sidebar">
        <div className="brand">
          <div className="brand-logo"><img src={LOGO} alt="UMEED"/></div>
          <div><div className="brand-name">UMEED</div><div className="brand-ver">Supabase Live v5.0</div></div>
        </div>
        {groups.map(g=>(
          <div className="nav-group" key={g}>
            <span className="nav-group-label">{g}</span>
            {nav.filter(n=>n.group===g).map(n=>(
              <button key={n.id} className={"nav-btn"+(page===n.id?" active":"")} onClick={()=>setPage(n.id)}>
                <span className="nav-icon">{n.icon}</span>{n.label}
              </button>
            ))}
          </div>
        ))}
        <div className="sidebar-footer">
          <div className="user-card">
            <div className="user-avatar">{initials(profile?.full_name||profile?.email)}</div>
            <div className="user-name">{profile?.full_name||profile?.email||"User"}</div>
            <div className="user-role">{cap(profile?.role||"staff")} • {profile?.designation||"Staff"}</div>
          </div>
          <button className="btn-logout" onClick={handleLogout}>Logout</button>
        </div>
      </div>

      <div className="main">
        <div className="topbar">
          <div className="topbar-title">Umeed Education System</div>
          <div className="topbar-right">
            <button className="btn-icon" onClick={()=>setLightMode(m=>!m)}>{lightMode?"🌙 Dark":"☀️ Light"}</button>
            <button className="btn-icon" onClick={()=>window.print()}>🖨 Print</button>
            <button className="btn-icon" onClick={()=>setPage("settings")}>⚙️ Settings</button>
          </div>
        </div>

        <div className="content">
          {page==="dashboard"&&<Dashboard attendance={attendance} staffCount={staff.length} onOpenCamera={()=>setCamOpen(true)} monthlyRows={monthlyForChart} isAdmin={isAdmin}/>}
          {page==="staff"&&<StaffDirectory staff={isAdmin?staff:staff.filter(s=>s.id===currentUserId)} isAdmin={isAdmin} onOpenCamera={(uid)=>{setCamUserId(uid);setCamOpen(true);setPage("attendance");}} onOpenCreateStaff={()=>setShowCreateStaff(true)}/>}
          {page==="attendance"&&<AttendanceScreen rows={attendance} isAdmin={isAdmin} onMarkAttendance={markAttendance} onDelete={deleteAttendance} staffOptions={isAdmin?staff:staff.filter(s=>s.id===currentUserId)} currentUserId={currentUserId} notify={notify}/>}
          {page==="leave"&&<LeaveScreen rows={leaves} isAdmin={isAdmin} onCreate={createLeave} onApprove={approveLeave} onReject={rejectLeave} staffOptions={isAdmin?staff:staff.filter(s=>s.id===currentUserId)} currentUserId={currentUserId}/>}
          {page==="reports"&&<ReportsScreen rows={monthlyReports} isAdmin={isAdmin}/>}
          {page==="devices"&&<DeviceLogsScreen rows={deviceLogs} isAdmin={isAdmin}/>}
          {page==="settings"&&<SettingsScreen lightMode={lightMode} setLightMode={setLightMode} profile={profile} schemaReady={schemaReady} missingTables={missingTables} onRecheck={checkSchema}/>}
        </div>
      </div>

      <CameraModal
        open={camOpen}
        onClose={()=>{setCamOpen(false);setCamUserId(null);}}
        onCapture={async(userId,status)=>{const ok=await markAttendance(userId,status,TODAY);if(ok)notify("Attendance marked");}}
        staffOptions={isAdmin?staff:staff.filter(s=>s.id===currentUserId)}
        isAdmin={isAdmin}
        currentUserId={currentUserId}
        preselectedUserId={camUserId}
      />

      {isAdmin&&<CreateStaffModal open={showCreateStaff} onClose={()=>setShowCreateStaff(false)} onSubmit={createStaffUser} loading={creatingStaff}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
