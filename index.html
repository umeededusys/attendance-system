<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ═════════════════════════════════════════════════════════
// SUPABASE CONFIGURATION
// ═════════════════════════════════════════════════════════

const SUPABASE_URL = 'https://edboqmaywwxbnltscrso.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkYm9xbWF5d3d4Ym5sdHNjcnNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NjcwMDMsImV4cCI6MjA5MjQ0MzAwM30.2U8omeYP57ENxJcg5Yg1Egt2mwIMBAgxyNnLQtLGC_o';

let supabaseClient = null;
try {
  supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  console.log('✅ SUPABASE CONNECTED');
} catch (e) {
  console.error('❌ Supabase Error:', e);
}

// ═════════════════════════════════════════════════════════
// DATA OPERATIONS
// ═════════════════════════════════════════════════════════

const dataOps = {
  async getStaff() {
    if (!supabaseClient) return [];
    try {
      const { data, error } = await supabaseClient
        .from('staff')
        .select('*')
        .eq('status', 'active')
        .order('name');
      if (error) throw error;
      console.log(`✅ Loaded ${data?.length || 0} staff members`);
      return data || [];
    } catch (e) {
      console.error('Staff error:', e.message);
      return [];
    }
  },

  async getAttendanceToday() {
    if (!supabaseClient) return [];
    try {
      const today = new Date().toISOString().split('T')[0];
      const { data, error } = await supabaseClient
        .from('attendance')
        .select('*')
        .eq('date', today)
        .order('in_time', { ascending: false });
      if (error) throw error;
      return data || [];
    } catch (e) {
      console.error('Attendance error:', e.message);
      return [];
    }
  },

  async getAttendanceStats() {
    if (!supabaseClient) return { total: 0, present: 0, absent: 0, late: 0 };
    try {
      const today = new Date().toISOString().split('T')[0];
      const { data, error } = await supabaseClient
        .from('attendance')
        .select('status')
        .eq('date', today);
      if (error) throw error;
      return {
        total: data.length,
        present: data.filter(d => d.status === 'present').length,
        absent: data.filter(d => d.status === 'absent').length,
        late: data.filter(d => d.status === 'late').length,
      };
    } catch (e) {
      console.error('Stats error:', e.message);
      return { total: 0, present: 0, absent: 0, late: 0 };
    }
  },

  async getLeaves() {
    if (!supabaseClient) return [];
    try {
      const { data, error } = await supabaseClient
        .from('leaves')
        .select('*')
        .order('created_at', { ascending: false });
      if (error) throw error;
      return data || [];
    } catch (e) {
      console.error('Leaves error:', e.message);
      return [];
    }
  },
};

window.dataOps = dataOps;

// ═════════════════════════════════════════════════════════
// LOGIN SCREEN
// ═════════════════════════════════════════════════════════

function LoginScreen({ onLoginSuccess }) {
  const [email, setEmail] = useState('principal@umeededu.pk');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleLogin = async (e) => {
    e.preventDefault();
    setError('');
    setLoading(true);

    // Simple validation (in production, use Supabase auth)
    if (email && password) {
      try {
        // For now, we'll use a simple admin login
        const adminEmail = 'principal@umeededu.pk';
        const adminPassword = 'admin123';

        if (email === adminEmail && password === adminPassword) {
          onLoginSuccess({ email, name: 'H.M. Tariq Mehmood', role: 'Principal - Admin' });
        } else {
          setError('Invalid email or password');
        }
      } catch (e) {
        setError(e.message);
      }
    } else {
      setError('Please enter email and password');
    }

    setLoading(false);
  };

  return (
    <div className="login-container">
      <div className="login-left">
        <div className="logo-badge">UMEED</div>
        <div className="login-title">Umeed</div>
        <div className="login-subtitle">Education System</div>
        <p style={{ color: 'var(--text-muted)', textAlign: 'center', marginTop: 40 }}>
          Staff Attendance Management System
        </p>
      </div>

      <div className="login-right">
        <div className="login-card">
          <h2>Admin Portal</h2>
          <p>Sign in to manage staff attendance</p>

          {error && <div className="error-msg">{error}</div>}

          <form onSubmit={handleLogin}>
            <div className="input-group">
              <label>Admin Email</label>
              <input
                type="email"
                placeholder="principal@umeededu.pk"
                value={email}
                onChange={(e) => setEmail(e.target.value)}
              />
            </div>

            <div className="input-group">
              <label>Password</label>
              <input
                type="password"
                placeholder="Enter password"
                value={password}
                onChange={(e) => setPassword(e.target.value)}
              />
            </div>

            <button className="login-btn" type="submit" disabled={loading}>
              {loading ? 'Signing in...' : 'Sign In →'}
            </button>
          </form>

          <p style={{ fontSize: 10, color: 'var(--text-muted)', marginTop: 20, textAlign: 'center' }}>
            Umeed Education System · v21 · Academic Year 2025-26
          </p>
        </div>
      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════
// DASHBOARD SCREEN
// ═════════════════════════════════════════════════════════

function DashboardScreen() {
  const [staff, setStaff] = useState([]);
  const [attendance, setAttendance] = useState([]);
  const [stats, setStats] = useState({ total: 0, present: 0, absent: 0, late: 0 });
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    async function loadData() {
      try {
        const [staffData, attendanceData, statsData] = await Promise.all([
          dataOps.getStaff(),
          dataOps.getAttendanceToday(),
          dataOps.getAttendanceStats(),
        ]);

        setStaff(staffData);
        setAttendance(attendanceData);
        setStats(statsData);
      } catch (e) {
        console.error('Dashboard error:', e);
      } finally {
        setLoading(false);
      }
    }

    loadData();
    const interval = setInterval(loadData, 30000);
    return () => clearInterval(interval);
  }, []);

  return (
    <>
      <h1>Dashboard</h1>
      <div className="date-label">
        {new Date().toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
      </div>

      {loading ? (
        <div className="loading">
          <div className="spinner"></div>
          <div>Loading data...</div>
        </div>
      ) : (
        <>
          <div className="stat-grid">
            <div className="stat-card fade-up" style={{ animationDelay: '0s' }}>
              <div style={{ fontSize: 20 }}>👥</div>
              <div className="stat-number" style={{ color: 'var(--gold)' }}>{staff.length}</div>
              <div className="stat-label">Total Staff</div>
            </div>

            <div className="stat-card fade-up" style={{ animationDelay: '0.05s' }}>
              <div style={{ fontSize: 20, color: '#4ade80' }}>✓</div>
              <div className="stat-number" style={{ color: '#4ade80' }}>{stats.present}</div>
              <div className="stat-label">Present Today</div>
            </div>

            <div className="stat-card fade-up" style={{ animationDelay: '0.1s' }}>
              <div style={{ fontSize: 20, color: '#f87171' }}>✗</div>
              <div className="stat-number" style={{ color: '#f87171' }}>{stats.absent}</div>
              <div className="stat-label">Absent Today</div>
            </div>

            <div className="stat-card fade-up" style={{ animationDelay: '0.15s' }}>
              <div style={{ fontSize: 20, color: '#fbbf24' }}>⏰</div>
              <div className="stat-number" style={{ color: '#fbbf24' }}>{stats.late}</div>
              <div className="stat-label">Late Arrivals</div>
            </div>
          </div>

          <div className="glass-box">
            <div className="section-header">
              <div className="section-title">Today's Attendance</div>
              <div className="section-sub">{attendance.length} records</div>
            </div>

            {attendance.length === 0 ? (
              <p style={{ color: 'var(--text-muted)', padding: '20px', textAlign: 'center' }}>
                No attendance records yet
              </p>
            ) : (
              <table>
                <thead>
                  <tr>
                    <th>Staff ID</th>
                    <th>Check In</th>
                    <th>Check Out</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody>
                  {attendance.slice(0, 10).map((record, i) => (
                    <tr key={i}>
                      <td><strong>{record.staff_id}</strong></td>
                      <td>{record.in_time || '—'}</td>
                      <td>{record.out_time || '—'}</td>
                      <td>
                        <span className={`badge badge-${record.status}`}>
                          {record.status ? record.status.charAt(0).toUpperCase() + record.status.slice(1) : 'Unknown'}
                        </span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </>
      )}
    </>
  );
}

// ═════════════════════════════════════════════════════════
// STAFF SCREEN
// ═════════════════════════════════════════════════════════

function StaffScreen() {
  const [staff, setStaff] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('All');

  useEffect(() => {
    async function loadStaff() {
      try {
        const data = await dataOps.getStaff();
        setStaff(data);
      } catch (e) {
        console.error('Staff load error:', e);
      } finally {
        setLoading(false);
      }
    }
    loadStaff();
  }, []);

  const roles = ['All', 'Teacher', 'Admin', 'Support'];
  const filtered = filter === 'All' ? staff : staff.filter(s => s.role === filter);

  return (
    <>
      <h1>Staff Management</h1>
      <div className="section-sub" style={{ marginBottom: 20 }}>
        {staff.length} total staff members
      </div>

      {!loading && (
        <div className="tab-group">
          {roles.map(role => (
            <button
              key={role}
              className={`tab ${filter === role ? 'active' : ''}`}
              onClick={() => setFilter(role)}
            >
              {role}
            </button>
          ))}
        </div>
      )}

      {loading ? (
        <div className="loading">
          <div className="spinner"></div>
          <div>Loading staff...</div>
        </div>
      ) : (
        <div className="staff-grid">
          {filtered.map((person, i) => (
            <div key={i} className="staff-card fade-up" style={{ animationDelay: `${i * 0.05}s` }}>
              <div className="staff-avatar">
                {person.name.charAt(0).toUpperCase()}
              </div>
              <div className="staff-name">{person.name}</div>
              <div className="staff-role">{person.role}</div>
              <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 8 }}>
                {person.dept}
              </div>
              <div style={{ fontSize: 11, color: 'var(--text-secondary)', lineHeight: 1.4 }}>
                <div>✉ {person.email || 'N/A'}</div>
                <div>📱 {person.phone || 'N/A'}</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </>
  );
}

// ═════════════════════════════════════════════════════════
// LEAVES SCREEN
// ═════════════════════════════════════════════════════════

function LeavesScreen() {
  const [leaves, setLeaves] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    async function loadLeaves() {
      try {
        const data = await dataOps.getLeaves();
        setLeaves(data);
      } catch (e) {
        console.error('Leaves error:', e);
      } finally {
        setLoading(false);
      }
    }
    loadLeaves();
  }, []);

  return (
    <>
      <h1>Leave Management</h1>
      <div className="section-sub" style={{ marginBottom: 20 }}>
        Staff leave requests
      </div>

      {loading ? (
        <div className="loading">
          <div className="spinner"></div>
        </div>
      ) : (
        <div className="glass-box">
          {leaves.length === 0 ? (
            <p style={{ color: 'var(--text-muted)', padding: '20px', textAlign: 'center' }}>
              No leave requests
            </p>
          ) : (
            <table>
              <thead>
                <tr>
                  <th>Staff Member</th>
                  <th>Type</th>
                  <th>Duration</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                {leaves.map((leave, i) => (
                  <tr key={i}>
                    <td><strong>{leave.staff_id}</strong></td>
                    <td>{leave.type}</td>
                    <td>{leave.from_date} to {leave.to_date}</td>
                    <td>
                      <span className={`badge badge-${leave.status}`}>
                        {leave.status ? leave.status.charAt(0).toUpperCase() + leave.status.slice(1) : 'Pending'}
                      </span>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      )}
    </>
  );
}

// ═════════════════════════════════════════════════════════
// MAIN APP
// ═════════════════════════════════════════════════════════

function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('dashboard');

  const handleLoginSuccess = (userData) => {
    setUser(userData);
    console.log('✅ USER LOGGED IN:', userData);
  };

  const handleLogout = () => {
    setUser(null);
    setPage('dashboard');
  };

  if (!user) {
    return <LoginScreen onLoginSuccess={handleLoginSuccess} />;
  }

  const renderPage = () => {
    switch (page) {
      case 'dashboard':
        return <DashboardScreen />;
      case 'attendance':
        return <DashboardScreen />;
      case 'staff':
        return <StaffScreen />;
      case 'leaves':
        return <LeavesScreen />;
      case 'reports':
        return <ReportsScreen />;
      default:
        return <DashboardScreen />;
    }
  };

  return (
    <div className="app-container">
      <div className="sidebar">
        <div className="sidebar-logo">
          <span>UMEED</span>
        </div>

        <nav style={{ flex: 1 }}>
          {[
            { id: 'dashboard', label: '📊 Dashboard' },
            { id: 'attendance', label: '⏰ Attendance' },
            { id: 'staff', label: '👥 Staff' },
            { id: 'leaves', label: '📅 Leaves' },
            { id: 'reports', label: '📈 Reports' },
          ].map(item => (
            <button
              key={item.id}
              className={`nav-item ${page === item.id ? 'active' : ''}`}
              onClick={() => setPage(item.id)}
            >
              {item.label}
            </button>
          ))}
        </nav>

        <div className="user-profile">
          <div className="profile-avatar">{user.name.charAt(0)}</div>
          <div className="profile-info">
            <div className="profile-name">{user.name}</div>
            <div className="profile-role">{user.role}</div>
          </div>
        </div>

        <button
          className="nav-item"
          onClick={handleLogout}
          style={{ marginTop: 10 }}
        >
          🚪 Logout
        </button>
      </div>

      <div className="main-content">
        <div className="topbar">
          <div className="topbar-title">Umeed Education System</div>
          <div className="topbar-actions">
            <button className="btn-icon">🔔</button>
            <button className="btn-icon">⚙️</button>
          </div>
        </div>

        <div className="content-area">
          {renderPage()}
        </div>
      </div>
    </div>
  );
}
