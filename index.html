<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umeed Education System - Staff Attendance Management</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>

<style>
:root {
  --bg: #0A0408;
  --surface: #140811;
  --surface-alt: #1A0F16;
  --text: #FFFFFF;
  --text-sec: #E5E5E5;
  --text-mute: #B0B0B0;
  --maroon: #C41E30;
  --maroon-dark: #8B1424;
  --gold: #D4AF37;
  --gold-light: #E6C550;
  --border: rgba(255,255,255,0.15);
  --success: #22C55E;
  --error: #EF4444;
  --warning: #FBB924;
  --info: #0EA5E9;
}

[data-theme="light"] {
  --bg: #FFFFFF;
  --surface: #F5F5F5;
  --surface-alt: #EEEEEE;
  --text: #1A1A1A;
  --text-sec: #333333;
  --text-mute: #777777;
  --border: rgba(0,0,0,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body, #root { height: 100%; width: 100%; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); transition: all 200ms; overflow: hidden; }

.splash { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #0A0408, #1A0C15); gap: 24px; }
.logo-3d { width: 160px; height: 160px; animation: spin 4s infinite; filter: drop-shadow(0 0 40px rgba(212,175,55,0.9)); }
.logo-img { width: 100%; height: 100%; }
@keyframes spin { 0% { transform: rotateY(0); } 50% { transform: rotateY(180deg); } 100% { transform: rotateY(360deg); } }
.splash-text { font-family: 'Cormorant Garamond', serif; font-size: 56px; font-weight: 700; color: #FFFFFF; letter-spacing: 3px; }
.splash-sub { font-family: 'Cormorant Garamond', serif; font-size: 16px; color: #D4AF37; letter-spacing: 1.5px; }
.splash-version { font-size: 10px; color: #999; margin-top: 20px; }

.login { display: flex; height: 100vh; background: linear-gradient(135deg, #0A0408, #1A0C15); }
.login-left { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
.logo-badge { width: 140px; height: 140px; margin-bottom: 40px; }
.login-title { font-family: 'Cormorant Garamond', serif; font-size: 44px; font-weight: 700; color: #FFFFFF; margin-bottom: 8px; }
.login-subtitle { font-family: 'Cormorant Garamond', serif; font-size: 14px; color: #D4AF37; margin-bottom: 16px; letter-spacing: 1px; }
.login-desc { color: #C0C0C0; font-size: 12px; line-height: 1.6; }

.login-right { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; }
.login-card { background: rgba(20, 8, 17, 0.95); border: 1px solid rgba(196, 30, 48, 0.4); border-radius: 18px; padding: 40px; width: 100%; max-width: 400px; backdrop-filter: blur(10px); }
.card-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; color: #D4AF37; margin-bottom: 4px; }
.card-sub { color: #A0A0A0; font-size: 11px; margin-bottom: 24px; }

.form-group { margin-bottom: 18px; }
.form-label { font-size: 10px; font-weight: 600; color: #808080; margin-bottom: 6px; text-transform: uppercase; display: block; letter-spacing: 0.5px; }
.form-input { width: 100%; padding: 11px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: #FFFFFF; font-size: 13px; transition: all 200ms; }
.form-input:focus { outline: none; border-color: #C41E30; background: rgba(255,255,255,0.12); }
.form-input::placeholder { color: #606060; }

.submit-btn { width: 100%; padding: 11px; background: linear-gradient(135deg, #C41E30, #9A0B1E); border: none; border-radius: 8px; color: white; font-weight: 700; font-size: 11px; cursor: pointer; margin-top: 8px; text-transform: uppercase; letter-spacing: 0.5px; transition: all 200ms; }
.submit-btn:hover { opacity: 0.95; transform: translateY(-1px); box-shadow: 0 8px 16px rgba(196,30,48,0.3); }
.submit-btn:disabled { opacity: 0.5; }

.error-msg { background: rgba(220,38,38,0.15); border: 1px solid rgba(220,38,38,0.3); border-radius: 8px; color: #FF8080; padding: 10px 12px; font-size: 11px; margin-bottom: 16px; border-left: 3px solid #EF4444; }

.app { display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }

.sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
.sidebar-brand { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 700; color: var(--gold); margin-bottom: 24px; text-align: center; letter-spacing: 1px; }

.nav-group { margin-bottom: 24px; }
.nav-label { font-size: 8px; font-weight: 800; color: var(--text-mute); text-transform: uppercase; margin-left: 12px; margin-bottom: 10px; letter-spacing: 1px; }
.nav-btn { width: 100%; padding: 11px 14px; background: transparent; border: none; border-radius: 7px; color: var(--text-sec); font-size: 12px; font-weight: 500; cursor: pointer; text-align: left; margin-bottom: 4px; transition: all 150ms; }
.nav-btn:hover { background: rgba(196,30,48,0.15); }
.nav-btn.active { background: rgba(196,30,48,0.25); color: var(--gold); border-left: 3px solid var(--maroon); padding-left: 11px; }

.sidebar-footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }
.user-card { background: rgba(196,30,48,0.12); border-radius: 8px; padding: 12px; margin-bottom: 12px; font-size: 10px; }
.user-name { font-weight: 700; color: var(--text); margin-bottom: 2px; }
.user-role { color: var(--text-mute); font-size: 9px; }

.logout-btn { width: 100%; padding: 9px; background: rgba(196,30,48,0.2); border: 1px solid rgba(196,30,48,0.3); border-radius: 6px; color: var(--maroon); font-weight: 700; font-size: 10px; cursor: pointer; margin-top: 10px; text-transform: uppercase; transition: all 200ms; }
.logout-btn:hover { background: var(--maroon); color: white; }

.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar { height: 56px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
.topbar-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }

.topbar-actions { display: flex; gap: 12px; align-items: center; }
.theme-btn { background: var(--surface-alt); border: 1px solid var(--border); border-radius: 7px; color: var(--text); width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; transition: all 200ms; }
.theme-btn:hover { border-color: var(--maroon); background: rgba(196,30,48,0.1); }

.action-btn { padding: 8px 14px; background: rgba(196,30,48,0.15); border: 1px solid rgba(196,30,48,0.25); border-radius: 6px; color: var(--maroon); font-weight: 700; font-size: 10px; cursor: pointer; text-transform: uppercase; transition: all 200ms; }
.action-btn:hover { background: var(--maroon); color: white; }

.content { flex: 1; overflow-y: auto; padding: 24px; }
.content::-webkit-scrollbar { width: 8px; }
.content::-webkit-scrollbar-track { background: var(--surface); }
.content::-webkit-scrollbar-thumb { background: rgba(196,30,48,0.3); border-radius: 4px; }
.content::-webkit-scrollbar-thumb:hover { background: rgba(196,30,48,0.5); }

.header { margin-bottom: 24px; }
.header-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; margin-bottom: 4px; letter-spacing: 0.5px; }
.header-date { color: var(--text-sec); font-size: 11px; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; transition: all 200ms; }
.stat-box:hover { border-color: var(--maroon); box-shadow: 0 4px 12px rgba(196,30,48,0.15); }
.stat-value { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 700; margin: 6px 0; letter-spacing: 1px; }
.stat-label { font-size: 10px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }

.chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; margin-bottom: 24px; }
.chart-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
.chart-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; letter-spacing: 0.5px; }
.chart-sub { font-size: 11px; color: var(--text-mute); margin-bottom: 14px; }
.chart-container { position: relative; height: 260px; }

.table-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 16px; }
.table-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 14px; letter-spacing: 0.5px; }
.table-box table { width: 100%; border-collapse: collapse; }
.table-box th { background: rgba(196,30,48,0.08); padding: 10px; text-align: left; font-size: 9px; font-weight: 800; color: var(--text-sec); text-transform: uppercase; border-bottom: 1px solid var(--border); letter-spacing: 0.5px; }
.table-box td { padding: 10px; border-bottom: 1px solid var(--border); font-size: 12px; }
.table-box tr:hover { background: rgba(196,30,48,0.04); }

.badge { display: inline-block; padding: 3px 10px; border-radius: 14px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.badge-present { background: rgba(34, 197, 94, 0.2); color: #22C55E; }
.badge-absent { background: rgba(239, 68, 68, 0.2); color: #EF4444; }
.badge-late { background: rgba(251, 191, 36, 0.2); color: #FBB924; }
.badge-approved { background: rgba(34, 197, 94, 0.2); color: #22C55E; }
.badge-pending { background: rgba(251, 191, 36, 0.2); color: #FBB924; }
.badge-rejected { background: rgba(239, 68, 68, 0.2); color: #EF4444; }
.badge-success { background: rgba(34, 197, 94, 0.2); color: #22C55E; }
.badge-failed { background: rgba(239, 68, 68, 0.2); color: #EF4444; }

.search-input { width: 100%; padding: 11px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; margin-bottom: 16px; transition: all 200ms; }
.search-input:focus { outline: none; border-color: var(--maroon); }

.filter-group { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-btn { padding: 8px 14px; background: rgba(196,30,48,0.12); border: 1px solid rgba(196,30,48,0.25); border-radius: 6px; color: var(--text-sec); font-size: 11px; cursor: pointer; font-weight: 600; transition: all 200ms; }
.filter-btn.active { background: var(--maroon); color: white; border-color: var(--maroon); }
.filter-btn:hover { background: rgba(196,30,48,0.2); }

.staff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
.staff-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; transition: all 200ms; }
.staff-card:hover { border-color: var(--maroon); box-shadow: 0 4px 12px rgba(196,30,48,0.15); }
.staff-avatar { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--maroon), var(--gold)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; margin-bottom: 12px; font-size: 20px; }
.staff-name { font-weight: 700; font-size: 12px; margin-bottom: 2px; }
.staff-role { color: var(--text-mute); font-size: 11px; margin-bottom: 10px; }
.staff-info { font-size: 10px; color: var(--text-sec); margin: 3px 0; }

.export-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.export-btn { padding: 9px 16px; background: var(--success); border: none; border-radius: 6px; color: white; font-weight: 700; font-size: 10px; cursor: pointer; margin-right: 10px; text-transform: uppercase; transition: all 200ms; margin-bottom: 8px; }
.export-btn:hover { opacity: 0.9; }

.form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 16px; }

.summary-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 16px; }
.summary-item { background: var(--surface-alt); border-left: 3px solid var(--maroon); padding: 12px; border-radius: 4px; }
.summary-label { font-size: 10px; color: var(--text-mute); text-transform: uppercase; margin-bottom: 4px; font-weight: 600; }
.summary-value { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 700; color: var(--gold); }

@media (max-width: 1280px) {
  .chart-grid { grid-template-columns: 1fr; }
}

@media (max-width: 1024px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .staff-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 768px) {
  .app { flex-direction: column; }
  .sidebar { width: 100%; max-height: 64px; flex-direction: row; border-bottom: 1px solid var(--border); border-right: none; padding: 12px 16px; }
  .sidebar-brand { margin-bottom: 0; margin-right: auto; font-size: 16px; }
  .nav-group, .sidebar-footer { display: none; }
  .content { padding: 16px; }
  .header-title { font-size: 22px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .chart-grid { grid-template-columns: 1fr; }
  .staff-grid { grid-template-columns: 1fr; }
  .topbar { padding: 0 16px; }
  .stat-value { font-size: 26px; }
}

@media (max-width: 480px) {
  .splash-text { font-size: 40px; }
  .logo-3d { width: 120px; height: 120px; }
  .logo-badge { width: 100px; height: 100px; }
  .login-title { font-size: 32px; }
  .login-card { padding: 24px; }
  .login-left, .login-right { padding: 20px; }
  .content { padding: 12px; }
  .header-title { font-size: 18px; }
  .stats-grid { grid-template-columns: 1fr; gap: 10px; }
  .stat-value { font-size: 20px; }
  .staff-grid { grid-template-columns: 1fr; }
  .chart-container { height: 200px; }
  .table-box th, .table-box td { padding: 6px; font-size: 10px; }
  .topbar { height: 48px; padding: 0 12px; }
}

@media print {
  .sidebar, .topbar { display: none; }
  .app { display: block; height: auto; }
  .main { display: block; }
  .content { padding: 20px; }
  .chart-box, .table-box { page-break-inside: avoid; }
}
</style>
</head>

function Logo() {
  return <img src={`data:image/jpeg;base64,${LOGO_B64}`} alt="UMEED" className="logo-img" />;
}

function Splash({ onDone }) {
  useEffect(() => { setTimeout(onDone, 3500); }, [onDone]);
  return (<div className="splash"><div className="logo-3d"><Logo /></div><div className="splash-text">UMEED</div><div className="splash-sub">EDUCATION SYSTEM</div><div className="splash-version">v4.0 - Production Ready</div></div>);
}

function Login({ onAuth }) {
  const [email, setEmail] = useState('principal@umeededu.pk');
  const [pass, setPass] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  const submit = (e) => {
    e.preventDefault();
    if (!email || !pass) { setErr('Email and password required'); return; }
    setLoading(true);
    setTimeout(() => {
      if (email === 'principal@umeededu.pk' && pass === 'admin123') {
        onAuth({ name: 'H.M. Tariq Mehmood', role: 'Principal', id: 'UES-001' });
      } else {
        setErr('Invalid credentials');
      }
      setLoading(false);
    }, 300);
  };

function Attendance() {
  const [date, setDate] = useState(new Date().toISOString().split('T')[0]);

  const handleExport = (format) => {
    let csv = 'ID,Name,Date,Time,Status\n';
    ATT_DATA.forEach(r => {
      csv += `${r.id},${r.name},${r.date},${r.time},${r.status}\n`;
    });
    if (format === 'csv') {
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `attendance-${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
      alert('Attendance exported as CSV');
    } else if (format === 'print') {
      window.print();
    }
  };

  return (<>
    <div className="header"><h1 className="header-title">Attendance Records</h1><p className="header-date">Daily tracking and reporting</p></div>
    <div className="form-row"><div><label className="form-label">Select Date</label><input type="date" className="search-input" value={date} onChange={(e) => setDate(e.target.value)} style={{marginBottom: 0}} /></div></div>
    <div className="export-box">
      <label className="form-label">Export Options</label>
      <button className="export-btn" onClick={() => handleExport('csv')}>EXPORT CSV</button>
      <button className="export-btn" onClick={() => handleExport('print')}>PRINT</button>
    </div>
    <div className="table-box">
      <table>
        <thead><tr><th>ID</th><th>Name</th><th>Date</th><th>Check-in</th><th>Status</th></tr></thead>
        <tbody>
          {ATT_DATA.map((r, i) => (<tr key={i}><td>{r.id}</td><td>{r.name}</td><td>{r.date}</td><td>{r.time}</td><td><span className={`badge badge-${r.status.toLowerCase()}`}>{r.status}</span></td></tr>))}
        </tbody>
      </table>
    </div>
  </>);
}

        {page === 'devices' && <DeviceLogs />}
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
