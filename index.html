<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umeed Education System - Staff Attendance Management</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>

<style>
:root, [data-theme="dark"] {
  --bg-base: #0C0508;
  --surface: #130810;
  --maroon: #C41E30;
  --maroon-deep: #7A0E1A;
  --gold: #D4AF37;
  --text-primary: #F2EBF0;
  --text-secondary: #A89AA5;
  --text-muted: #6B5E68;
  --border: rgba(255,255,255,0.07);
}

[data-theme="light"] {
  --bg-base: #F8F4F6;
  --surface: #FFFFFF;
  --text-primary: #1A0810;
  --text-secondary: #4A2D3C;
  --text-muted: #8A6878;
  --border: rgba(0,0,0,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body, #root { height: 100%; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg-base);
  color: var(--text-primary);
  transition: background 300ms, color 300ms;
}

.splash-container {
  display: flex;
  height: 100vh;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #0C0508 0%, #1A0C15 100%);
  flex-direction: column;
  gap: 30px;
  perspective: 1200px;
}

.logo-wrapper {
  width: 220px;
  height: 220px;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: float3d 4s ease-in-out infinite;
  filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.6)) drop-shadow(0 0 50px rgba(196, 30, 48, 0.4));
}

.logo-image {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

@keyframes float3d {
  0% { transform: rotateX(0deg) rotateY(0deg) translateY(0px); }
  25% { transform: rotateX(15deg) rotateY(90deg) translateY(-10px); }
  50% { transform: rotateX(30deg) rotateY(180deg) translateY(0px); }
  75% { transform: rotateX(15deg) rotateY(270deg) translateY(-10px); }
  100% { transform: rotateX(0deg) rotateY(360deg) translateY(0px); }
}

.splash-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 56px;
  font-weight: 700;
  color: #F2EBF0;
  letter-spacing: 2px;
  animation: fadeInUp 0.8s ease-out 0.3s both;
}

.splash-sub {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  color: #D4AF37;
  letter-spacing: 2px;
  animation: fadeInUp 0.8s ease-out 0.5s both;
  font-weight: 500;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.login-container {
  display: flex;
  height: 100vh;
  background: linear-gradient(135deg, #0C0508 0%, #1A0C15 100%);
}

.login-left {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px;
}

.logo-badge {
  width: 180px;
  height: 180px;
  margin-bottom: 50px;
  filter: drop-shadow(0 15px 40px rgba(196, 30, 48, 0.5));
  animation: fadeInUp 0.8s ease-out both;
}

.login-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 48px;
  font-weight: 700;
  color: #F2EBF0;
  margin-bottom: 15px;
  animation: fadeInUp 0.8s ease-out 0.2s both;
}

.login-subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  color: #D4AF37;
  margin-bottom: 30px;
  animation: fadeInUp 0.8s ease-out 0.4s both;
  font-weight: 500;
  letter-spacing: 1px;
}

.login-desc {
  color: #A89AA5;
  text-align: center;
  font-size: 13px;
  animation: fadeInUp 0.8s ease-out 0.6s both;
}

.login-right {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
}

.login-card {
  background: rgba(26, 12, 21, 0.95);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(196, 30, 48, 0.3);
  border-radius: 24px;
  padding: 50px 40px;
  width: 100%;
  max-width: 440px;
  box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
  animation: fadeInUp 0.8s ease-out 0.3s both;
}

.card-header {
  margin-bottom: 30px;
}

.card-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 700;
  color: #D4AF37;
  margin-bottom: 8px;
}

.card-subtitle {
  color: #A89AA5;
  font-size: 13px;
}

.form-group {
  margin-bottom: 22px;
}

.form-label {
  display: block;
  color: #6B5E68;
  font-size: 11px;
  font-weight: 600;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-input {
  width: 100%;
  padding: 13px 16px;
  background: rgba(255, 255, 255, 0.042);
  border: 1px solid rgba(255, 255, 255, 0.07);
  border-radius: 10px;
  color: #F2EBF0;
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  transition: all 200ms ease;
}

.form-input:focus {
  outline: none;
  border-color: #C41E30;
  background: rgba(255, 255, 255, 0.08);
  box-shadow: 0 0 0 3px rgba(196, 30, 48, 0.15);
}

.form-input::placeholder { color: #6B5E68; }

.submit-btn {
  width: 100%;
  padding: 13px 20px;
  background: linear-gradient(135deg, #C41E30 0%, #7A0E1A 100%);
  border: none;
  border-radius: 10px;
  color: white;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: all 200ms ease;
  margin-top: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 30px rgba(196, 30, 48, 0.4);
}

.submit-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.error-alert {
  background: rgba(239, 68, 68, 0.12);
  border: 1px solid rgba(239, 68, 68, 0.3);
  border-radius: 10px;
  color: #f87171;
  padding: 12px 14px;
  font-size: 12px;
  margin-bottom: 20px;
  animation: shake 0.4s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

.login-footer {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid rgba(255, 255, 255, 0.07);
  text-align: center;
  color: #6B5E68;
  font-size: 10px;
}

.app-layout {
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 260px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 20px;
  overflow-y: auto;
}

.sidebar-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 30px;
  text-align: center;
  letter-spacing: 1px;
}

.nav-group {
  margin-bottom: 30px;
}

.nav-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-left: 12px;
  margin-bottom: 10px;
  letter-spacing: 0.5px;
}

.nav-btn {
  width: 100%;
  padding: 12px 16px;
  background: transparent;
  border: none;
  border-radius: 10px;
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 150ms ease;
  text-align: left;
  margin-bottom: 6px;
}

.nav-btn:hover {
  background: rgba(196, 30, 48, 0.1);
  color: var(--text-primary);
}

.nav-btn.active {
  background: linear-gradient(135deg, rgba(196, 30, 48, 0.3), rgba(196, 30, 48, 0.1));
  color: var(--gold);
  border-left: 3px solid var(--maroon);
  font-weight: 600;
}

.sidebar-footer {
  margin-top: auto;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

.user-card {
  background: rgba(196, 30, 48, 0.1);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
  font-size: 12px;
}

.user-name {
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 2px;
}

.user-role {
  color: var(--text-muted);
  font-size: 11px;
}

.logout-btn {
  width: 100%;
  padding: 10px;
  background: rgba(196, 30, 48, 0.2);
  border: 1px solid rgba(196, 30, 48, 0.3);
  border-radius: 8px;
  color: var(--maroon);
  font-weight: 600;
  font-size: 12px;
  cursor: pointer;
  margin-top: 10px;
  transition: all 150ms ease;
}

.logout-btn:hover {
  background: rgba(196, 30, 48, 0.3);
  border-color: var(--maroon);
}

.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.topbar {
  height: 60px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 30px;
}

.topbar-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--text-primary);
}

.topbar-actions {
  display: flex;
  gap: 12px;
}

.action-btn {
  padding: 8px 16px;
  background: rgba(196, 30, 48, 0.15);
  border: 1px solid rgba(196, 30, 48, 0.3);
  border-radius: 8px;
  color: var(--maroon);
  font-weight: 600;
  font-size: 12px;
  cursor: pointer;
  transition: all 150ms ease;
}

.action-btn:hover {
  background: var(--maroon);
  color: white;
  border-color: var(--maroon);
}

.content-panel {
  flex: 1;
  overflow-y: auto;
  padding: 30px;
}

.section-header {
  margin-bottom: 30px;
}

.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 8px;
}

.section-date {
  color: var(--text-secondary);
  font-size: 13px;
}

.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.stat-box {
  background: linear-gradient(135deg, var(--surface) 0%, rgba(0,0,0,0.1) 100%);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  text-align: center;
  transition: all 200ms ease;
}

.stat-box:hover {
  transform: translateY(-4px);
  border-color: var(--maroon);
  box-shadow: 0 12px 32px rgba(196, 30, 48, 0.15);
}

.stat-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 36px;
  font-weight: 700;
  margin: 8px 0;
}

.stat-label {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.chart-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.chart-card {
  background: linear-gradient(135deg, var(--surface) 0%, rgba(0,0,0,0.05) 100%);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
}

.chart-title {
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 4px;
  font-size: 14px;
}

.chart-subtitle {
  color: var(--text-muted);
  font-size: 12px;
  margin-bottom: 16px;
}

.chart-container {
  position: relative;
  height: 280px;
  width: 100%;
}

.data-table {
  background: linear-gradient(135deg, var(--surface) 0%, rgba(0,0,0,0.05) 100%);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  overflow-x: auto;
}

.data-table table {
  width: 100%;
  border-collapse: collapse;
}

.data-table th {
  background: rgba(196, 30, 48, 0.05);
  padding: 12px;
  text-align: left;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 2px solid var(--border);
}

.data-table td {
  padding: 12px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}

.data-table tr:hover {
  background: rgba(196, 30, 48, 0.05);
}

.badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
}

.badge-present {
  background: rgba(34, 197, 94, 0.15);
  color: #4ade80;
}

.badge-absent {
  background: rgba(239, 68, 68, 0.15);
  color: #f87171;
}

.badge-late {
  background: rgba(251, 191, 36, 0.15);
  color: #fbbf24;
}

.camera-btn {
  padding: 12px 24px;
  background: linear-gradient(135deg, var(--gold), #B8941E);
  color: #000;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
  transition: all 200ms ease;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 20px;
}

.camera-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 30px rgba(212, 175, 55, 0.3);
}

.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}

.modal-overlay.active {
  display: flex;
}

.modal-content {
  background: var(--surface);
  border-radius: 20px;
  padding: 30px;
  width: 90%;
  max-width: 500px;
  max-height: 80vh;
  overflow-y: auto;
  border: 1px solid var(--border);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.modal-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 600;
}

.modal-close {
  background: none;
  border: none;
  font-size: 28px;
  cursor: pointer;
  color: var(--text-muted);
  transition: color 150ms ease;
}

.modal-close:hover {
  color: var(--text-primary);
}

.video-preview {
  width: 100%;
  height: 300px;
  background: #000;
  border-radius: 12px;
  margin: 20px 0;
}

.loading-text {
  text-align: center;
  color: var(--text-muted);
  padding: 40px;
}

@media (max-width: 768px) {
  .app-layout { flex-direction: column; }
  .sidebar { width: 100%; height: auto; flex-direction: row; padding: 0 20px; border-bottom: 1px solid var(--border); border-right: none; }
  .sidebar-brand { margin-bottom: 0; margin-right: auto; }
  .nav-group, .sidebar-footer { display: none; }
  .content-panel { padding: 20px; }
  .section-title { font-size: 24px; }
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .chart-grid { grid-template-columns: 1fr; }
}
</style>
</head>

function SplashScreen({ onComplete }) {
  useEffect(() => {
    const timer = setTimeout(onComplete, 4000);
    return () => clearTimeout(timer);
  }, [onComplete]);

  return (
    <div className="splash-container">
      <div className="logo-wrapper">
        <UmeedLogo />
      </div>
      <div className="splash-text">UMEED</div>
      <div className="splash-sub">EDUCATION SYSTEM</div>
    </div>
  );
}

function LoginScreen({ onLoginSuccess }) {
  const [email, setEmail] = useState('principal@umeededu.pk');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError('');

    if (!email || !password) {
      setError('Please enter email and password');
      return;
    }

    setLoading(true);
    setTimeout(() => {
      if (email === 'principal@umeededu.pk' && password === 'admin123') {
        onLoginSuccess({
          email,
          name: 'H.M. Tariq Mehmood',
          role: 'Principal - Admin',
        });
      } else {
        setError('Invalid credentials');
      }
      setLoading(false);
    }, 500);
  };

  return (
    <div className="login-container">
      <div className="login-left">
        <div className="logo-badge">
          <UmeedLogo />
        </div>
        <h1 className="login-title">UMEED</h1>
        <p className="login-subtitle">EDUCATION SYSTEM</p>
        <p className="login-desc">Staff Attendance Management Platform</p>
      </div>

      <div className="login-right">
        <div className="login-card">
          <div className="card-header">
            <h2 className="card-title">Admin Portal</h2>
            <p className="card-subtitle">Sign in to your account</p>
          </div>

          {error && <div className="error-alert">{error}</div>}

          <form onSubmit={handleSubmit}>
            <div className="form-group">
              <label className="form-label">Email</label>
              <input type="email" className="form-input" value={email} onChange={(e) => setEmail(e.target.value)} disabled={loading} />
            </div>

            <div className="form-group">
              <label className="form-label">Password</label>
              <input type="password" className="form-input" value={password} onChange={(e) => setPassword(e.target.value)} disabled={loading} />
            </div>

            <button type="submit" className="submit-btn" disabled={loading}>
              {loading ? 'Signing in...' : 'Sign In'}
            </button>
          </form>

          <div className="login-footer">
            <p>Umeed Education System</p>
            <p>Academic Year 2025-26</p>
          </div>
        </div>
      </div>
    </div>
  );
}

function CameraModal({ open, onClose, onCapture }) {
  const videoRef = useRef(null);
  const [status, setStatus] = useState('loading');

  useEffect(() => {
    if (open) {
      setStatus('loading');
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
        .then(stream => {
          if (videoRef.current) {
            videoRef.current.srcObject = stream;
            setStatus('ready');
          }
        })
        .catch(err => {
          console.error('Camera error:', err);
          setStatus('error');
        });
    } else {
      if (videoRef.current?.srcObject) {
        videoRef.current.srcObject.getTracks().forEach(track => track.stop());
      }
    }
  }, [open]);

  return (
    <div className={`modal-overlay ${open ? 'active' : ''}`}>
      <div className="modal-content">
        <div className="modal-header">
          <h3 className="modal-title">Camera Attendance</h3>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>

        <p style={{color: 'var(--text-secondary)', marginBottom: 20, fontSize: 13}}>
          Position yourself in front of the camera and click "Mark Present"
        </p>

        {status === 'loading' && <div className="loading-text">Starting camera...</div>}
        {status === 'ready' && (
          <>
            <video ref={videoRef} className="video-preview" autoPlay playsInline />
            <button className="camera-btn" onClick={onCapture} style={{width: '100%', marginBottom: 10}}>
              Mark Present
            </button>
          </>
        )}
        {status === 'error' && <div className="loading-text">Camera not available</div>}

        <button className="action-btn" onClick={onClose} style={{width: '100%'}}>
          Cancel
        </button>
      </div>
    </div>
  );
}

function AttendanceChart() {
  const canvasRef = useRef(null);

  useEffect(() => {
    if (canvasRef.current && window.Chart) {
      const ctx = canvasRef.current.getContext('2d');
      new window.Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Present', 'Absent', 'Late'],
          datasets: [{
            data: [32, 8, 5],
            backgroundColor: ['rgba(74, 222, 128, 0.8)', 'rgba(248, 113, 113, 0.8)', 'rgba(251, 191, 36, 0.8)'],
            borderColor: ['#4ade80', '#f87171', '#fbbf24'],
            borderWidth: 2,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom', labels: { color: 'var(--text-secondary)', padding: 15, font: {size: 12, weight: 600}}}}
        }
      });
    }
  }, []);

  return <canvas ref={canvasRef} />;
}

function TrendChart() {
  const canvasRef = useRef(null);

  useEffect(() => {
    if (canvasRef.current && window.Chart) {
      const ctx = canvasRef.current.getContext('2d');
      new window.Chart(ctx, {
        type: 'line',
        data: {
          labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'],
          datasets: [{
            label: 'Present',
            data: [35, 34, 33, 32, 36, 35, 34, 33, 35, 34, 36, 35],
            borderColor: '#4ade80',
            backgroundColor: 'rgba(74, 222, 128, 0.1)',
            borderWidth: 3,
            pointRadius: 5,
            tension: 0.4,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { labels: { color: 'var(--text-secondary)', font: {size: 12}}}},
          scales: {
            y: { beginAtZero: true, max: 45, grid: {color: 'var(--border)'}, ticks: {color: 'var(--text-muted)'}},
            x: { grid: {display: false}, ticks: {color: 'var(--text-muted)'}}
          }
        }
      });
    }
  }, []);

  return <canvas ref={canvasRef} />;
}
