function SplashScreen({ onComplete }) {
  useEffect(() => {
    const timer = setTimeout(onComplete, 4000);
    return () => clearTimeout(timer);
  }, [onComplete]);

  return (
    <div className="splash-container">
      <div className="logo-wrapper">
        <UmeedLogo />
      </div>
      <div className="splash-text">UMEED</div>
      <div className="splash-sub">EDUCATION SYSTEM</div>
    </div>
  );
}

function LoginScreen({ onLoginSuccess }) {
  const [email, setEmail] = useState('principal@umeededu.pk');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError('');

    if (!email || !password) {
      setError('Please enter email and password');
      return;
    }

    setLoading(true);
    setTimeout(() => {
      if (email === 'principal@umeededu.pk' && password === 'admin123') {
        onLoginSuccess({ email, name: 'H.M. Tariq Mehmood', role: 'Principal - Admin' });
      } else {
        setError('Invalid credentials');
      }
      setLoading(false);
    }, 500);
  };

  return (
    <div className="login-container">
      <div className="login-left">
        <div className="logo-badge">
          <UmeedLogo />
        </div>

function CameraModal({ open, onClose }) {
  const videoRef = useRef(null);
  const [status, setStatus] = useState('loading');

  useEffect(() => {
    if (open) {
      setStatus('loading');
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
        .then(stream => {
          if (videoRef.current) {
            videoRef.current.srcObject = stream;
            setStatus('ready');
          }
        })
        .catch(err => { console.error('Camera error:', err); setStatus('error'); });
    } else {
      if (videoRef.current?.srcObject) {
        videoRef.current.srcObject.getTracks().forEach(track => track.stop());
      }
    }
  }, [open]);

  return (
    <div className={`modal-overlay ${open ? 'active' : ''}`}>
      <div className="modal-content">
        <div className="modal-header">
          <h3 className="modal-title">Camera Attendance</h3>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>

        <p style={{color: 'var(--text-secondary)', marginBottom: 20, fontSize: 13}}>Position yourself in front of the camera and click "Mark Present"</p>

        {status === 'loading' && <div className="loading-text">Starting camera...</div>}
        {status === 'ready' && (
          <>
            <video ref={videoRef} className="video-preview" autoPlay playsInline />
            <div className="button-group">
              <button className="btn-primary" onClick={() => { onClose(); alert('Attendance marked successfully!'); }}>Mark Present</button>
              <button className="btn-secondary" onClick={onClose}>Cancel</button>
            </div>
          </>
        )}
        {status === 'error' && <div className="loading-text">Camera not available</div>}
      </div>
    </div>
  );
}

<style>
:root {
  --bg: #0A0408;
  --surface: #140811;
  --text: #FFFFFF;
  --text-secondary: #E5E5E5;
  --text-muted: #B0B0B0;
  --maroon: #C41E30;
  --gold: #D4AF37;
  --border: rgba(255,255,255,0.15);
}

[data-theme="light"] {
  --bg: #FFFFFF;
  --surface: #F8F8F8;
  --text: #1A1A1A;
  --text-secondary: #333333;
  --text-muted: #777777;
  --border: rgba(0,0,0,0.12);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body, #root { height: 100%; width: 100%; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background 200ms, color 200ms;
}

.splash { display: flex; height: 100vh; align-items: center; justify-content: center; background: linear-gradient(135deg, #0A0408, #1A0C15); flex-direction: column; gap: 20px; }

.logo-3d { width: 180px; height: 180px; display: flex; align-items: center; justify-content: center; animation: spin 4s infinite; filter: drop-shadow(0 0 30px rgba(212,175,55,0.8)); }

.logo-img { width: 100%; height: 100%; object-fit: contain; }

@keyframes spin { 0% { transform: rotateX(0) rotateY(0) rotateZ(0); } 50% { transform: rotateX(15deg) rotateY(180deg) rotateZ(10deg); } 100% { transform: rotateX(0) rotateY(360deg) rotateZ(0); } }

.splash-text { font-family: 'Cormorant Garamond', serif; font-size: 52px; font-weight: 700; color: #FFFFFF; letter-spacing: 2px; }

.splash-sub { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: #D4AF37; letter-spacing: 1.5px; }

.login { display: flex; min-height: 100vh; background: linear-gradient(135deg, #0A0408, #1A0C15); }

.login-left { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }

.logo-badge { width: 140px; height: 140px; margin-bottom: 30px; filter: drop-shadow(0 10px 30px rgba(196,30,48,0.6)); }

.login-title { font-family: 'Cormorant Garamond', serif; font-size: 44px; font-weight: 700; color: #FFFFFF; margin-bottom: 8px; }

.login-subtitle { font-family: 'Cormorant Garamond', serif; font-size: 16px; color: #D4AF37; margin-bottom: 15px; }

.login-desc { color: #C0C0C0; font-size: 12px; }

.login-right { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }

.login-card { background: rgba(20, 8, 17, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(196, 30, 48, 0.4); border-radius: 16px; padding: 35px; width: 100%; max-width: 400px; }

.card-header { margin-bottom: 20px; }

.card-title { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 700; color: #D4AF37; margin-bottom: 5px; }

.card-subtitle { color: #A0A0A0; font-size: 11px; }

.form-group { margin-bottom: 16px; }

.form-label { display: block; color: #808080; font-size: 10px; font-weight: 600; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }

.form-input { width: 100%; padding: 11px 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: #FFFFFF; font-size: 13px; transition: all 150ms ease; }

.form-input:focus { outline: none; border-color: #C41E30; background: rgba(255,255,255,0.12); }

.form-input::placeholder { color: #606060; }

.submit-btn { width: 100%; padding: 11px; background: linear-gradient(135deg, #C41E30, #9A0B1E); border: none; border-radius: 8px; color: white; font-weight: 600; font-size: 12px; cursor: pointer; margin-top: 8px; text-transform: uppercase; letter-spacing: 0.5px; transition: all 150ms ease; }

.submit-btn:hover { transform: translateY(-2px); }

.submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

.error { background: rgba(220,38,38,0.15); border: 1px solid rgba(220,38,38,0.3); border-radius: 8px; color: #FF8080; padding: 9px 11px; font-size: 11px; margin-bottom: 16px; }

.login-footer { margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.08); text-align: center; color: #606060; font-size: 9px; }

.app { display: flex; min-height: 100vh; background: var(--bg); color: var(--text); }

.sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 16px; overflow-y: auto; }

.sidebar-brand { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 700; color: var(--gold); margin-bottom: 20px; text-align: center; }

.nav-btn { width: 100%; padding: 9px 12px; background: transparent; border: none; border-radius: 6px; color: var(--text-secondary); font-size: 12px; font-weight: 500; cursor: pointer; text-align: left; margin-bottom: 3px; transition: all 150ms ease; }

.nav-btn:hover { background: rgba(196,30,48,0.15); color: var(--text); }

.nav-btn.active { background: rgba(196,30,48,0.25); color: var(--gold); border-left: 2px solid var(--maroon); }

.sidebar-footer { margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border); }

.user-card { background: rgba(196,30,48,0.12); border-radius: 6px; padding: 9px; margin-bottom: 10px; font-size: 10px; }

.user-name { font-weight: 600; color: var(--text); margin-bottom: 2px; }

.user-role { color: var(--text-muted); font-size: 9px; }

.logout-btn { width: 100%; padding: 8px; background: rgba(196,30,48,0.2); border: 1px solid rgba(196,30,48,0.3); border-radius: 6px; color: var(--maroon); font-weight: 600; font-size: 11px; cursor: pointer; margin-top: 10px; transition: all 150ms ease; }

.logout-btn:hover { background: rgba(196,30,48,0.3); }

.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar { height: 52px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 22px; }

.topbar-title { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 600; color: var(--text); }

.topbar-actions { display: flex; gap: 12px; align-items: center; }

.theme-toggle { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 18px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 150ms ease; }

.theme-toggle:hover { border-color: var(--maroon); background: rgba(196,30,48,0.1); }

.action-btn { padding: 6px 12px; background: rgba(196,30,48,0.15); border: 1px solid rgba(196,30,48,0.25); border-radius: 6px; color: var(--maroon); font-weight: 600; font-size: 10px; cursor: pointer; transition: all 150ms ease; }

.action-btn:hover { background: var(--maroon); color: white; border-color: var(--maroon); }

.content { flex: 1; overflow-y: auto; padding: 22px; }

.header { margin-bottom: 20px; }

.header-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 4px; }

.header-date { color: var(--text-secondary); font-size: 11px; }

.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }

.stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; transition: all 150ms ease; }

.stat:hover { transform: translateY(-2px); border-color: var(--maroon); }

.stat-value { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; margin: 4px 0; }

.stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }

.table-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; overflow-x: auto; }

.table-card table { width: 100%; border-collapse: collapse; }

.table-card th { background: rgba(196,30,48,0.08); padding: 9px; text-align: left; font-size: 9px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; border-bottom: 1px solid var(--border); }

.table-card td { padding: 9px; border-bottom: 1px solid var(--border); font-size: 11px; }

.table-card tr:hover { background: rgba(196,30,48,0.05); }

.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 9px; font-weight: 600; text-transform: uppercase; }

.badge-present { background: rgba(34,197,94,0.2); color: #22C55E; }

.badge-absent { background: rgba(239,68,68,0.2); color: #EF4444; }

.badge-late { background: rgba(251,191,36,0.2); color: #FBB924; }

.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }

.modal.show { display: flex; }

.modal-inner { background: var(--surface); border-radius: 14px; padding: 22px; width: 90%; max-width: 520px; max-height: 70vh; overflow-y: auto; border: 1px solid var(--border); }

.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

.modal-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: var(--text); }

.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-muted); }

.modal-close:hover { color: var(--text); }

.camera-placeholder { width: 100%; height: 250px; background: #222; border-radius: 10px; margin: 12px 0; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 13px; }

.btn-group { display: flex; gap: 8px; margin-top: 16px; }

.btn-primary { flex: 1; padding: 9px; background: var(--maroon); border: none; border-radius: 6px; color: white; font-weight: 600; font-size: 11px; cursor: pointer; }

.btn-primary:hover { opacity: 0.9; }

.btn-secondary { flex: 1; padding: 9px; background: rgba(196,30,48,0.15); border: 1px solid rgba(196,30,48,0.25); border-radius: 6px; color: var(--maroon); font-weight: 600; font-size: 11px; cursor: pointer; }

.btn-secondary:hover { background: rgba(196,30,48,0.25); }

@media (max-width: 1000px) {
  .login { flex-direction: column; }
  .app { flex-direction: column; }
  .sidebar { width: 100%; max-height: 60px; flex-direction: row; border-bottom: 1px solid var(--border); border-right: none; padding: 10px 16px; }
  .sidebar-brand { margin-bottom: 0; margin-right: auto; font-size: 14px; }
  .nav-btn { display: none; }
  .sidebar-footer { display: none; }
  .content { padding: 16px; }
  .header-title { font-size: 20px; }
  .stats { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .table-card { padding: 12px; }
  .table-card th, .table-card td { padding: 7px; font-size: 10px; }
}

@media (max-width: 600px) {
  .logo-badge { width: 110px; height: 110px; margin-bottom: 20px; }
  .login-title { font-size: 32px; }
  .login-card { padding: 25px; max-width: 95%; }
  .splash-text { font-size: 40px; }
  .sidebar { padding: 8px 12px; }
  .sidebar-brand { font-size: 12px; margin-bottom: 0; }
  .topbar { padding: 0 16px; height: 48px; }
  .topbar-title { font-size: 14px; }
  .content { padding: 12px; }
  .header-title { font-size: 18px; }
  .stats { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .stat { padding: 12px; }
  .stat-value { font-size: 22px; }
  .modal-inner { width: 95%; padding: 16px; }
  .camera-placeholder { height: 200px; }
}
</style>
</head>

function Splash({ onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3500); return () => clearTimeout(t); }, [onDone]);
  return (<div className="splash"><div className="logo-3d"><Logo /></div><div className="splash-text">UMEED</div><div className="splash-sub">EDUCATION SYSTEM</div></div>);
}

function Login({ onAuth }) {
  const [email, setEmail] = useState('principal@umeededu.pk');
  const [pass, setPass] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);
  const submit = (e) => { e.preventDefault(); setErr(''); if (!email || !pass) { setErr('Email and password required'); return; } setLoading(true); setTimeout(() => { if (email === 'principal@umeededu.pk' && pass === 'admin123') { onAuth({ name: 'H.M. Tariq Mehmood', role: 'Principal' }); } else { setErr('Invalid credentials'); } setLoading(false); }, 300); };
  return (<div className="login"><div className="login-left"><div className="logo-badge"><Logo /></div><h1 className="login-title">UMEED</h1><p className="login-subtitle">EDUCATION SYSTEM</p><p className="login-desc">Staff Attendance Management</p></div><div className="login-right"><div className="login-card"><div className="card-header"><h2 className="card-title">Admin Portal</h2><p className="card-subtitle">Sign in</p></div>{err && <div className="error">{err}</div>}<form onSubmit={submit}><div className="form-group"><label className="form-label">Email</label><input type="email" className="form-input" value={email} onChange={(e) => setEmail(e.target.value)} disabled={loading} /></div><div className="form-group"><label className="form-label">Password</label><input type="password" className="form-input" value={pass} onChange={(e) => setPass(e.target.value)} disabled={loading} /></div><button type="submit" className="submit-btn" disabled={loading}>{loading ? 'Signing in...' : 'Sign In'}</button></form><div className="login-footer"><p>Umeed Education System</p><p>2025-26</p></div></div></div></div>);
}

function CameraModal({ open, onClose }) {
  return (<div className={`modal ${open ? 'show' : ''}`}><div className="modal-inner"><div className="modal-header"><h3 className="modal-title">Camera Attendance</h3><button className="modal-close" onClick={onClose}>×</button></div><p style={{fontSize: 12, marginBottom: 12}}>Position yourself and click Mark Present</p><div className="camera-placeholder">Camera Placeholder</div><div className="btn-group"><button className="btn-primary" onClick={() => { onClose(); alert('Attendance marked!'); }}>Mark Present</button><button className="btn-secondary" onClick={onClose}>Cancel</button></div></div></div>);
}

function Dashboard() {
  const [cameraOpen, setCameraOpen] = useState(false);
  return (<><div className="header"><h1 className="header-title">Dashboard</h1><p className="header-date">{new Date().toLocaleDateString()}</p></div><button className="btn-primary" onClick={() => setCameraOpen(true)} style={{marginBottom: 16, width: 'auto'}}>Camera Attendance</button><div className="stats"><div className="stat"><div className="stat-value" style={{color: 'var(--gold)'}}>46</div><div className="stat-label">Total</div></div><div className="stat"><div className="stat-value" style={{color: '#22C55E'}}>32</div><div className="stat-label">Present</div></div><div className="stat"><div className="stat-value" style={{color: '#EF4444'}}>8</div><div className="stat-label">Absent</div></div><div className="stat"><div className="stat-value" style={{color: '#FBB924'}}>5</div><div className="stat-label">Late</div></div></div><div className="table-card"><h3 style={{fontSize: 13, marginBottom: 12, fontWeight: 600}}>Today's Attendance</h3><table><thead><tr><th>ID</th><th>Name</th><th>Time</th><th>Status</th></tr></thead><tbody><tr><td>UES-001</td><td>H.M. Tariq Mehmood</td><td>07:45</td><td><span className="badge badge-present">Present</span></td></tr><tr><td>UES-002</td><td>Mrs. Ruqaiya Bibi</td><td>08:00</td><td><span className="badge badge-present">Present</span></td></tr><tr><td>UES-003</td><td>Mr. Muhammad Bilal</td><td>08:30</td><td><span className="badge badge-late">Late</span></td></tr><tr><td>UES-004</td><td>Miss Tayyaba</td><td>—</td><td><span className="badge badge-absent">Absent</span></td></tr></tbody></table></div><CameraModal open={cameraOpen} onClose={() => setCameraOpen(false)} /></>);
}

function App() {
  const [splash, setSplash] = useState(true);
  const [user, setUser] = useState(null);

  useEffect(() => {
    const html = document.documentElement;
    const saved = localStorage.getItem('theme') || 'dark';
    html.setAttribute('data-theme', saved);
    
    const toggleTheme = () => {
      const curr = html.getAttribute('data-theme');
      const next = curr === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    };
    
    document.addEventListener('keydown', (e) => { if (e.ctrlKey && e.key === 't') { e.preventDefault(); toggleTheme(); } });
  }, []);

  if (splash) return <Splash onDone={() => setSplash(false)} />;
  if (!user) return <Login onAuth={setUser} />;

  return (<div className="app"><div className="sidebar"><div className="sidebar-brand">UMEED</div><button className="nav-btn active">Dashboard</button><button className="nav-btn">Staff</button><button className="nav-btn">Attendance</button><button className="nav-btn">Leaves</button><button className="nav-btn">Reports</button><div className="sidebar-footer"><div className="user-card"><div className="user-name">{user.name}</div><div className="user-role">{user.role}</div></div><button className="logout-btn" onClick={() => setUser(null)}>Logout</button></div></div><div className="main"><div className="topbar"><div className="topbar-title">Umeed Education System</div><div className="topbar-actions"><button className="theme-toggle" onClick={() => { const h = document.documentElement; const curr = h.getAttribute('data-theme'); const next = curr === 'dark' ? 'light' : 'dark'; h.setAttribute('data-theme', next); localStorage.setItem('theme', next); }}>{document.documentElement.getAttribute('data-theme') === 'dark' ? '🌙' : '☀️'}</button><button className="action-btn" onClick={() => window.print()}>Print</button><button className="action-btn">Settings</button></div></div><div className="content"><Dashboard /></div></div></div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
