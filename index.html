<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umeed Education System - Attendance Management</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<style>
:root{--primary:#C41E30;--primary-dark:#7A0E1A;--primary-light:#E94560;--accent-gold:#D4AF37;--bg:#0B0D12;--bg-2:#11141B;--surface:#161A23;--surface-2:#1E2330;--surface-3:#262C3B;--text:#F5F6FA;--text-2:#A8B0BF;--text-3:#6B7384;--border:rgba(255,255,255,0.06);--border-2:rgba(255,255,255,0.10);--success:#10B981;--warning:#F59E0B;--danger:#EF4444}
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{height:100%}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:#3a4052}
.splash{display:flex;height:100vh;align-items:center;justify-content:center;background:radial-gradient(circle at 20% 20%,rgba(196,30,48,0.15),transparent 50%),radial-gradient(circle at 80% 80%,rgba(212,175,55,0.08),transparent 50%),linear-gradient(135deg,#0B0D12,#11141B);flex-direction:column;gap:36px}
.splash-logo{width:180px;height:180px;border-radius:24px;overflow:hidden;animation:splash-float 3s ease-in-out infinite;box-shadow:0 25px 60px rgba(196,30,48,0.35),0 0 0 1px rgba(212,175,55,0.25)}
.splash-logo img{width:100%;height:100%;object-fit:cover;display:block}
@keyframes splash-float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-10px) scale(1.03)}}
.splash-title{font-family:'Playfair Display',serif;font-size:54px;font-weight:700;letter-spacing:4px;background:linear-gradient(135deg,#fff 0%,#D4AF37 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.splash-subtitle{font-size:13px;color:var(--accent-gold);letter-spacing:6px;font-weight:600;text-transform:uppercase}
.splash-loader{width:160px;height:3px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
.splash-loader::after{content:'';display:block;height:100%;background:linear-gradient(90deg,var(--primary),var(--accent-gold));animation:loader 3.4s linear forwards}
@keyframes loader{from{width:0%}to{width:100%}}
.login-wrapper{display:flex;height:100vh;background:linear-gradient(135deg,#0B0D12 0%,#11141B 100%)}
.login-left{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;background:radial-gradient(circle at 30% 30%,rgba(196,30,48,0.12),transparent 60%),radial-gradient(circle at 70% 70%,rgba(212,175,55,0.05),transparent 60%)}
.login-logo{width:140px;height:140px;margin-bottom:40px;border-radius:20px;overflow:hidden;box-shadow:0 20px 50px rgba(196,30,48,0.3),0 0 0 1px rgba(212,175,55,0.2)}
.login-logo img{width:100%;height:100%;object-fit:cover;display:block}
.login-title{font-family:'Playfair Display',serif;font-size:44px;font-weight:700;letter-spacing:3px;background:linear-gradient(135deg,#fff,#D4AF37);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.login-subtitle{font-size:12px;color:var(--accent-gold);letter-spacing:5px;font-weight:600;text-transform:uppercase}
.login-right{flex:1;display:flex;align-items:center;justify-content:center;padding:60px}
.login-box{background:linear-gradient(135deg,rgba(30,35,48,0.85),rgba(22,26,35,0.75));backdrop-filter:blur(24px);border:1px solid var(--border-2);border-radius:20px;padding:48px;width:100%;max-width:440px;box-shadow:0 30px 70px rgba(0,0,0,0.6)}
.form-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--text);margin-bottom:6px}
.form-description{color:var(--text-3);font-size:13px;margin-bottom:28px}
.form-group{margin-bottom:20px}
.form-label{display:block;color:var(--text-2);font-size:11px;font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.form-input{width:100%;padding:13px 14px;background:rgba(255,255,255,0.03);border:1px solid var(--border-2);border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;transition:all 180ms ease}
.form-input:focus{outline:none;border-color:var(--primary);background:rgba(255,255,255,0.05);box-shadow:0 0 0 3px rgba(196,30,48,0.15)}
.form-input:disabled{opacity:0.6}
.btn-login{width:100%;padding:14px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border:none;border-radius:10px;color:white;font-weight:600;font-size:13px;cursor:pointer;transition:all 200ms ease;margin-top:10px;text-transform:uppercase;letter-spacing:1px;font-family:inherit}
.btn-login:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 12px 30px rgba(196,30,48,0.4)}
.btn-login:disabled{opacity:0.6;cursor:not-allowed}
.error-box{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;padding:11px 14px;border-radius:10px;font-size:12px;margin-bottom:18px;animation:shake 0.4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.dashboard-shell{display:flex;height:100vh;background:var(--bg)}
.sidebar-nav{width:260px;flex-shrink:0;background:linear-gradient(180deg,var(--surface) 0%,var(--bg-2) 100%);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 16px;overflow-y:auto}
.nav-brand{display:flex;align-items:center;gap:12px;margin-bottom:32px;padding:4px 8px 20px;border-bottom:1px solid var(--border)}
.nav-brand-logo{width:44px;height:44px;flex-shrink:0;border-radius:10px;overflow:hidden;box-shadow:0 4px 12px rgba(196,30,48,0.3)}
.nav-brand-logo img{width:100%;height:100%;object-fit:cover;display:block}
.nav-brand-text{display:flex;flex-direction:column}
.nav-brand-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--text);letter-spacing:1.5px}
.nav-brand-sub{font-size:9px;color:var(--accent-gold);text-transform:uppercase;letter-spacing:1.2px;font-weight:600}
.nav-section{margin-bottom:24px;flex:1}
.nav-section-title{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;margin:0 12px 10px;letter-spacing:1.2px}
.nav-link{width:100%;padding:11px 14px;display:flex;align-items:center;gap:12px;background:transparent;border:none;color:var(--text-2);font-size:13px;font-weight:500;cursor:pointer;border-radius:8px;transition:all 150ms ease;text-align:left;margin-bottom:3px;font-family:inherit}
.nav-link:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.nav-link.active{background:linear-gradient(135deg,rgba(196,30,48,0.2),rgba(196,30,48,0.08));color:#fff;font-weight:600;box-shadow:inset 3px 0 0 var(--primary)}
.nav-icon{width:18px;display:inline-flex;align-items:center;justify-content:center;font-size:15px}
.nav-footer{padding-top:18px;border-top:1px solid var(--border)}
.user-profile{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:10px}
.user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:13px;flex-shrink:0}
.user-info{min-width:0;flex:1}
.user-profile-name{font-weight:600;color:var(--text);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-profile-role{color:var(--text-3);font-size:10px}
.btn-logout{width:100%;padding:9px;background:transparent;border:1px solid rgba(239,68,68,0.25);color:#FCA5A5;border-radius:8px;font-weight:600;font-size:11px;cursor:pointer;transition:all 150ms ease;text-transform:uppercase;letter-spacing:0.8px;font-family:inherit}
.btn-logout:hover{background:rgba(239,68,68,0.1);border-color:var(--danger);color:#fff}
.main-panel{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar-nav{height:64px;background:rgba(22,26,35,0.7);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px}
.topbar-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;color:var(--text)}
.topbar-actions{display:flex;gap:10px;align-items:center}
.btn-secondary{padding:8px 16px;background:rgba(255,255,255,0.04);border:1px solid var(--border-2);color:var(--text-2);border-radius:8px;font-weight:600;font-size:12px;cursor:pointer;transition:all 150ms ease;font-family:inherit}
.btn-secondary:hover{background:var(--primary);color:white;border-color:var(--primary)}
.content-area{flex:1;overflow-y:auto;padding:32px 40px}
.page-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px;gap:20px;flex-wrap:wrap}
.page-title{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;margin-bottom:4px;letter-spacing:-0.3px;color:var(--text)}
.page-date{color:var(--text-3);font-size:13px}
.btn-camera-main{padding:12px 24px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border:none;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;transition:all 200ms ease;display:inline-flex;align-items:center;gap:10px;box-shadow:0 8px 20px rgba(196,30,48,0.3);font-family:inherit}
.btn-camera-main:hover{transform:translateY(-2px);box-shadow:0 14px 34px rgba(196,30,48,0.4)}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;margin-bottom:28px}
.stat-card{background:linear-gradient(135deg,var(--surface) 0%,var(--bg-2) 100%);border:1px solid var(--border);border-radius:14px;padding:22px;transition:all 220ms ease;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--stat-color,var(--primary));opacity:0.8}
.stat-card:hover{transform:translateY(-3px);border-color:var(--border-2);box-shadow:0 10px 30px rgba(0,0,0,0.3)}
.stat-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.stat-label{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.8px;font-weight:600}
.stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.04);color:var(--stat-color,var(--primary));font-size:16px;font-weight:700}
.stat-value{font-family:'Playfair Display',serif;font-size:34px;font-weight:700;color:var(--text);line-height:1;margin-bottom:6px}
.stat-trend{font-size:11px;color:var(--text-3);font-weight:500}
.stat-trend.up{color:var(--success)}
.stat-trend.down{color:var(--danger)}
.charts-row{display:grid;grid-template-columns:1fr 1.6fr;gap:18px;margin-bottom:28px}
.chart-box{background:linear-gradient(135deg,var(--surface) 0%,var(--bg-2) 100%);border:1px solid var(--border);border-radius:14px;padding:24px}
.chart-header{margin-bottom:18px;display:flex;justify-content:space-between;align-items:flex-start}
.chart-name{font-size:15px;font-weight:600;color:var(--text);margin-bottom:3px}
.chart-meta{font-size:12px;color:var(--text-3)}
.chart-canvas{position:relative;height:280px}
.data-table-box{background:linear-gradient(135deg,var(--surface) 0%,var(--bg-2) 100%);border:1px solid var(--border);border-radius:14px;padding:24px;overflow-x:auto}
.data-table{width:100%;border-collapse:collapse}
.data-table th{padding:12px 16px;text-align:left;font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border-2)}
.data-table td{padding:14px 16px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text)}
.data-table tbody tr:last-child td{border-bottom:none}
.data-table tbody tr{transition:background 120ms ease}
.data-table tbody tr:hover{background:rgba(255,255,255,0.02)}
.staff-cell{display:flex;align-items:center;gap:10px}
.staff-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px;flex-shrink:0}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}
.badge-present{background:rgba(16,185,129,0.12);color:#34D399}
.badge-absent{background:rgba(239,68,68,0.12);color:#F87171}
.badge-late{background:rgba(245,158,11,0.12);color:#FBBF24}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity 200ms ease}
.modal-backdrop.active{opacity:1;pointer-events:auto}
.modal-body{background:linear-gradient(135deg,var(--surface-2) 0%,var(--surface) 100%);border:1px solid var(--border-2);border-radius:18px;padding:32px;width:90%;max-width:520px;box-shadow:0 30px 80px rgba(0,0,0,0.7);transform:scale(0.95);transition:transform 200ms ease}
.modal-backdrop.active .modal-body{transform:scale(1)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--text)}
.modal-close{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.04);border:none;font-size:20px;color:var(--text-2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 150ms ease}
.modal-close:hover{background:var(--danger);color:#fff}
.modal-description{color:var(--text-3);font-size:13px;margin-bottom:20px}
.video-wrapper{position:relative;width:100%;height:320px;background:#000;border-radius:12px;margin-bottom:16px;overflow:hidden;border:1px solid var(--border-2)}
.video-stream{width:100%;height:100%;object-fit:cover;display:block;transform:scaleX(-1)}
.video-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-2);font-size:13px;gap:14px;background:#000;transition:opacity 250ms ease}
.video-overlay.hidden{opacity:0;pointer-events:none}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.video-error{color:#FCA5A5;padding:20px;text-align:center;max-width:80%}
.btn-mark{width:100%;padding:13px;background:linear-gradient(135deg,var(--success),#059669);border:none;color:white;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.8px;transition:all 180ms ease;font-family:inherit}
.btn-mark:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 10px 24px rgba(16,185,129,0.3)}
.btn-mark:disabled{opacity:0.5;cursor:not-allowed}
.btn-cancel{width:100%;padding:11px;background:transparent;border:1px solid var(--border-2);color:var(--text-2);border-radius:10px;font-weight:600;font-size:12px;cursor:pointer;transition:all 150ms ease;font-family:inherit;text-transform:uppercase;letter-spacing:0.8px}
.btn-cancel:hover{background:rgba(255,255,255,0.04);color:var(--text)}
@media (max-width:1100px){.charts-row{grid-template-columns:1fr}}
@media (max-width:768px){.sidebar-nav{width:72px;padding:16px 10px}.nav-brand-text,.nav-section-title,.user-info,.nav-link .label{display:none}.nav-link{justify-content:center}.content-area{padding:20px}.stats-row{grid-template-columns:repeat(2,1fr)}.topbar-nav{padding:0 20px}}
</style>
</head>

function CameraModal({open,onClose,onCapture}){
  const videoRef=useRef(null);
  const streamRef=useRef(null);
  const [status,setStatus]=useState('idle');
  const [errorMsg,setErrorMsg]=useState('');
  useEffect(()=>{
    if(!open) return;
    let cancelled=false;
    setStatus('loading'); setErrorMsg('');
    (async()=>{
      try{
        if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
          throw new Error('Camera API not supported by this browser. Use HTTPS or localhost.');
        }
        const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}},audio:false});
        if(cancelled){stream.getTracks().forEach(t=>t.stop());return;}
        streamRef.current=stream;
        const attach=()=>{
          if(cancelled) return;
          const v=videoRef.current;
          if(!v){requestAnimationFrame(attach);return;}
          v.srcObject=stream;
          const onReady=()=>{v.play().then(()=>setStatus('ready')).catch(err=>{setStatus('error');setErrorMsg('Unable to play video: '+err.message);});};
          if(v.readyState>=1) onReady(); else v.onloadedmetadata=onReady;
        };
        attach();
      } catch(err){
        if(cancelled) return;
        let msg='Camera access denied or unavailable.';
        if(err.name==='NotAllowedError') msg='Camera permission was denied. Please allow camera access in your browser settings and reload.';
        else if(err.name==='NotFoundError') msg='No camera device was found on this device.';
        else if(err.name==='NotReadableError') msg='Camera is being used by another application.';
        else if(err.name==='SecurityError') msg='Camera blocked: the page must be served over HTTPS or localhost.';
        else if(err.message) msg=err.message;
        setStatus('error'); setErrorMsg(msg);
      }
    })();
    return()=>{
      cancelled=true;
      if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}
      if(videoRef.current){try{videoRef.current.srcObject=null;}catch(_){}}
    };
  },[open]);

  const handleCapture=()=>{onCapture();onClose();};
  return(<div className={`modal-backdrop ${open?'active':''}`} onClick={(e)=>{if(e.target===e.currentTarget) onClose();}}>
    <div className="modal-body">
      <div className="modal-header">
        <h3 className="modal-title">Camera Attendance</h3>
        <button className="modal-close" onClick={onClose}>×</button>
      </div>
      <p className="modal-description">Position yourself in front of the camera, then click <b>Mark Present</b>.</p>
      <div className="video-wrapper">
        <video ref={videoRef} className="video-stream" autoPlay playsInline muted></video>
        <div className={`video-overlay ${status==='ready'?'hidden':''}`}>
          {status==='loading' && (<><div className="spinner"></div><div>Starting camera…</div></>)}
          {status==='error' && (<div className="video-error">⚠ {errorMsg}</div>)}
          {status==='idle' && (<div>Initializing…</div>)}
        </div>
      </div>
      <button className="btn-mark" onClick={handleCapture} disabled={status!=='ready'}>✓ Mark Present</button>
      <button className="btn-cancel" onClick={onClose}>Cancel</button>
    </div>
  </div>);
}

function DonutChart(){
  const canvasRef=useRef(null); const chartRef=useRef(null);
  useEffect(()=>{
    if(!canvasRef.current||!window.Chart) return;
    if(chartRef.current) chartRef.current.destroy();
    chartRef.current=new window.Chart(canvasRef.current.getContext('2d'),{
      type:'doughnut',
      data:{labels:['Present','Absent','Late'],datasets:[{data:[32,8,5],backgroundColor:['#10B981','#EF4444','#F59E0B'],borderColor:'rgba(22,26,35,0.9)',borderWidth:3,hoverOffset:8}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{position:'bottom',labels:{color:'#A8B0BF',padding:14,font:{size:11,weight:'600'},boxWidth:10,boxHeight:10,usePointStyle:true,pointStyle:'circle'}}}}
    });
    return()=>{if(chartRef.current) chartRef.current.destroy();};
  },[]);
  return <canvas ref={canvasRef}/>;
}

function LineChart(){
  const canvasRef=useRef(null); const chartRef=useRef(null);
  useEffect(()=>{
    if(!canvasRef.current||!window.Chart) return;
    if(chartRef.current) chartRef.current.destroy();
    const ctx=canvasRef.current.getContext('2d');
    const grad=ctx.createLinearGradient(0,0,0,300);
    grad.addColorStop(0,'rgba(233,69,96,0.35)'); grad.addColorStop(1,'rgba(233,69,96,0)');
    chartRef.current=new window.Chart(ctx,{
      type:'line',
      data:{labels:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
        datasets:[{label:'Attendance',data:[35,34,33,32,36,35,34,33,35,34,36,35],borderColor:'#E94560',backgroundColor:grad,borderWidth:2.5,pointRadius:3,pointHoverRadius:6,pointBackgroundColor:'#E94560',pointBorderColor:'#fff',pointBorderWidth:1,tension:0.4,fill:true}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#161A23',titleColor:'#fff',bodyColor:'#A8B0BF',borderColor:'rgba(255,255,255,0.08)',borderWidth:1,padding:10}},scales:{y:{beginAtZero:true,grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#6B7384',font:{size:11}}},x:{grid:{display:false},ticks:{color:'#6B7384',font:{size:11}}}}}
    });
    return()=>{if(chartRef.current) chartRef.current.destroy();};
  },[]);
  return <canvas ref={canvasRef}/>;
}
